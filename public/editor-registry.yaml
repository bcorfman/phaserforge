      - { name: apexY, type: number, default: 0 }
      - { name: spacing, type: number, default: 60 }
      - { name: direction, type: string, default: up }
  - type: diamond
    displayName: Diamond
    category: formation
    targetKinds: [group]
    implemented: true
    parameters:
      - { name: centerX, type: number, default: 0 }
      - { name: centerY, type: number, default: 0 }
      - { name: spacing, type: number, default: 60 }
      - { name: includeCenter, type: boolean, default: true }
  - type: triangle
    displayName: Triangle
    category: formation
    targetKinds: [group]
    implemented: true
    parameters:
      - { name: apexX, type: number, default: 0 }
      - { name: apexY, type: number, default: 0 }
