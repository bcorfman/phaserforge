      - { key: height, type: number, tweenable: true, affectsBounds: true }
      - { key: originX, type: number, tweenable: true, affectsBounds: true }
      - { key: originY, type: number, tweenable: true, affectsBounds: true }
      - { key: depth, type: number, tweenable: true, affectsBounds: false }
      - { key: visible, type: boolean, tweenable: false, affectsBounds: false }
