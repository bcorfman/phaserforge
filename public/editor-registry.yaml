    displayName: Concentric Rings
    category: formation
    targetKinds: [group]
    implemented: true
    parameters:
      - { name: centerX, type: number, default: 0 }
      - { name: centerY, type: number, default: 0 }
      - { name: ring1Radius, type: number, default: 80 }
      - { name: ring2Radius, type: number, default: 120 }
      - { name: ring1Count, type: number, default: 6 }
      - { name: ring2Count, type: number, default: 12 }
  - type: cross
    displayName: Cross
    category: formation
    targetKinds: [group]
    implemented: true
    parameters:
      - { name: centerX, type: number, default: 0 }
      - { name: centerY, type: number, default: 0 }
      - { name: armLength, type: number, default: 120 }
      - { name: spacing, type: number, default: 60 }
      - { name: includeCenter, type: boolean, default: true }
