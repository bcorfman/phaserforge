arrange:
  - type: grid
    displayName: Grid
    category: formation
    targetKinds: [group]
    implemented: true
    parameters:
      - { name: rows, type: number, required: true, default: 3 }
      - { name: cols, type: number, required: true, default: 5 }
      - { name: startX, type: number, required: true, default: 220 }
      - { name: startY, type: number, required: true, default: 140 }
      - { name: spacingX, type: number, required: true, default: 48 }
      - { name: spacingY, type: number, required: true, default: 40 }
  - type: line
    displayName: Line
    category: formation
    targetKinds: [group]
    implemented: true
    parameters:
      - { name: startX, type: number, default: 0 }
      - { name: startY, type: number, default: 0 }
      - { name: spacing, type: number, default: 50 }
  - type: circle
    displayName: Circle
    category: formation
    targetKinds: [group]
    implemented: true
    parameters:
      - { name: centerX, type: number, default: 0 }
      - { name: centerY, type: number, default: 0 }
      - { name: radius, type: number, default: 120 }
  - type: arc
    displayName: Arc
    category: formation
    targetKinds: [group]
    implemented: true
    parameters:
      - { name: centerX, type: number, default: 0 }
      - { name: centerY, type: number, default: 0 }
      - { name: radius, type: number, default: 120 }
      - { name: startAngleDeg, type: number, default: 20 }
      - { name: endAngleDeg, type: number, default: 160 }
