<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980">
  <defs>
    <style>
      .bg { fill: #efe7db; }
      .shell { fill: #faf7f1; stroke: #d2c1a9; stroke-width: 2; }
      .dim { fill: rgba(80, 65, 40, 0.18); }
      .dialog { fill: #fbf8f2; stroke: #d3c2aa; stroke-width: 2; }
      .btn { fill: #fffdfa; stroke: #d3c2aa; stroke-width: 2; }
      .btnBlue { fill: #3e6bbb; stroke: #6e94d4; stroke-width: 2; }
      .brand { font: 800 34px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #24303d; }
      .title { font: 800 28px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #26313f; }
      .h { font: 760 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; letter-spacing: .12em; fill: #607082; }
      .strong { font: 760 22px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #2a3442; }
      .text { font: 620 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #2e3947; }
      .small { font: 550 15px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #728294; }
      .label { font: 650 15px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #667687; }
      .mono { font: 620 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #2d3845; }
    </style>
  </defs>
  <rect class="bg" width="1440" height="980" />
  <rect class="shell" x="40" y="80" width="1360" height="860" rx="28" />
  <text class="h" x="70" y="118">BROWSER EDITOR</text>
  <text class="brand" x="70" y="158">PhaserForge</text>
  <rect class="dim" x="40" y="80" width="1360" height="860" rx="28" />

  <rect class="dialog" x="420" y="258" width="600" height="412" rx="26" />
  <text class="strong" x="460" y="314">Copy this revision as a new project?</text>
  <text class="text" x="460" y="366">You are starting a separate project from this checkpoint.</text>
  <text class="text" x="460" y="398">Your current project stays unchanged.</text>

  <text class="label" x="460" y="458">New Project Name</text>
  <rect class="btn" x="460" y="474" width="520" height="56" rx="18" />
  <text class="mono" x="484" y="510">Pattern Demo Playground - Copy from Jun 17</text>

  <text class="small" x="460" y="570">Source revision: Jun 17 • Named version: Good pacing</text>
  <text class="small" x="460" y="598">The copied project will appear in the Project Tree as its own project.</text>

  <rect class="btn" x="460" y="618" width="120" height="52" rx="18" />
  <text class="text" x="520" y="652" text-anchor="middle">Cancel</text>
  <rect class="btnBlue" x="760" y="618" width="220" height="52" rx="18" />
  <text class="text" x="870" y="652" text-anchor="middle" fill="#ffffff">Create Copy</text>

  <text class="title" x="40" y="48">Copy Dialog</text>
</svg>
