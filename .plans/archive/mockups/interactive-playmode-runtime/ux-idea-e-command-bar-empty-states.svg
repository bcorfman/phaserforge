<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
        --warn:#ffb86a;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:700;}
      .label{fill:var(--muted); font-size:13px;}
      .small{fill:var(--muted); font-size:12px;}
      .tiny{fill:var(--muted); font-size:11px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .btn{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .btnPrimary{fill:rgba(106,167,255,0.18); stroke:var(--accent); stroke-width:1;}
      .btnText{fill:var(--text); font-size:12px; font-weight:700;}
      .btnTextMuted{fill:var(--muted); font-size:12px; font-weight:700;}
      .field{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
      .fieldText{fill:var(--text); font-size:12px; font-weight:600;}
      .divider{stroke:rgba(106,167,255,0.18); stroke-width:1;}
      .menu{fill:#0b1226; stroke:rgba(106,167,255,0.55); stroke-width:1;}
      .callout{fill:rgba(124,240,199,0.10); stroke:var(--accent2); stroke-width:1; stroke-dasharray:6 6;}
      .calloutText{fill:var(--text); font-size:12px; font-weight:800;}
      .dot{fill:rgba(170,180,230,0.75);}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" rx="16" fill="var(--bg)"/>

  <!-- Top toolbar -->
  <rect x="24" y="18" width="1152" height="54" rx="10" class="panel"/>
  <text x="44" y="50" class="title">Editor IA Proposal — Idea E: Command Bar + Empty-State CTAs (Mockup)</text>

  <!-- Command bar primary action -->
  <rect x="880" y="30" width="96" height="30" rx="10" class="btnPrimary"/>
  <text x="914" y="50" class="btnText">+ Add ▾</text>

  <!-- Dropdown menu (open) -->
  <rect x="824" y="66" width="200" height="148" rx="12" class="menu"/>
  <text x="844" y="94" class="small">Global</text>
  <rect x="840" y="104" width="168" height="28" rx="10" class="field"/>
  <text x="854" y="123" class="tiny">Import Sprites…</text>
  <rect x="840" y="136" width="168" height="28" rx="10" class="field"/>
  <text x="854" y="155" class="tiny">Add Audio…</text>
  <rect x="840" y="168" width="168" height="28" rx="10" class="field"/>
  <text x="854" y="187" class="tiny">New Input Map…</text>
  <text x="844" y="214" class="small">Scene</text>
  <text x="914" y="214" class="tiny">(targets scene-1)</text>

  <!-- App body columns -->
  <rect x="24" y="86" width="336" height="610" rx="12" class="panel"/>
  <rect x="372" y="86" width="516" height="610" rx="12" class="panel"/>
  <rect x="900" y="86" width="276" height="610" rx="12" class="panel"/>

  <text x="44" y="118" class="label">Sidebar</text>
  <text x="392" y="118" class="label">Canvas</text>
  <text x="920" y="118" class="label">Inspector</text>

  <!-- Left: shows hierarchy as-is, but CTAs drive discovery -->
  <rect x="44" y="140" width="296" height="34" rx="10" class="field"/>
  <text x="58" y="162" class="fieldText">Scenes ▾  scene-1</text>
  <line x1="44" y1="194" x2="340" y2="194" class="divider"/>

  <text x="44" y="220" class="label">Formations</text>
  <rect x="44" y="238" width="296" height="84" rx="12" class="panel2"/>
  <text x="58" y="266" class="tiny">No formations yet.</text>
  <rect x="58" y="282" width="268" height="30" rx="10" class="btnPrimary"/>
  <text x="136" y="302" class="btnText">Create Formation</text>

  <text x="44" y="356" class="label">Sprites</text>
  <rect x="44" y="374" width="296" height="84" rx="12" class="panel2"/>
  <text x="58" y="402" class="tiny">No sprites imported.</text>
  <rect x="58" y="418" width="268" height="30" rx="10" class="btnPrimary"/>
  <text x="148" y="438" class="btnText">Import Sprites</text>

  <!-- Center: canvas placeholder -->
  <rect x="408" y="140" width="444" height="456" rx="12" class="panel2"/>
  <circle cx="548" cy="320" r="6" class="dot"/>
  <circle cx="610" cy="270" r="6" class="dot"/>
  <circle cx="680" cy="330" r="6" class="dot"/>
  <circle cx="720" cy="420" r="6" class="dot"/>
  <text x="420" y="610" class="tiny">Command bar provides “always available” global actions regardless of context.</text>

  <!-- Right: Inspector stays contextual -->
  <rect x="920" y="140" width="236" height="34" rx="10" class="field"/>
  <text x="936" y="162" class="fieldText">Inspector</text>
  <rect x="920" y="188" width="236" height="120" rx="12" class="panel2"/>
  <text x="936" y="214" class="small">Selection</text>
  <text x="936" y="236" class="tiny">Selected: (none)</text>
  <text x="936" y="258" class="tiny">Creation flows through “+ Add” + empty-state buttons.</text>

  <!-- Callout -->
  <rect x="372" y="610" width="516" height="86" rx="12" class="callout"/>
  <text x="392" y="636" class="calloutText">Resolves:</text>
  <text x="392" y="658" class="tiny">1) Even if hierarchy is subtle, CTAs are placed where users expect within each panel.</text>
  <text x="392" y="676" class="tiny">2) “Create Formation” appears as a stable empty-state/section action (not selection-dependent).</text>
  <text x="392" y="694" class="tiny">3) “Import Sprites” is global via command bar + mirrored in Sprites empty state.</text>
</svg>

