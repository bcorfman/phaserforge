<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
        --warn:#ffb86a;
        --good:#7cf0c7;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:700;}
      .label{fill:var(--muted); font-size:13px;}
      .small{fill:var(--muted); font-size:12px;}
      .tiny{fill:var(--muted); font-size:11px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .btn{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .btnPrimary{fill:rgba(106,167,255,0.18); stroke:var(--accent); stroke-width:1;}
      .btnGood{fill:rgba(124,240,199,0.14); stroke:var(--good); stroke-width:1;}
      .btnDanger{fill:rgba(255,184,106,0.10); stroke:var(--warn); stroke-width:1;}
      .btnText{fill:var(--text); font-size:12px; font-weight:700;}
      .btnTextMuted{fill:var(--muted); font-size:12px; font-weight:700;}
      .field{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
      .fieldText{fill:var(--text); font-size:12px; font-weight:600;}
      .divider{stroke:rgba(106,167,255,0.18); stroke-width:1;}
      .chip{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .chipActive{fill:rgba(106,167,255,0.18); stroke:rgba(106,167,255,0.65); stroke-width:1;}
      .callout{fill:rgba(124,240,199,0.10); stroke:var(--accent2); stroke-width:1; stroke-dasharray:6 6;}
      .calloutText{fill:var(--text); font-size:12px; font-weight:800;}
      .entity{fill:#1a254a; stroke:#2a3764; stroke-width:1;}
      .groupHull{fill:rgba(124,240,199,0.08); stroke:var(--accent2); stroke-width:2;}
      .foldHeader{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
      .foldTitle{fill:var(--text); font-size:12px; font-weight:800;}
      .kbd{fill:rgba(106,167,255,0.12); stroke:rgba(106,167,255,0.55); stroke-width:1;}
      .kbdText{fill:var(--text); font-size:11px; font-weight:800;}
      .pill{fill:rgba(106,167,255,0.14); stroke:rgba(106,167,255,0.55); stroke-width:1;}
      .pillText{fill:var(--text); font-size:11px; font-weight:800;}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" rx="16" fill="var(--bg)"/>

  <!-- Top toolbar -->
  <rect x="24" y="18" width="1152" height="54" rx="10" class="panel"/>
  <text x="44" y="50" class="title">Interactive Play Mode Runtime — Phase 6: Input Maps</text>

  <rect x="760" y="30" width="92" height="30" rx="10" class="chipActive"/>
  <text x="788" y="50" class="btnText">Edit</text>
  <rect x="856" y="30" width="92" height="30" rx="10" class="chip"/>
  <text x="885" y="50" class="btnTextMuted">Play</text>

  <rect x="1040" y="30" width="54" height="30" rx="10" class="kbd"/>
  <text x="1056" y="50" class="kbdText">WASD</text>
  <text x="1100" y="50" class="tiny">bindings</text>

  <!-- App body columns -->
  <rect x="24" y="86" width="336" height="610" rx="12" class="panel"/>
  <rect x="372" y="86" width="516" height="610" rx="12" class="panel"/>
  <rect x="900" y="86" width="276" height="610" rx="12" class="panel"/>

  <text x="44" y="118" class="label">Project</text>
  <text x="392" y="118" class="label">Canvas</text>
  <text x="920" y="118" class="label">Inspector</text>

  <!-- Left: scene context -->
  <rect x="44" y="140" width="296" height="34" rx="10" class="field"/>
  <text x="58" y="162" class="fieldText">Scene: scene-1</text>
  <line x1="44" y1="186" x2="340" y2="186" class="divider"/>

  <!-- Left: input maps list -->
  <text x="44" y="212" class="label">Input Maps</text>
  <rect x="44" y="230" width="296" height="34" rx="10" class="field"/>
  <text x="58" y="252" class="fieldText">default_controls</text>
  <rect x="44" y="270" width="296" height="34" rx="10" class="field"/>
  <text x="58" y="292" class="fieldText">menu_controls</text>

  <rect x="44" y="322" width="140" height="32" rx="10" class="btnPrimary"/>
  <text x="74" y="344" class="btnText">+ New Map</text>
  <rect x="200" y="322" width="140" height="32" rx="10" class="btn"/>
  <text x="244" y="344" class="btnTextMuted">Duplicate</text>

  <!-- Left: selected map editor -->
  <rect x="44" y="370" width="296" height="326" rx="12" class="panel2"/>
  <text x="58" y="398" class="small">Editing: default_controls</text>

  <rect x="58" y="414" width="268" height="30" rx="10" class="field"/>
  <text x="72" y="434" class="fieldText">Action: MoveLeft</text>
  <rect x="58" y="450" width="268" height="30" rx="10" class="field"/>
  <text x="72" y="470" class="fieldText">Bindings: keyboard.A, gamepad.LX&lt;0</text>

  <rect x="58" y="496" width="268" height="30" rx="10" class="field"/>
  <text x="72" y="516" class="fieldText">Action: Jump</text>
  <rect x="58" y="532" width="268" height="30" rx="10" class="field"/>
  <text x="72" y="552" class="fieldText">Bindings: keyboard.Space, gamepad.A</text>

  <rect x="58" y="584" width="128" height="32" rx="10" class="btnGood"/>
  <text x="78" y="606" class="btnText">+ Add Action</text>
  <rect x="198" y="584" width="128" height="32" rx="10" class="btn"/>
  <text x="224" y="606" class="btnTextMuted">Bind…</text>

  <text x="58" y="646" class="tiny">Bind… opens “press a key / click / gamepad” capture.</text>
  <text x="58" y="666" class="tiny">Actions expose pressed/held/released per-frame in runtime.</text>

  <!-- Canvas -->
  <rect x="408" y="170" width="444" height="410" rx="12" class="panel2"/>
  <rect x="468" y="240" width="324" height="216" rx="18" class="groupHull"/>
  <rect x="528" y="304" width="56" height="40" rx="8" class="entity"/>
  <rect x="612" y="304" width="56" height="40" rx="8" class="entity"/>
  <rect x="696" y="304" width="56" height="40" rx="8" class="entity"/>

  <rect x="420" y="604" width="148" height="26" rx="12" class="pill"/>
  <text x="432" y="622" class="pillText">MoveLeft: held</text>
  <rect x="576" y="604" width="148" height="26" rx="12" class="pill"/>
  <text x="588" y="622" class="pillText">Jump: pressed</text>
  <text x="420" y="650" class="tiny">Optional runtime overlay: show semantic actions for debugging.</text>

  <!-- Inspector: scene uses which map -->
  <rect x="920" y="140" width="236" height="34" rx="10" class="foldHeader"/>
  <text x="936" y="162" class="foldTitle">Scene: scene-1</text>

  <rect x="920" y="188" width="236" height="34" rx="10" class="foldHeader"/>
  <text x="936" y="210" class="foldTitle">▾ Input</text>

  <text x="920" y="244" class="small">Active Input Map</text>
  <rect x="920" y="252" width="236" height="30" rx="10" class="field"/>
  <text x="934" y="272" class="fieldText">default_controls</text>
  <text x="1128" y="272" class="tiny">▾</text>

  <text x="920" y="306" class="small">Fallback</text>
  <rect x="920" y="314" width="236" height="30" rx="10" class="field"/>
  <text x="934" y="334" class="fieldText">(project default)</text>
  <text x="1128" y="334" class="tiny">▾</text>

  <line x1="920" y1="360" x2="1156" y2="360" class="divider"/>

  <text x="920" y="386" class="small">Actions (preview)</text>
  <rect x="920" y="398" width="236" height="30" rx="10" class="field"/>
  <text x="934" y="418" class="fieldText">MoveLeft → A / LX&lt;0</text>
  <rect x="920" y="434" width="236" height="30" rx="10" class="field"/>
  <text x="934" y="454" class="fieldText">Jump → Space / A</text>
  <rect x="920" y="470" width="236" height="30" rx="10" class="field"/>
  <text x="934" y="490" class="fieldText">Pause → Esc / Start</text>

  <rect x="920" y="524" width="236" height="32" rx="10" class="btnPrimary"/>
  <text x="990" y="546" class="btnText">Apply</text>

  <rect x="920" y="570" width="236" height="126" rx="12" class="panel2"/>
  <text x="936" y="598" class="label">Binding capture</text>
  <text x="936" y="620" class="tiny">Press a key / click / move stick…</text>
  <text x="936" y="642" class="tiny">Then store as a binding on the action.</text>
  <text x="936" y="664" class="tiny">Supports keyboard, mouse buttons, gamepad.</text>

  <!-- Callout -->
  <rect x="372" y="628" width="804" height="58" rx="12" class="callout"/>
  <text x="392" y="658" class="calloutText">Author input maps once (project) and select them per scene; runtime reports pressed/held/released semantics.</text>
  <text x="392" y="678" class="tiny">Editor stores bindings (no raw keycodes in game logic); Play mode can snapshot active action states for tests.</text>
</svg>
