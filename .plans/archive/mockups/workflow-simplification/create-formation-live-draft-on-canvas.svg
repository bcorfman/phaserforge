<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#060b14"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <style>
      .ui { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .muted { fill: #9aa7b6; }
      .ink { fill: #e9f0f7; }
      .panel { fill: rgba(18, 26, 34, 0.86); stroke: rgba(140, 180, 190, 0.25); }
      .surface { fill: rgba(18, 26, 34, 0.92); stroke: rgba(140, 180, 190, 0.35); }
      .btn { fill: rgba(28, 44, 56, 0.95); stroke: rgba(140, 180, 190, 0.35); }
      .field { fill: rgba(18, 26, 34, 0.90); stroke: rgba(140, 180, 190, 0.35); }
      .ghost { fill: rgba(120, 210, 255, 0.10); stroke: rgba(120, 210, 255, 0.65); }
      .ghostSprite { fill: rgba(120, 210, 255, 0.16); stroke: rgba(120, 210, 255, 0.7); }
      .handle { fill: rgba(255, 255, 255, 0.12); stroke: rgba(255, 255, 255, 0.7); }
      .divider { stroke: rgba(140, 180, 190, 0.20); }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="720" fill="url(#bg)"/>

  <!-- Main viewport -->
  <g filter="url(#shadow)" transform="translate(220, 80)">
    <rect x="0" y="0" width="960" height="620" rx="18" ry="18" class="panel"/>
    <text x="18" y="38" class="ui muted" font-size="12">Canvas</text>
    <text x="18" y="64" class="ui ink" font-weight="700" font-size="18">Viewport</text>
    <rect x="18" y="96" width="924" height="500" rx="18" ry="18" fill="rgba(0,0,0,0.35)" stroke="rgba(140,180,190,0.25)"/>

    <!-- Live "draft formation" preview rendered directly on the real canvas -->
    <g transform="translate(18, 96)">
      <rect x="220" y="140" width="420" height="220" rx="18" ry="18" class="ghost"/>
      <!-- ghost members -->
      <rect x="260" y="180" width="64" height="64" rx="10" ry="10" class="ghostSprite"/>
      <rect x="340" y="180" width="64" height="64" rx="10" ry="10" class="ghostSprite"/>
      <rect x="420" y="180" width="64" height="64" rx="10" ry="10" class="ghostSprite"/>
      <rect x="500" y="180" width="64" height="64" rx="10" ry="10" class="ghostSprite"/>
      <rect x="580" y="180" width="64" height="64" rx="10" ry="10" class="ghostSprite"/>

      <!-- center point handle (draggable on-canvas) -->
      <g transform="translate(430, 250)">
        <circle cx="0" cy="0" r="16" class="handle"/>
        <line x1="-28" y1="0" x2="28" y2="0" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
        <line x1="0" y1="-28" x2="0" y2="28" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
        <text x="22" y="-18" class="ui muted" font-size="11">Center</text>
      </g>

      <!-- hint -->
      <g transform="translate(26, 416)" opacity="0.9">
        <rect x="0" y="0" width="420" height="44" rx="14" ry="14" class="surface"/>
        <text x="16" y="18" class="ui ink" font-size="12">Draft mode:</text>
        <text x="90" y="18" class="ui muted" font-size="12">changes apply live to the canvas</text>
        <text x="16" y="34" class="ui muted" font-size="12">Drag the Center handle • Esc cancels • Enter creates</text>
      </g>
    </g>
  </g>

  <!-- Floating "Formation Draft" palette (NOT a dialog with its own preview canvas) -->
  <g filter="url(#shadow)" transform="translate(28, 140)">
    <rect x="0" y="0" width="360" height="500" rx="18" ry="18" class="surface"/>
    <text x="18" y="32" class="ui ink" font-weight="700" font-size="16">Create Formation (Draft)</text>
    <text x="18" y="54" class="ui muted" font-size="12">Edits update the real canvas immediately</text>

    <text x="18" y="92" class="ui muted" font-size="12">Template source</text>
    <rect x="18" y="100" width="324" height="36" rx="12" ry="12" class="field"/>
    <text x="34" y="123" class="ui ink" font-size="13">Asset: enemy-a</text>

    <text x="18" y="162" class="ui muted" font-size="12">Formation name</text>
    <rect x="18" y="170" width="324" height="36" rx="12" ry="12" class="field"/>
    <text x="34" y="193" class="ui" font-size="13" fill="rgba(233,240,247,0.85)">Formation 1</text>

    <text x="18" y="232" class="ui muted" font-size="12">Preset</text>
    <rect x="18" y="240" width="204" height="36" rx="12" ry="12" class="field"/>
    <text x="34" y="263" class="ui ink" font-size="13">Grid</text>
    <text x="202" y="263" class="ui muted" font-size="14">▾</text>

    <text x="238" y="232" class="ui muted" font-size="12">Count</text>
    <rect x="238" y="240" width="104" height="36" rx="12" ry="12" class="field"/>
    <text x="254" y="263" class="ui ink" font-size="13">12</text>

    <line x1="18" y1="300" x2="342" y2="300" class="divider"/>

    <!-- All params inline (scroll region in real UI; shown partially here) -->
    <text x="18" y="328" class="ui muted" font-size="12">Parameters</text>

    <text x="18" y="358" class="ui muted" font-size="12">Rows</text>
    <rect x="18" y="366" width="104" height="34" rx="12" ry="12" class="field"/>
    <text x="34" y="388" class="ui ink" font-size="13">3</text>

    <text x="134" y="358" class="ui muted" font-size="12">Cols</text>
    <rect x="134" y="366" width="104" height="34" rx="12" ry="12" class="field"/>
    <text x="150" y="388" class="ui ink" font-size="13">4</text>

    <text x="250" y="358" class="ui muted" font-size="12">Spacing</text>
    <rect x="250" y="366" width="92" height="34" rx="12" ry="12" class="field"/>
    <text x="266" y="388" class="ui ink" font-size="13">24</text>

    <text x="18" y="428" class="ui muted" font-size="12">Center X</text>
    <rect x="18" y="436" width="154" height="34" rx="12" ry="12" class="field"/>
    <text x="34" y="458" class="ui ink" font-size="13">512</text>

    <text x="188" y="428" class="ui muted" font-size="12">Center Y</text>
    <rect x="188" y="436" width="154" height="34" rx="12" ry="12" class="field"/>
    <text x="204" y="458" class="ui ink" font-size="13">384</text>

    <!-- Actions -->
    <rect x="18" y="478" width="92" height="40" rx="14" ry="14" class="btn"/>
    <text x="42" y="504" class="ui ink" font-size="13">Cancel</text>
    <rect x="250" y="478" width="92" height="40" rx="14" ry="14" class="btn"/>
    <text x="276" y="504" class="ui ink" font-size="13">Create</text>
  </g>

  <text x="24" y="704" class="ui muted" font-size="12">
    Idea: “Draft formation mode” draws a live ghost formation on the real canvas and shows a floating parameter palette; user drags the center handle on-canvas before Create.
  </text>
</svg>

