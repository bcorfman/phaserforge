<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg{fill:#0b1020}
      .panel{fill:#111a33;stroke:#2a3a6a;stroke-width:2;rx:16}
      .card{fill:#0f1733;stroke:#2a3a6a;stroke-width:2;rx:14}
      .bar{fill:#101a36;stroke:#2a3a6a;stroke-width:2;rx:14}
      .btn{fill:#16244a;stroke:#2a3a6a;stroke-width:1.5;rx:12}
      .btnPrimary{fill:#123b2b;stroke:#2be4a7;stroke-width:1.5;rx:12}
      .btnDanger{fill:#3a1b2a;stroke:#7a3a5a;stroke-width:1.5;rx:12}
      .chip{fill:#1a2b4f;stroke:#2a3a6a;stroke-width:1.2;rx:999}
      .check{fill:#0f1630;stroke:#2a3a6a;stroke-width:1.5;rx:6}
      .checkOn{fill:#2be4a7;opacity:0.9}
      .title{fill:#e8eeff;font:700 26px system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
      .h{fill:#cfe0ff;font:700 16px system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
      .t{fill:#d6def7;font:500 14px system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
      .muted{fill:#a9b6df;font:500 13px system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
      .mono{fill:#d6def7;font:600 12.5px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
      .hl{fill:none;stroke:#2be4a7;stroke-width:2;stroke-dasharray:6 6}
      .divider{stroke:#2a3a6a;stroke-width:1.5}
      .badge{fill:#2be4a7;opacity:0.25;stroke:#2be4a7;stroke-width:1.5;rx:999}
      .caret{fill:#a9b6df;font:700 14px system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    </style>
  </defs>

  <rect class="bg" width="1400" height="900"/>

  <text class="title" x="44" y="60">06 — Parallelize Actions (Make Parallel / Ungroup)</text>
  <text class="muted" x="44" y="86">Workflow: create actions first, multi-select 2+ steps, then “Make Parallel” in a selection bar (same pattern as Group/Ungroup).</text>

  <!-- LEFT: Before (multi-select + Make Parallel) -->
  <g transform="translate(44,120)">
    <rect class="panel" x="0" y="0" width="640" height="740" rx="16"/>
    <text class="h" x="18" y="34">Inspector → Sprite → Attached Actions</text>
    <text class="muted" x="18" y="56">Select two or more steps, then make them parallel</text>

    <!-- Attached Actions block -->
    <g transform="translate(18,78)">
      <rect class="card" x="0" y="0" width="604" height="622" rx="14"/>
      <text class="h" x="16" y="28">Attached Actions</text>
      <text class="muted" x="16" y="50">List</text>
      <line class="divider" x1="16" y1="64" x2="588" y2="64"/>

      <!-- Row 1 -->
      <g transform="translate(16,86)">
        <rect class="check" x="0" y="-14" width="22" height="22" rx="6"/>
        <rect class="btn" x="30" y="-18" width="476" height="30" rx="12"/>
        <text class="t" x="44" y="2">Step 1 · Move Until · MoveUntil</text>
        <rect class="btn" x="514" y="-18" width="36" height="30" rx="12"/>
        <text class="t" x="526" y="2">Up</text>
        <rect class="btn" x="554" y="-18" width="34" height="30" rx="12"/>
        <text class="t" x="560" y="2">Dn</text>
      </g>

      <!-- Row 2 (selected) -->
      <g transform="translate(16,130)">
        <rect class="check" x="0" y="-14" width="22" height="22" rx="6"/>
        <rect class="checkOn" x="4" y="-10" width="14" height="14" rx="3"/>
        <rect class="btn" x="30" y="-18" width="476" height="30" rx="12"/>
        <text class="t" x="44" y="2">Step 2 · Blink Until · BlinkUntil</text>
        <rect class="btn" x="514" y="-18" width="36" height="30" rx="12"/>
        <text class="t" x="526" y="2">Up</text>
        <rect class="btn" x="554" y="-18" width="34" height="30" rx="12"/>
        <text class="t" x="560" y="2">Dn</text>
      </g>

      <!-- Row 3 (selected) -->
      <g transform="translate(16,174)">
        <rect class="check" x="0" y="-14" width="22" height="22" rx="6"/>
        <rect class="checkOn" x="4" y="-10" width="14" height="14" rx="3"/>
        <rect class="btn" x="30" y="-18" width="476" height="30" rx="12"/>
        <text class="t" x="44" y="2">Step 3 · Move Until · MoveUntil</text>
        <rect class="btn" x="514" y="-18" width="36" height="30" rx="12"/>
        <text class="t" x="526" y="2">Up</text>
        <rect class="btn" x="554" y="-18" width="34" height="30" rx="12"/>
        <text class="t" x="560" y="2">Dn</text>
      </g>

      <!-- highlight around selected rows -->
      <rect class="hl" x="10" y="108" width="584" height="92" rx="14"/>
      <text class="muted" x="16" y="236">Selected steps become one “Parallel Group” row</text>

      <!-- Selection Bar (contextual) -->
      <g transform="translate(16,510)">
        <rect class="bar" x="0" y="0" width="572" height="92" rx="14"/>
        <rect class="chip" x="14" y="14" width="130" height="26" rx="999"/>
        <text class="t" x="26" y="32">2 selected</text>

        <rect class="btnPrimary" x="14" y="48" width="148" height="30" rx="12"/>
        <text class="t" x="34" y="68">Make Parallel</text>

        <rect class="btn" x="172" y="48" width="92" height="30" rx="12"/>
        <text class="t" x="196" y="68">Cancel</text>

        <rect class="btnDanger" x="472" y="48" width="86" height="30" rx="12"/>
        <text class="t" x="492" y="68">Remove</text>
      </g>
    </g>
  </g>

  <!-- RIGHT: After (Parallel Group row + Ungroup) -->
  <g transform="translate(716,120)">
    <rect class="panel" x="0" y="0" width="640" height="740" rx="16"/>
    <text class="h" x="18" y="34">After: grouped into a Parallel Group</text>
    <text class="muted" x="18" y="56">Parallel groups behave like a normal step for ordering, and can be expanded</text>

    <g transform="translate(18,78)">
      <rect class="card" x="0" y="0" width="604" height="622" rx="14"/>
      <text class="h" x="16" y="28">Attached Actions</text>
      <text class="muted" x="16" y="50">List</text>
      <line class="divider" x1="16" y1="64" x2="588" y2="64"/>

      <!-- Row 1 -->
      <g transform="translate(16,86)">
        <rect class="check" x="0" y="-14" width="22" height="22" rx="6"/>
        <rect class="btn" x="30" y="-18" width="476" height="30" rx="12"/>
        <text class="t" x="44" y="2">Step 1 · Move Until · MoveUntil</text>
        <rect class="btn" x="514" y="-18" width="36" height="30" rx="12"/>
        <text class="t" x="526" y="2">Up</text>
        <rect class="btn" x="554" y="-18" width="34" height="30" rx="12"/>
        <text class="t" x="560" y="2">Dn</text>
      </g>

      <!-- Parallel Group row (expanded) -->
      <g transform="translate(16,136)">
        <rect class="check" x="0" y="-14" width="22" height="22" rx="6"/>
        <rect class="checkOn" x="4" y="-10" width="14" height="14" rx="3"/>
        <rect class="btn" x="30" y="-18" width="374" height="30" rx="12"/>
        <text class="caret" x="44" y="2">▾</text>
        <text class="t" x="62" y="2">Parallel Group · 2 actions</text>
        <rect class="badge" x="258" y="-12" width="74" height="18" rx="999"/>
        <text class="mono" x="268" y="1">Parallel</text>

        <rect class="btn" x="412" y="-18" width="94" height="30" rx="12"/>
        <text class="t" x="434" y="2">Ungroup</text>
        <rect class="btn" x="514" y="-18" width="36" height="30" rx="12"/>
        <text class="t" x="526" y="2">Up</text>
        <rect class="btn" x="554" y="-18" width="34" height="30" rx="12"/>
        <text class="t" x="560" y="2">Dn</text>
      </g>

      <!-- Children (indented) -->
      <g transform="translate(56,182)">
        <rect class="btn" x="0" y="-18" width="506" height="28" rx="12" opacity="0.95"/>
        <text class="t" x="14" y="0">• Blink Until · BlinkUntil</text>
      </g>
      <g transform="translate(56,216)">
        <rect class="btn" x="0" y="-18" width="506" height="28" rx="12" opacity="0.95"/>
        <text class="t" x="14" y="0">• Move Until · MoveUntil</text>
      </g>

      <!-- Selection Bar for group (single selection) -->
      <g transform="translate(16,510)">
        <rect class="bar" x="0" y="0" width="572" height="92" rx="14"/>
        <rect class="chip" x="14" y="14" width="208" height="26" rx="999"/>
        <text class="t" x="26" y="32">Selected: Parallel Group</text>

        <rect class="btn" x="14" y="48" width="94" height="30" rx="12"/>
        <text class="t" x="34" y="68">Ungroup</text>

        <rect class="btnDanger" x="472" y="48" width="86" height="30" rx="12"/>
        <text class="t" x="492" y="68">Remove</text>
      </g>

      <text class="muted" x="16" y="266">Ungroup restores the original steps in-place (preserving order)</text>
    </g>
  </g>
</svg>
