<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#060b14"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <style>
      .ui { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .muted { fill: #9aa7b6; }
      .ink { fill: #e9f0f7; }
      .panel { fill: rgba(18, 26, 34, 0.86); stroke: rgba(140, 180, 190, 0.25); }
      .surface { fill: rgba(18, 26, 34, 0.92); stroke: rgba(140, 180, 190, 0.35); }
      .pill { fill: rgba(24, 36, 46, 0.95); stroke: rgba(140, 180, 190, 0.25); }
      .btn { fill: rgba(28, 44, 56, 0.95); stroke: rgba(140, 180, 190, 0.35); }
      .field { fill: rgba(18, 26, 34, 0.90); stroke: rgba(140, 180, 190, 0.35); }
      .menu { fill: rgba(18, 26, 34, 0.96); stroke: rgba(140, 180, 190, 0.35); }
      .divider { stroke: rgba(140, 180, 190, 0.20); }
    </style>
  </defs>

  <!-- Background canvas -->
  <rect x="0" y="0" width="1200" height="720" fill="url(#bg)"/>

  <!-- Left Sidebar (Scene + Assets panes) -->
  <g filter="url(#shadow)" transform="translate(20, 90)">
    <rect x="0" y="0" width="320" height="610" rx="18" ry="18" class="panel"/>
    <text x="18" y="32" class="ui muted" font-size="12">Scene</text>
    <text x="18" y="56" class="ui ink" font-weight="700" font-size="18">Scenes</text>

    <!-- Sprites section -->
    <text x="18" y="108" class="ui muted" font-size="12" letter-spacing="0.12em">SPRITES</text>
    <rect x="18" y="124" width="284" height="38" rx="12" ry="12" class="pill"/>
    <text x="32" y="148" class="ui ink" font-size="13">enemy A</text>
    <text x="280" y="148" class="ui ink" font-size="18">⋯</text>

    <!-- Sprite overflow menu (new entrypoint) -->
    <g transform="translate(160, 168)">
      <rect x="0" y="0" width="250" height="170" rx="14" ry="14" class="menu"/>
      <text x="14" y="26" class="mono muted" font-size="12">e1</text>
      <rect x="12" y="40" width="226" height="34" rx="10" ry="10" class="btn" stroke-width="1"/>
      <text x="24" y="62" class="ui ink" font-size="12">Create formation from…</text>
      <rect x="12" y="78" width="226" height="34" rx="10" ry="10" class="btn" stroke-width="1"/>
      <text x="24" y="100" class="ui ink" font-size="12">Rename…</text>
      <line x1="12" y1="120" x2="238" y2="120" class="divider"/>
      <rect x="12" y="130" width="226" height="34" rx="10" ry="10" class="btn" stroke-width="1"/>
      <text x="24" y="152" class="ui" font-size="12" fill="#ffb6b6">Delete…</text>
    </g>

    <!-- Formations section + Add (opens dialog with ASSET templates) -->
    <text x="18" y="356" class="ui muted" font-size="12" letter-spacing="0.12em">FORMATIONS</text>
    <rect x="240" y="342" width="62" height="28" rx="10" ry="10" class="btn" stroke-width="1"/>
    <text x="254" y="361" class="ui ink" font-size="12">+ Add</text>
    <text x="18" y="392" class="ui muted" font-size="12">+ Add opens Create Formation…</text>
    <text x="18" y="412" class="ui muted" font-size="12">Template source: Assets</text>

    <!-- Assets section -->
    <line x1="18" y1="448" x2="302" y2="448" class="divider"/>
    <text x="18" y="476" class="ui muted" font-size="12" letter-spacing="0.12em">ASSETS</text>
    <rect x="18" y="492" width="284" height="38" rx="12" ry="12" class="pill"/>
    <text x="32" y="516" class="ui ink" font-size="13">enemy_A.png</text>
    <text x="280" y="516" class="ui ink" font-size="18">⋯</text>

    <!-- Asset overflow menu (new entrypoint) -->
    <g transform="translate(160, 400)">
      <rect x="0" y="0" width="250" height="190" rx="14" ry="14" class="menu"/>
      <text x="14" y="26" class="mono muted" font-size="12">image:enemy-a</text>
      <rect x="12" y="40" width="226" height="34" rx="10" ry="10" class="btn" stroke-width="1"/>
      <text x="24" y="62" class="ui ink" font-size="12">Create formation from…</text>
      <rect x="12" y="78" width="226" height="34" rx="10" ry="10" class="btn" stroke-width="1"/>
      <text x="24" y="100" class="ui ink" font-size="12">Rename…</text>
      <rect x="12" y="116" width="226" height="34" rx="10" ry="10" class="btn" stroke-width="1"/>
      <text x="24" y="138" class="ui ink" font-size="12">Relink…</text>
      <line x1="12" y1="156" x2="238" y2="156" class="divider"/>
      <rect x="12" y="164" width="226" height="34" rx="10" ry="10" class="btn" stroke-width="1"/>
      <text x="24" y="186" class="ui" font-size="12" fill="#ffb6b6">Delete…</text>
    </g>
  </g>

  <!-- Main viewport (no Create Formation bar on canvas) -->
  <g filter="url(#shadow)" transform="translate(360, 120)">
    <rect x="0" y="0" width="820" height="560" rx="18" ry="18" class="panel"/>
    <text x="18" y="38" class="ui muted" font-size="12">Canvas</text>
    <text x="18" y="64" class="ui ink" font-weight="700" font-size="18">Viewport</text>
    <rect x="18" y="96" width="784" height="440" rx="18" ry="18" fill="rgba(0,0,0,0.35)" stroke="rgba(140,180,190,0.25)"/>

    <!-- A small selection bar shown as normal (not Create Formation) -->
    <g transform="translate(230, 488)" opacity="0.55">
      <rect x="0" y="0" rx="26" ry="26" width="360" height="52" class="pill"/>
      <rect x="12" y="12" rx="20" ry="20" width="128" height="28" class="btn" stroke-width="1"/>
      <text x="26" y="32" class="ui muted" font-size="12">Nothing selected</text>
      <rect x="150" y="12" rx="14" ry="14" width="170" height="28" class="btn" stroke-width="1"/>
      <text x="166" y="32" class="ui ink" font-size="12">Selection actions…</text>
      <text x="330" y="32" class="ui ink" font-size="16">⋯</text>
    </g>
  </g>

  <text x="24" y="704" class="ui muted" font-size="12">
    Mockup: “Create formation from…” entrypoints live in sprite ellipses, asset ellipses, and Formations + Add; creation flows into live on-canvas draft mode (see create-formation-live-draft-on-canvas.svg). No bottom canvas bar.
  </text>
</svg>
