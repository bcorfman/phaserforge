<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg{fill:#0b1020}
      .dock{fill:#0f1733;stroke:#2a3a6a;stroke-width:2;rx:16}
      .modal{fill:#0f1733;stroke:#2a3a6a;stroke-width:2;rx:16}
      .panel{fill:#111a33;stroke:#2a3a6a;stroke-width:2;rx:16}
      .btn{fill:#16244a;stroke:#2a3a6a;stroke-width:1.5;rx:12}
      .btn2{fill:#101a36;stroke:#2a3a6a;stroke-width:1.5;rx:12}
      .btnOk{fill:#123c2e;stroke:#2be4a7;stroke-width:1.5;rx:12}
      .title{fill:#e8eeff;font:700 26px system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
      .h{fill:#cfe0ff;font:700 16px system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
      .t{fill:#d6def7;font:500 14px system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
      .muted{fill:#a9b6df;font:500 13px system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
      .mono{fill:#d6def7;font:600 12.5px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
      .sep{stroke:#2a3a6a;stroke-width:1.5}
    </style>
  </defs>
  <rect class="bg" width="1400" height="900"/>

  <text class="title" x="44" y="60">05 — Asset Relink (Embedded ↔ Path) After Import</text>
  <text class="muted" x="44" y="86">Relink lives on the asset row overflow menu; default keeps assetId stable so references remain intact.</text>

  <!-- Assets Dock with overflow menu -->
  <g transform="translate(44,120)">
    <rect class="dock" x="0" y="0" width="560" height="700" rx="16"/>
    <text class="h" x="18" y="34">Assets Dock</text>

    <rect class="btn2" x="18" y="56" width="524" height="36" rx="12"/>
    <text class="muted" x="34" y="80">Search…</text>

    <rect class="btn" x="18" y="106" width="86" height="30" rx="12"/>
    <text class="t" x="40" y="126">Images</text>

    <rect class="btn2" x="18" y="154" width="524" height="50" rx="12"/>
    <text class="t" x="34" y="184">image: hero_idle</text>
    <text class="muted" x="170" y="184">Embedded</text>
    <rect class="btn" x="472" y="166" width="56" height="28" rx="10"/>
    <text class="t" x="486" y="186">⋯</text>

    <!-- overflow menu -->
    <g transform="translate(320,214)">
      <rect class="panel" x="0" y="0" width="222" height="150" rx="14"/>
      <text class="t" x="16" y="34">Rename…</text>
      <text class="t" x="16" y="68">Relink…</text>
      <line class="sep" x1="16" y1="84" x2="206" y2="84"/>
      <text class="t" x="16" y="118">Delete</text>
      <text class="muted" x="78" y="118">(if unused)</text>
    </g>

    <text class="muted" x="18" y="430">Relink is an explicit post-import workflow (no YAML edits needed).</text>
  </g>

  <!-- Relink modal -->
  <g transform="translate(650,180)">
    <rect class="modal" x="0" y="0" width="706" height="540" rx="16"/>
    <text class="h" x="22" y="38">Relink Asset</text>
    <text class="t" x="22" y="66">Asset:</text>
    <text class="mono" x="74" y="66">image: hero_idle</text>

    <text class="t" x="22" y="104">Currently:</text>
    <text class="muted" x="104" y="104">Embedded (hero.png)</text>

    <line class="sep" x1="22" y1="122" x2="684" y2="122"/>

    <text class="h" x="22" y="156">New source</text>

    <rect class="btn2" x="22" y="172" width="662" height="42" rx="12"/>
    <text class="t" x="40" y="198">○ Embedded file</text>
    <rect class="btn" x="520" y="180" width="148" height="26" rx="10"/>
    <text class="t" x="548" y="199">Choose file…</text>

    <rect class="btn2" x="22" y="224" width="662" height="66" rx="12"/>
    <text class="t" x="40" y="250">● Asset path</text>
    <rect class="btn" x="40" y="258" width="628" height="24" rx="10"/>
    <text class="muted" x="52" y="275">/assets/images/hero.png</text>

    <text class="h" x="22" y="334">Apply to</text>
    <rect class="btn2" x="22" y="350" width="662" height="42" rx="12"/>
    <text class="t" x="40" y="376">● This asset only (keep assetId; references unchanged)</text>

    <rect class="btn2" x="22" y="402" width="662" height="42" rx="12"/>
    <text class="t" x="40" y="428">○ Create new assetId… (keep old; update selection only)</text>

    <rect class="btn" x="22" y="476" width="110" height="40" rx="12"/>
    <text class="t" x="54" y="502">Cancel</text>
    <rect class="btnOk" x="574" y="476" width="110" height="40" rx="12"/>
    <text class="t" x="606" y="502">Relink</text>

    <text class="muted" x="22" y="530">On load failure: show error and do not mutate state.</text>
  </g>
</svg>

