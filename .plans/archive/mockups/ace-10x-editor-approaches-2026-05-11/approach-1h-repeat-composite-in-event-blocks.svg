<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
        --warn:#ffb86a;
        --danger:#ff6a7a;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:800;}
      .label{fill:var(--muted); font-size:13px; font-weight:800;}
      .small{fill:var(--muted); font-size:12px;}
      .tiny{fill:var(--muted); font-size:11px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .divider{stroke:rgba(106,167,255,0.18); stroke-width:1;}

      .chip{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .chipAccent{fill:rgba(106,167,255,0.18); stroke:rgba(106,167,255,0.75); stroke-width:1;}
      .chipGreen{fill:rgba(124,240,199,0.10); stroke:rgba(124,240,199,0.9); stroke-width:1;}
      .chipWarn{fill:rgba(255,184,106,0.10); stroke:rgba(255,184,106,0.9); stroke-width:1;}

      .eventHdr{fill:rgba(106,167,255,0.14); stroke:rgba(106,167,255,0.9); stroke-width:1;}
      .actionRow{fill:rgba(124,240,199,0.08); stroke:rgba(124,240,199,0.65); stroke-width:1;}
      .untilRow{fill:rgba(255,184,106,0.10); stroke:rgba(255,184,106,0.85); stroke-width:1;}
      .compRow{fill:rgba(106,167,255,0.10); stroke:rgba(106,167,255,0.65); stroke-width:1;}
      .scopeLine{stroke:rgba(170,180,230,0.25); stroke-width:1;}

      .nodeText{fill:var(--text); font-size:12px; font-weight:900;}
      .nodeTextMuted{fill:var(--muted); font-size:12px; font-weight:800;}

      .callout{fill:rgba(124,240,199,0.10); stroke:var(--accent2); stroke-width:1; stroke-dasharray:6 6;}
      .calloutText{fill:var(--text); font-size:12px; font-weight:900;}

      .kbd{fill:#0a1124; stroke:#3b4a7a; stroke-width:1;}
      .shadow{filter:url(#shadow);}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="720" rx="16" fill="var(--bg)"/>
  <rect x="24" y="18" width="1152" height="54" rx="10" class="panel"/>
  <text x="46" y="50" class="title">Approach 1h — Repeat as a composite container inside Event Blocks</text>

  <!-- Left: Composite palette -->
  <rect x="24" y="90" width="320" height="606" rx="12" class="panel"/>
  <text x="46" y="122" class="label">Composites</text>
  <line x1="24" y1="140" x2="344" y2="140" class="divider"/>

  <rect x="46" y="156" width="276" height="30" rx="10" class="chip"/>
  <text x="58" y="176" class="nodeTextMuted">Search actions…</text>

  <rect x="46" y="214" width="276" height="34" rx="10" class="chipAccent"/>
  <text x="58" y="236" class="nodeText">Repeat</text>
  <text x="58" y="258" class="tiny">Loops children N times (or until optional guard)</text>

  <rect x="46" y="270" width="276" height="34" rx="10" class="chipAccent"/>
  <text x="58" y="292" class="nodeText">Parallel</text>
  <rect x="46" y="310" width="276" height="34" rx="10" class="chipAccent"/>
  <text x="58" y="332" class="nodeText">Sequence</text>

  <text x="46" y="382" class="small">Key UX rules</text>
  <text x="64" y="404" class="tiny">• Children actions still use their own “Until…”</text>
  <text x="64" y="424" class="tiny">• Repeat can also have an optional “Repeat until…” guard</text>
  <text x="64" y="444" class="tiny">• Collapsible to keep Event Blocks readable</text>

  <rect x="46" y="560" width="276" height="116" rx="12" class="callout"/>
  <text x="66" y="588" class="calloutText">Non-coder framing</text>
  <text x="66" y="610" class="tiny">Repeat is “do these steps, again”.</text>
  <text x="66" y="630" class="tiny">Each step says when it stops (Until…).</text>
  <text x="66" y="650" class="tiny">Optional: stop repeating early (Repeat until…).</text>

  <!-- Center: Event Blocks showing Repeat -->
  <rect x="368" y="90" width="808" height="606" rx="12" class="panel"/>
  <text x="392" y="122" class="label">Event Blocks — Player</text>
  <line x1="368" y1="140" x2="1176" y2="140" class="divider"/>

  <!-- Header controls -->
  <rect x="392" y="156" width="760" height="44" rx="12" class="panel2"/>
  <rect x="414" y="166" width="240" height="24" rx="8" class="chipAccent"/>
  <text x="428" y="184" class="nodeText">Add Action… (⌘K)</text>
  <rect x="662" y="166" width="200" height="24" rx="8" class="chip"/>
  <text x="674" y="184" class="nodeTextMuted">Add Until…</text>
  <rect x="870" y="166" width="282" height="24" rx="8" class="chip"/>
  <text x="882" y="184" class="nodeTextMuted">Convert selection → Snippet</text>

  <!-- Event -->
  <rect x="392" y="214" width="760" height="34" rx="10" class="eventHdr"/>
  <text x="412" y="236" class="nodeText">Event: On Hit</text>

  <!-- Repeat composite row -->
  <rect x="412" y="256" width="740" height="30" rx="10" class="compRow"/>
  <text x="432" y="276" class="nodeText">▾ Repeat ×3</text>
  <rect x="1036" y="260" width="54" height="22" rx="7" class="kbd"/>
  <text x="1046" y="276" class="tiny">⌥↩</text>
  <text x="1096" y="276" class="tiny">collapse</text>

  <!-- optional repeat guard -->
  <rect x="432" y="290" width="720" height="30" rx="10" class="untilRow"/>
  <text x="452" y="310" class="nodeText">Repeat until: Counter (hp == 0) (optional)</text>

  <!-- Indentation guides -->
  <line x1="428" y1="324" x2="428" y2="512" class="scopeLine"/>
  <line x1="448" y1="324" x2="448" y2="512" class="scopeLine"/>

  <!-- Child action 1 -->
  <rect x="456" y="328" width="696" height="30" rx="10" class="actionRow"/>
  <text x="476" y="348" class="nodeText">Action: Flash Tint (white)</text>
  <rect x="476" y="362" width="676" height="30" rx="10" class="untilRow"/>
  <text x="496" y="382" class="nodeText">Until: Time Elapsed (80ms)</text>

  <!-- Child action 2 -->
  <rect x="456" y="410" width="696" height="30" rx="10" class="actionRow"/>
  <text x="476" y="430" class="nodeText">Action: MoveUntil (knockback dx: -20)</text>
  <rect x="476" y="444" width="676" height="30" rx="10" class="untilRow"/>
  <text x="496" y="464" class="nodeText">Until: Time Elapsed (60ms)</text>

  <!-- Child action 3 -->
  <rect x="456" y="492" width="696" height="30" rx="10" class="actionRow"/>
  <text x="476" y="512" class="nodeText">Action: Play Sound (hit)</text>
  <rect x="476" y="526" width="676" height="30" rx="10" class="untilRow"/>
  <text x="496" y="546" class="nodeText">Until: Instant</text>

  <!-- Another example: Repeat forever via Counter/Duration -->
  <rect x="392" y="584" width="760" height="34" rx="10" class="eventHdr"/>
  <text x="412" y="606" class="nodeText">Event: On Update</text>
  <rect x="412" y="626" width="740" height="30" rx="10" class="compRow"/>
  <text x="432" y="646" class="nodeTextMuted">▸ Repeat ×∞ (shown collapsed) — “blink while invulnerable”</text>

  <!-- Popover: Repeat config -->
  <rect x="640" y="210" width="520" height="220" rx="14" class="panel shadow"/>
  <text x="664" y="244" class="nodeText">Configure Repeat</text>
  <rect x="664" y="258" width="472" height="30" rx="10" class="chip"/>
  <text x="676" y="278" class="nodeTextMuted">Times: 3</text>
  <rect x="664" y="292" width="472" height="30" rx="10" class="chip"/>
  <text x="676" y="312" class="nodeTextMuted">Mode: repeat children in order</text>
  <rect x="664" y="326" width="472" height="30" rx="10" class="chipWarn"/>
  <text x="676" y="346" class="nodeText">Optional: Repeat until… (advanced)</text>
  <rect x="664" y="368" width="472" height="34" rx="12" class="chipAccent"/>
  <text x="684" y="390" class="nodeText">Done</text>
</svg>

