<svg xmlns="http://www.w3.org/2000/svg" width="760" height="920" viewBox="0 0 760 920">
  <defs>
    <style>
      .bg { fill: #0f141a; }
      .shell { fill: #131a22; stroke: #24303a; stroke-width: 1; }
      .card { fill: #171f28; stroke: #2a3946; stroke-width: 1; }
      .divider { stroke: #2a3946; stroke-width: 1; }
      .title { font: 750 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #eaf0f6; }
      .section { font: 800 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #cfe1f0; letter-spacing: 0.02em; }
      .label { font: 650 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #b9c8d6; }
      .hint { font: 520 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #95a7b8; }
      .mono { font: 650 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New"; fill: #d7e2ee; }
      .inputBg { fill: #0f141a; stroke: #2a3946; stroke-width: 1; }
      .button { fill: #1a2632; stroke: #2a3946; stroke-width: 1; }
      .buttonPrimary { fill: #2f6feb; stroke: #4a86ff; stroke-width: 1; }
      .buttonDanger { fill: #2a1820; stroke: #4b2a35; stroke-width: 1; }
      .buttonText { font: 800 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #eaf0f6; }
      .badge { fill: #0f141a; stroke: #2a3946; stroke-width: 1; }
      .badgeOk { fill: #10261a; stroke: #235c3f; stroke-width: 1; }
      .badgeWarn { fill: #2a2316; stroke: #6b5a2b; stroke-width: 1; }
      .badgeText { font: 800 11px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #d7e2ee; }
      .badgeTextDark { font: 800 11px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #0f141a; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="760" height="920" />

  <!-- Cloud tab panel (context) -->
  <rect class="shell" x="40" y="32" width="680" height="856" rx="16" />
  <text class="title" x="72" y="70">Cloud</text>
  <text class="hint" x="72" y="92">Mockup: clearer separation between Account and Publish sections</text>
  <line class="divider" x1="64" y1="112" x2="696" y2="112" />

  <!-- Account card -->
  <rect class="card" x="64" y="136" width="632" height="248" rx="14" />
  <text class="section" x="88" y="168">ACCOUNT</text>

  <text class="label" x="88" y="204">Signed in</text>
  <rect class="inputBg" x="88" y="214" width="408" height="38" rx="10" />
  <text class="mono" x="104" y="238">bcorfman1@gmail.com</text>

  <rect class="buttonDanger" x="516" y="214" width="156" height="38" rx="10" />
  <text class="buttonText" x="594" y="238" text-anchor="middle">Log out</text>

  <text class="label" x="88" y="278">GitHub</text>
  <rect class="inputBg" x="88" y="288" width="248" height="38" rx="10" />
  <text class="mono" x="104" y="312">connected: bcorfman</text>

  <rect class="button" x="350" y="288" width="192" height="38" rx="10" />
  <text class="buttonText" x="446" y="312" text-anchor="middle">Switch GitHub…</text>

  <rect class="button" x="552" y="288" width="120" height="38" rx="10" />
  <text class="buttonText" x="612" y="312" text-anchor="middle">Disconnect</text>

  <text class="hint" x="88" y="354">GitHub authorization is required for publishing to GitHub Pages.</text>

  <!-- Publish card -->
  <rect class="card" x="64" y="408" width="632" height="420" rx="14" />
  <text class="section" x="88" y="440">PUBLISH (GITHUB PAGES)</text>

  <!-- Prereqs row -->
  <text class="label" x="88" y="472">Prereqs</text>

  <rect class="badgeOk" x="160" y="456" width="104" height="26" rx="13" />
  <text class="badgeText" x="212" y="474" text-anchor="middle">Signed in</text>

  <rect class="badgeOk" x="274" y="456" width="140" height="26" rx="13" />
  <text class="badgeText" x="344" y="474" text-anchor="middle">GitHub linked</text>

  <rect class="badgeWarn" x="424" y="456" width="176" height="26" rx="13" />
  <text class="badgeText" x="512" y="474" text-anchor="middle">Embedded assets only</text>

  <text class="hint" x="88" y="508">Publishes to</text>
  <text class="mono" x="172" y="508">https://bcorfman.github.io/&lt;route&gt;/</text>

  <line class="divider" x1="88" y1="530" x2="672" y2="530" />

  <!-- Form fields -->
  <text class="label" x="88" y="566">Route</text>
  <rect class="inputBg" x="88" y="576" width="392" height="40" rx="10" />
  <text class="mono" x="104" y="602">mygame</text>

  <rect class="buttonPrimary" x="496" y="576" width="176" height="40" rx="10" />
  <text class="buttonText" x="584" y="602" text-anchor="middle">Publish</text>

  <text class="hint" x="88" y="642">If the URL already exists, confirm overwrite.</text>

  <text class="label" x="88" y="682">Last publish</text>
  <rect class="inputBg" x="88" y="692" width="584" height="44" rx="10" />
  <text class="hint" x="104" y="720">Never published from this device.</text>

  <line class="divider" x1="88" y1="760" x2="672" y2="760" />

  <text class="hint" x="88" y="794">Design intent: explicit section headers + prereq badges reduce “jammed” feeling and</text>
  <text class="hint" x="88" y="812">keep account state and publish workflow in the same tab without visual ambiguity.</text>
</svg>
