<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1040" viewBox="0 0 1680 1040">
  <defs>
    <style>
      .bg { fill: #efe7db; }
      .shell { fill: #faf7f1; stroke: #d2c1a9; stroke-width: 2; }
      .panel { fill: #fbf8f2; stroke: #d3c2aa; stroke-width: 2; }
      .panelSoft { fill: #f3ece0; stroke: #d3c2aa; stroke-width: 2; }
      .tabOn { fill: #d8eef0; stroke: #7db0b6; stroke-width: 2; }
      .btn { fill: #fffdfa; stroke: #d3c2aa; stroke-width: 2; }
      .btnBlue { fill: #3e6bbb; stroke: #6e94d4; stroke-width: 2; }
      .menu { fill: #fffdfa; stroke: #d3c2aa; stroke-width: 2; }
      .callout { fill: #fff2c7; stroke: #c89b2a; stroke-width: 2; }
      .line { stroke: #c89b2a; stroke-width: 2.5; fill: none; }
      .brand { font: 800 34px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #24303d; }
      .title { font: 800 28px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #26313f; }
      .h { font: 760 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; letter-spacing: .12em; fill: #607082; }
      .label { font: 650 15px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #667687; }
      .text { font: 620 17px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #2e3947; }
      .strong { font: 760 20px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #2a3442; }
      .small { font: 550 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #728294; }
      .mono { font: 620 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #2d3845; }
      .callText { font: 620 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #5a430b; }
      .num { font: 800 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #5a430b; }
    </style>
  </defs>

  <rect class="bg" width="1680" height="1040" />
  <text class="title" x="48" y="56">Project Tree With Manage Menu</text>

  <rect class="shell" x="42" y="84" width="1596" height="900" rx="28" />
  <text class="h" x="72" y="122">BROWSER EDITOR</text>
  <text class="brand" x="72" y="162">PhaserForge</text>
  <rect class="tabOn" x="320" y="132" width="108" height="34" rx="17" />
  <text class="text" x="374" y="154" text-anchor="middle">Online</text>
  <text class="small" x="72" y="202">Single-tree model: project at the root, scenes underneath, no separate Scene or Project tabs.</text>

  <rect class="panel" x="70" y="240" width="420" height="700" rx="24" />
  <text class="h" x="98" y="286">PROJECT TREE</text>
  <rect class="btn" x="346" y="256" width="116" height="54" rx="18" />
  <text class="strong" x="404" y="290" text-anchor="middle">Manage</text>

  <rect class="panelSoft" x="98" y="334" width="364" height="112" rx="20" />
  <text class="strong" x="124" y="376">▾ Pattern Demo Playground</text>
  <text class="small" x="124" y="406">project root • 3 scenes • autosaved</text>
  <text class="small" x="124" y="428">rename uses the same inline behavior as scene rename</text>

  <text class="h" x="124" y="486">SCENES</text>
  <rect class="tabOn" x="124" y="510" width="312" height="50" rx="18" />
  <text class="text" x="150" y="543">Main Menu</text>
  <text class="small" x="410" y="543" text-anchor="end">…</text>

  <rect class="btn" x="144" y="572" width="292" height="50" rx="18" />
  <text class="text" x="170" y="605">Level 01</text>
  <text class="small" x="410" y="605" text-anchor="end">…</text>

  <rect class="btn" x="144" y="634" width="292" height="50" rx="18" />
  <text class="text" x="170" y="667">Boss Arena</text>
  <text class="small" x="410" y="667" text-anchor="end">…</text>

  <rect class="btn" x="304" y="714" width="132" height="52" rx="18" />
  <text class="strong" x="370" y="748" text-anchor="middle">+ Add</text>

  <rect class="menu" x="316" y="320" width="188" height="190" rx="18" />
  <text class="text" x="342" y="362">Rename</text>
  <line x1="336" y1="380" x2="484" y2="380" stroke="#e6d7c2" stroke-width="2" />
  <text class="text" x="342" y="414">History</text>
  <line x1="336" y1="432" x2="484" y2="432" stroke="#e6d7c2" stroke-width="2" />
  <text class="text" x="342" y="466">Clear Project ...</text>
  <text class="small" x="342" y="492">same effect as current</text>

  <rect class="panel" x="520" y="240" width="618" height="700" rx="24" />
  <rect class="panelSoft" x="548" y="268" width="562" height="644" rx="20" />
  <text class="small" x="829" y="578" text-anchor="middle">Canvas remains visible here</text>
  <text class="small" x="829" y="604" text-anchor="middle">scene content for current selection</text>

  <rect class="panel" x="1168" y="240" width="440" height="700" rx="24" />
  <text class="h" x="1196" y="286">CLOUD / PUBLISH</text>
  <rect class="panelSoft" x="1196" y="314" width="384" height="292" rx="20" />
  <text class="label" x="1220" y="354">Project Name</text>
  <rect x="1220" y="370" width="336" height="52" rx="16" fill="#fffdfa" stroke="#d3c2aa" stroke-width="2" />
  <text class="mono" x="1240" y="402">Pattern Demo Playground</text>
  <text class="small" x="1220" y="448">working title inside the editor</text>

  <text class="label" x="1220" y="490">Publish Name / Release Slug</text>
  <rect x="1220" y="506" width="336" height="52" rx="16" fill="#fffdfa" stroke="#d3c2aa" stroke-width="2" />
  <text class="mono" x="1240" y="538">pattern-demo</text>
  <text class="small" x="1220" y="584">used only for publishing</text>

  <rect class="panelSoft" x="1196" y="632" width="384" height="150" rx="20" />
  <text class="label" x="1220" y="672">Current Selection</text>
  <text class="strong" x="1220" y="706">Main Menu</text>
  <text class="small" x="1220" y="736">Scene settings, entities, actions, and properties stay accessible.</text>

  <rect class="callout" x="1406" y="100" width="208" height="150" rx="18" />
  <circle cx="1434" cy="128" r="16" fill="#fff2c7" stroke="#c89b2a" stroke-width="2"/>
  <text class="num" x="1434" y="134" text-anchor="middle">1</text>
  <text class="callText" x="1462" y="130">The separate `Scene` and</text>
  <text class="callText" x="1462" y="152">`Project` tabs are gone.</text>
  <text class="callText" x="1462" y="174">Everything starts in the</text>
  <text class="callText" x="1462" y="196">Project Tree.</text>
  <path class="line" d="M1406 200 C1320 200, 1210 256, 486 278" />

  <rect class="callout" x="1406" y="326" width="208" height="154" rx="18" />
  <circle cx="1434" cy="354" r="16" fill="#fff2c7" stroke="#c89b2a" stroke-width="2"/>
  <text class="num" x="1434" y="360" text-anchor="middle">2</text>
  <text class="callText" x="1462" y="356">With the tab row reclaimed,</text>
  <text class="callText" x="1462" y="378">`Manage` sits where users</text>
  <text class="callText" x="1462" y="400">already expect a top-right</text>
  <text class="callText" x="1462" y="422">tree action next to the title.</text>
  <path class="line" d="M1406 432 C1330 432, 1228 310, 462 282" />

  <rect class="callout" x="1406" y="572" width="208" height="180" rx="18" />
  <circle cx="1434" cy="600" r="16" fill="#fff2c7" stroke="#c89b2a" stroke-width="2"/>
  <text class="num" x="1434" y="606" text-anchor="middle">3</text>
  <text class="callText" x="1462" y="602">The menu is intentionally</text>
  <text class="callText" x="1462" y="624">small: `Rename`, `History`,</text>
  <text class="callText" x="1462" y="646">and `Clear Project ...`.</text>
  <text class="callText" x="1462" y="668">This keeps the project root</text>
  <text class="callText" x="1462" y="690">lightweight.</text>
  <path class="line" d="M1406 694 C1320 694, 1236 444, 504 414" />

  <rect class="callout" x="1406" y="782" width="208" height="132" rx="18" />
  <circle cx="1434" cy="810" r="16" fill="#fff2c7" stroke="#c89b2a" stroke-width="2"/>
  <text class="num" x="1434" y="816" text-anchor="middle">4</text>
  <text class="callText" x="1462" y="812">Project title and publish</text>
  <text class="callText" x="1462" y="834">name stay separate here too:</text>
  <text class="callText" x="1462" y="856">editor identity vs release</text>
  <text class="callText" x="1462" y="878">identity.</text>
  <path class="line" d="M1406 850 C1334 850, 1280 540, 1556 532" />
</svg>
