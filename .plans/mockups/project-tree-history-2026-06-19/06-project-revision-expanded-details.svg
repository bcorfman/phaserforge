<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1040" viewBox="0 0 1680 1040">
  <defs>
    <style>
      .bg { fill: #efe7db; }
      .shell { fill: #faf7f1; stroke: #d2c1a9; stroke-width: 2; }
      .panel { fill: #fbf8f2; stroke: #d3c2aa; stroke-width: 2; }
      .panelSoft { fill: #f3ece0; stroke: #d3c2aa; stroke-width: 2; }
      .panelActive { fill: #e8f0f2; stroke: #7db0b6; stroke-width: 2; }
      .btn { fill: #fffdfa; stroke: #d3c2aa; stroke-width: 2; }
      .btnBlue { fill: #3e6bbb; stroke: #6e94d4; stroke-width: 2; }
      .pill { fill: #e9e1d4; stroke: #cdbca3; stroke-width: 1.5; }
      .callout { fill: #fff2c7; stroke: #c89b2a; stroke-width: 2; }
      .line { stroke: #c89b2a; stroke-width: 2.5; fill: none; }
      .divider { stroke: #d8ccb8; stroke-width: 1.5; }
      .bullet { fill: #3d6c74; }
      .brand { font: 800 34px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #24303d; }
      .title { font: 800 28px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #26313f; }
      .h { font: 760 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; letter-spacing: .12em; fill: #607082; }
      .label { font: 650 15px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #667687; }
      .text { font: 620 17px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #2e3947; }
      .strong { font: 760 20px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #2a3442; }
      .small { font: 550 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #728294; }
      .callText { font: 620 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #5a430b; }
      .num { font: 800 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #5a430b; }
      .mono { font: 600 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #5c6a76; }
    </style>
  </defs>

  <rect class="bg" width="1680" height="1040" />
  <text class="title" x="48" y="56">Project Revisions Pane With Expandable Full Change Details</text>

  <rect class="shell" x="42" y="84" width="1596" height="900" rx="28" />
  <text class="h" x="72" y="122">BROWSER EDITOR</text>
  <text class="brand" x="72" y="162">PhaserForge</text>
  <text class="small" x="72" y="202">Each revision row keeps its concise summary, but a left chevron expands inline to show the full change list as bullets.</text>

  <rect class="panel" x="70" y="240" width="620" height="700" rx="24" />
  <text class="strong" x="98" y="290">←</text>
  <text class="h" x="132" y="286">PROJECT REVISIONS</text>

  <rect class="panelSoft" x="98" y="334" width="564" height="112" rx="20" />
  <text class="strong" x="120" y="376">▸</text>
  <text class="strong" x="158" y="376">Pattern Demo</text>
  <text class="text" x="158" y="408">Set publish repo to zoof</text>
  <rect class="pill" x="158" y="420" width="146" height="24" rx="12" />
  <text class="small" x="231" y="437" text-anchor="middle">+2 more changes</text>
  <text class="strong" x="626" y="404" text-anchor="end">Jun 27, 10:22 PM</text>

  <rect class="btnBlue" x="120" y="462" width="124" height="36" rx="16" />
  <text class="text" x="182" y="486" text-anchor="middle" fill="#ffffff">Restore...</text>
  <rect class="btn" x="256" y="462" width="94" height="36" rx="16" />
  <text class="text" x="303" y="486" text-anchor="middle">Copy...</text>

  <rect class="panelActive" x="98" y="522" width="564" height="252" rx="20" />
  <text class="strong" x="120" y="564">▾</text>
  <text class="strong" x="158" y="564">Pattern Demo</text>
  <text class="text" x="158" y="596">Renamed to Pattern Demo</text>
  <text class="strong" x="626" y="592" text-anchor="end">Jun 27, 10:22 PM</text>

  <line class="divider" x1="120" y1="620" x2="640" y2="620" />
  <text class="label" x="158" y="648">Full revision details</text>
  <text class="small" x="158" y="670">Expanded inline under the summary so the user never leaves the history list.</text>

  <circle class="bullet" cx="136" cy="706" r="5" />
  <text class="text" x="158" y="712">Project title changed from <tspan class="mono">Untitled Project</tspan> to <tspan class="mono">Pattern Demo</tspan></text>
  <circle class="bullet" cx="136" cy="740" r="5" />
  <text class="text" x="158" y="746">Publish title set to <tspan class="mono">Pattern Demo</tspan></text>
  <circle class="bullet" cx="136" cy="774" r="5" />
  <text class="text" x="158" y="780">Publish repo set to <tspan class="mono">zoof</tspan></text>

  <rect class="btnBlue" x="120" y="790" width="124" height="36" rx="16" />
  <text class="text" x="182" y="814" text-anchor="middle" fill="#ffffff">Restore...</text>
  <rect class="btn" x="256" y="790" width="94" height="36" rx="16" />
  <text class="text" x="303" y="814" text-anchor="middle">Copy...</text>

  <rect class="panelSoft" x="98" y="852" width="564" height="60" rx="18" />
  <text class="text" x="120" y="890">Initial snapshot · 1 scene · 15 entities</text>
  <text class="small" x="626" y="890" text-anchor="end">Jun 27, 10:21 PM</text>

  <rect class="panel" x="730" y="240" width="548" height="700" rx="24" />
  <text class="h" x="760" y="286">INTERACTION NOTES</text>

  <rect class="panelSoft" x="760" y="320" width="488" height="176" rx="20" />
  <text class="strong" x="788" y="362">Collapsed Row</text>
  <text class="text" x="788" y="394">Chevron points right.</text>
  <text class="text" x="788" y="424">Only the concise summary and timestamp are shown.</text>
  <text class="text" x="788" y="454">Restore / Copy stay directly below the row.</text>

  <rect class="panelSoft" x="760" y="524" width="488" height="238" rx="20" />
  <text class="strong" x="788" y="566">Expanded Row</text>
  <text class="text" x="788" y="598">Chevron rotates down and the same row grows vertically.</text>
  <text class="text" x="788" y="628">The full revision list appears as bullets, not prose blocks.</text>
  <text class="text" x="788" y="658">Actions remain attached to that revision item instead of moving elsewhere.</text>
  <text class="text" x="788" y="688">This keeps the summary-first scan while making detail inspection one click.</text>

  <rect class="panel" x="1310" y="240" width="298" height="700" rx="24" />

  <rect class="callout" x="1340" y="286" width="238" height="178" rx="18" />
  <circle cx="1370" cy="316" r="16" fill="#fff2c7" stroke="#c89b2a" stroke-width="2" />
  <text class="num" x="1370" y="322" text-anchor="middle">1</text>
  <text class="callText" x="1398" y="318">Chevron sits at the far left</text>
  <text class="callText" x="1398" y="340">of the row, so expand/collapse</text>
  <text class="callText" x="1398" y="362">becomes a fast near-cursor action.</text>
  <text class="callText" x="1398" y="394">The collapsed row also carries</text>
  <text class="callText" x="1398" y="416">a small “+2 more changes” teaser</text>
  <text class="callText" x="1398" y="438">so hidden detail is explicit.</text>
  <path class="line" d="M1340 418 C1288 418, 1180 430, 230 432" />

  <rect class="callout" x="1340" y="502" width="238" height="194" rx="18" />
  <circle cx="1370" cy="532" r="16" fill="#fff2c7" stroke="#c89b2a" stroke-width="2" />
  <text class="num" x="1370" y="538" text-anchor="middle">2</text>
  <text class="callText" x="1398" y="534">Bullets show the complete revision</text>
  <text class="callText" x="1398" y="556">list directly in the pane, which</text>
  <text class="callText" x="1398" y="578">matches the “full revision list” goal</text>
  <text class="callText" x="1398" y="600">without replacing the compact row.</text>
  <text class="callText" x="1398" y="632">If a revision is very long, the list</text>
  <text class="callText" x="1398" y="654">can later cap height and scroll inside</text>
  <text class="callText" x="1398" y="676">the expanded section.</text>
  <path class="line" d="M1340 640 C1288 640, 1180 698, 136 740" />

  <rect class="callout" x="1340" y="728" width="238" height="164" rx="18" />
  <circle cx="1370" cy="758" r="16" fill="#fff2c7" stroke="#c89b2a" stroke-width="2" />
  <text class="num" x="1370" y="764" text-anchor="middle">3</text>
  <text class="callText" x="1398" y="760">Single-item revisions stay plain:</text>
  <text class="callText" x="1398" y="782">no chevron, no teaser pill, just</text>
  <text class="callText" x="1398" y="804">the one summary line because there</text>
  <text class="callText" x="1398" y="826">is nothing extra to reveal.</text>
  <path class="line" d="M1340 812 C1286 812, 1160 874, 120 888" />
</svg>
