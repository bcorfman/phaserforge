<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620">
  <defs>
    <style>
      .bg { fill: #1e1f22; }
      .panel { fill: #2b2d31; stroke: #3b3f45; stroke-width: 1; }
      .panel2 { fill: #25272c; stroke: #3b3f45; stroke-width: 1; }
      .title { font: 700 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #e8e8e8; }
      .label { font: 600 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #cfcfcf; }
      .hint { font: 500 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #a7abb3; }
      .inputBg { fill: #1f2227; stroke: #3b3f45; stroke-width: 1; }
      .inputText { font: 600 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New"; fill: #e8e8e8; }
      .button { fill: #3b3f45; stroke: #51565f; stroke-width: 1; }
      .buttonPrimary { fill: #2f6feb; stroke: #4a86ff; stroke-width: 1; }
      .buttonText { font: 700 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #f3f3f3; }
      .divider { stroke: #3b3f45; stroke-width: 1; }
      .chip { fill: #1f2227; stroke: #3b3f45; stroke-width: 1; }
      .chipActive { fill: #3b3f45; stroke: #6a707a; stroke-width: 1; }
      .chipText { font: 700 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #e8e8e8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="980" height="620" />

  <rect class="panel" x="40" y="36" width="900" height="548" rx="10" />
  <text class="hint" x="64" y="70">Inspector ▸ Attachment ▸ Move Until ▸ Bounds</text>
  <line class="divider" x1="60" y1="88" x2="920" y2="88" />

  <!-- Move Until block -->
  <rect class="panel2" x="60" y="108" width="860" height="92" rx="10" />
  <text class="title" x="84" y="142">Move Until</text>
  <text class="label" x="84" y="172">Velocity X</text>
  <rect class="inputBg" x="150" y="156" width="140" height="34" rx="8" />
  <text class="inputText" x="164" y="178">0</text>
  <text class="label" x="320" y="172">Velocity Y</text>
  <rect class="inputBg" x="386" y="156" width="140" height="34" rx="8" />
  <text class="inputText" x="400" y="178">-4</text>
  <text class="hint" x="548" y="178">constant-speed segment (phase loop handled elsewhere)</text>

  <!-- Bounds block -->
  <rect class="panel2" x="60" y="214" width="860" height="340" rx="10" />
  <text class="title" x="84" y="248">Bounds (BoundsHit)</text>

  <text class="label" x="84" y="284">Enabled</text>
  <rect class="inputBg" x="150" y="268" width="60" height="28" rx="10" />
  <text class="inputText" x="180" y="288" text-anchor="middle">✓</text>

  <text class="label" x="240" y="284">Behavior</text>
  <rect class="inputBg" x="306" y="268" width="200" height="34" rx="8" />
  <text class="inputText" x="320" y="290">Wrap</text>

  <!-- New: Wrap callback -->
  <rect class="panel" x="84" y="316" width="812" height="220" rx="10" />
  <text class="title" x="108" y="350">On Wrap (new)</text>
  <text class="hint" x="108" y="372">Run a mini-script on boundary events (wrap/bounce/exit) for many gameplay uses</text>

  <text class="label" x="108" y="410">When</text>
  <rect class="chipActive" x="156" y="392" width="110" height="30" rx="10" />
  <text class="chipText" x="211" y="412" text-anchor="middle">Y Wrap</text>
  <rect class="chip" x="276" y="392" width="110" height="30" rx="10" />
  <text class="chipText" x="331" y="412" text-anchor="middle">X Wrap</text>
  <rect class="chip" x="396" y="392" width="140" height="30" rx="10" />
  <text class="chipText" x="466" y="412" text-anchor="middle">Any Wrap</text>

  <text class="label" x="560" y="410">Scope</text>
  <rect class="chipActive" x="608" y="392" width="130" height="30" rx="10" />
  <text class="chipText" x="673" y="412" text-anchor="middle">Per Member</text>
  <rect class="chip" x="748" y="392" width="120" height="30" rx="10" />
  <text class="chipText" x="808" y="412" text-anchor="middle">Group</text>

  <text class="label" x="108" y="458">Script</text>
  <rect class="panel2" x="108" y="468" width="760" height="52" rx="10" />
  <text class="inputText" x="126" y="498">Set Position: x = rand(bounds.minX,bounds.maxX), y = exitSide == Top ? bounds.maxY : bounds.minY</text>

  <rect class="button" x="108" y="530" width="230" height="36" rx="10" />
  <text class="buttonText" x="223" y="554" text-anchor="middle">+ Add Step…</text>
  <rect class="buttonPrimary" x="638" y="530" width="230" height="36" rx="10" />
  <text class="buttonText" x="753" y="554" text-anchor="middle">Apply</text>

  <text class="hint" x="40" y="606">General feature: boundary behaviors should support optional event hooks to author respawn, teleport, scoring, VFX, etc. without code.</text>
</svg>
