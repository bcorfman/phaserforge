<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620">
  <defs>
    <style>
      .bg { fill: #1e1f22; }
      .panel { fill: #2b2d31; stroke: #3b3f45; stroke-width: 1; }
      .panel2 { fill: #25272c; stroke: #3b3f45; stroke-width: 1; }
      .title { font: 700 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #e8e8e8; }
      .label { font: 600 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #cfcfcf; }
      .hint { font: 500 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #a7abb3; }
      .inputBg { fill: #1f2227; stroke: #3b3f45; stroke-width: 1; }
      .inputText { font: 600 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New"; fill: #e8e8e8; }
      .button { fill: #3b3f45; stroke: #51565f; stroke-width: 1; }
      .buttonPrimary { fill: #2f6feb; stroke: #4a86ff; stroke-width: 1; }
      .buttonText { font: 700 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #f3f3f3; }
      .divider { stroke: #3b3f45; stroke-width: 1; }
      .chip { fill: #1f2227; stroke: #3b3f45; stroke-width: 1; }
      .chipActive { fill: #3b3f45; stroke: #6a707a; stroke-width: 1; }
      .chipText { font: 700 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #e8e8e8; }
      .swatch { stroke: #3b3f45; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="980" height="620" />

  <rect class="panel" x="36" y="36" width="908" height="548" rx="10" />
  <text class="hint" x="58" y="70">Inspector ▸ Attachment ▸ Randomize Properties</text>
  <line class="divider" x1="56" y1="88" x2="924" y2="88" />

  <text class="title" x="58" y="122">Randomize Properties (per-instance)</text>
  <text class="hint" x="58" y="144">No-code per-instance variation (enemies, loot, particles, decor, etc.)</text>

  <!-- Target + scope -->
  <text class="label" x="58" y="182">Target</text>
  <rect class="inputBg" x="58" y="190" width="430" height="34" rx="8" />
  <text class="inputText" x="72" y="212">Collection: targets</text>

  <text class="label" x="510" y="182">Apply To</text>
  <rect class="chipActive" x="510" y="190" width="120" height="30" rx="10" />
  <text class="chipText" x="570" y="210" text-anchor="middle">Members</text>
  <rect class="chip" x="640" y="190" width="120" height="30" rx="10" />
  <text class="chipText" x="700" y="210" text-anchor="middle">Group</text>
  <text class="hint" x="772" y="210">unique per instance</text>

  <!-- Seed controls -->
  <text class="label" x="58" y="238">Random Seed</text>
  <rect class="inputBg" x="140" y="222" width="140" height="34" rx="8" />
  <text class="inputText" x="154" y="244">12345</text>
  <rect class="button" x="290" y="222" width="120" height="34" rx="10" />
  <text class="buttonText" x="350" y="244" text-anchor="middle">Re-roll</text>
  <rect class="chipActive" x="420" y="226" width="160" height="30" rx="10" />
  <text class="chipText" x="500" y="246" text-anchor="middle">Deterministic</text>
  <text class="hint" x="592" y="244">same seed → same result</text>

  <!-- Rules list -->
  <rect class="panel2" x="58" y="266" width="866" height="248" rx="10" />
  <text class="label" x="78" y="296">Rules</text>
  <text class="hint" x="78" y="316">Each rule applies to each member using the same seed stream</text>

  <!-- Rule 1: color -->
  <rect class="panel" x="78" y="334" width="826" height="92" rx="10" />
  <text class="label" x="98" y="364">Rule 1</text>
  <rect class="chipActive" x="160" y="326" width="200" height="30" rx="10" />
  <text class="chipText" x="260" y="346" text-anchor="middle">Set Tint Color</text>

  <text class="label" x="390" y="342">Mode</text>
  <rect class="inputBg" x="430" y="326" width="250" height="34" rx="8" />
  <text class="inputText" x="444" y="348">Random between colors</text>

  <text class="label" x="390" y="384">Min</text>
  <rect class="inputBg" x="430" y="368" width="120" height="34" rx="8" />
  <text class="inputText" x="444" y="390">#141414</text>
  <rect class="swatch" x="556" y="374" width="22" height="22" rx="6" fill="#141414" />

  <text class="label" x="590" y="384">Max</text>
  <rect class="inputBg" x="630" y="368" width="120" height="34" rx="8" />
  <text class="inputText" x="644" y="390">#FFFFFF</text>
  <rect class="swatch" x="756" y="374" width="22" height="22" rx="6" fill="#ffffff" />

  <rect class="swatch" x="694" y="330" width="22" height="22" rx="6" fill="#f7d33d" />
  <rect class="swatch" x="722" y="330" width="22" height="22" rx="6" fill="#6fe0ff" />
  <rect class="swatch" x="750" y="330" width="22" height="22" rx="6" fill="#ff6fd2" />
  <rect class="swatch" x="778" y="330" width="22" height="22" rx="6" fill="#9dff6f" />
  <text class="hint" x="814" y="348">preview</text>

  <!-- Rule 2: position -->
  <rect class="panel" x="78" y="438" width="826" height="72" rx="10" />
  <text class="label" x="98" y="468">Rule 2</text>
  <rect class="chipActive" x="160" y="416" width="200" height="30" rx="10" />
  <text class="chipText" x="260" y="436" text-anchor="middle">Set Position</text>

  <text class="label" x="390" y="432">Region</text>
  <rect class="inputBg" x="440" y="416" width="140" height="34" rx="8" />
  <text class="inputText" x="454" y="438">World bounds</text>

  <text class="label" x="598" y="432">Keep inside</text>
  <rect class="chipActive" x="670" y="418" width="120" height="30" rx="10" />
  <text class="chipText" x="730" y="438" text-anchor="middle">Yes</text>
  <text class="hint" x="802" y="438">optional: X only / Y only</text>

  <!-- Bottom actions -->
  <rect class="panel2" x="58" y="530" width="866" height="54" rx="10" />
  <rect class="button" x="78" y="542" width="220" height="32" rx="10" />
  <text class="buttonText" x="188" y="564" text-anchor="middle">+ Add Rule</text>

  <rect class="buttonPrimary" x="704" y="542" width="200" height="32" rx="10" />
  <text class="buttonText" x="804" y="564" text-anchor="middle">Apply</text>

  <text class="hint" x="36" y="606">No-code goal: randomization configured via dropdowns + min/max fields + seeds (no expressions required).</text>
</svg>
