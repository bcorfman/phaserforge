<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
        --warn:#ffb86a;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:700;}
      .label{fill:var(--muted); font-size:13px;}
      .small{fill:var(--muted); font-size:12px;}
      .tiny{fill:var(--muted); font-size:11px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .btn{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .btnPrimary{fill:rgba(106,167,255,0.18); stroke:var(--accent); stroke-width:1;}
      .btnText{fill:var(--text); font-size:12px; font-weight:700;}
      .btnTextMuted{fill:var(--muted); font-size:12px; font-weight:700;}
      .field{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
      .rowActive{fill:rgba(106,167,255,0.14); stroke:rgba(106,167,255,0.65); stroke-width:1;}
      .fieldText{fill:var(--text); font-size:12px; font-weight:600;}
      .divider{stroke:rgba(106,167,255,0.18); stroke-width:1;}
      .badgeG{fill:rgba(124,240,199,0.12); stroke:rgba(124,240,199,0.75); stroke-width:1;}
      .badgeS{fill:rgba(106,167,255,0.12); stroke:rgba(106,167,255,0.55); stroke-width:1;}
      .badgeText{fill:var(--text); font-size:10px; font-weight:900;}
      .callout{fill:rgba(124,240,199,0.10); stroke:var(--accent2); stroke-width:1; stroke-dasharray:6 6;}
      .calloutText{fill:var(--text); font-size:12px; font-weight:800;}
      .dot{fill:rgba(170,180,230,0.75);}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" rx="16" fill="var(--bg)"/>

  <!-- Top toolbar -->
  <rect x="24" y="18" width="1152" height="54" rx="10" class="panel"/>
  <text x="44" y="50" class="title">Editor IA Proposal — Idea A: Scene Tree + Project Library (Mockup)</text>

  <!-- App body columns -->
  <rect x="24" y="86" width="336" height="610" rx="12" class="panel"/>
  <rect x="372" y="86" width="516" height="610" rx="12" class="panel"/>
  <rect x="900" y="86" width="276" height="610" rx="12" class="panel"/>

  <text x="44" y="118" class="label">Sidebar</text>
  <text x="392" y="118" class="label">Canvas</text>
  <text x="920" y="118" class="label">Inspector</text>

  <!-- Left: Scene selector -->
  <rect x="44" y="140" width="296" height="34" rx="10" class="field"/>
  <text x="58" y="162" class="fieldText">Current Scene: scene-1</text>

  <!-- Left: Tree header -->
  <rect x="44" y="190" width="296" height="34" rx="10" class="field"/>
  <text x="58" y="212" class="fieldText">Project Tree ▾</text>
  <line x1="44" y1="238" x2="340" y2="238" class="divider"/>

  <!-- Project (global) root -->
  <text x="44" y="264" class="label">Project (Global)</text>

  <rect x="44" y="282" width="296" height="30" rx="10" class="field"/>
  <text x="58" y="302" class="fieldText">▾ Sprites</text>
  <rect x="274" y="288" width="58" height="18" rx="9" class="badgeG"/>
  <text x="286" y="301" class="badgeText">LIB</text>

  <rect x="62" y="318" width="278" height="26" rx="10" class="field"/>
  <text x="78" y="336" class="tiny">player</text>
  <text x="300" y="336" class="tiny">1</text>

  <rect x="62" y="348" width="278" height="26" rx="10" class="field"/>
  <text x="78" y="366" class="tiny">enemy_ship</text>
  <text x="300" y="366" class="tiny">12</text>

  <rect x="62" y="380" width="132" height="28" rx="10" class="btnPrimary"/>
  <text x="80" y="399" class="btnText">Import…</text>
  <rect x="208" y="380" width="132" height="28" rx="10" class="btn"/>
  <text x="226" y="399" class="btnTextMuted">Manage</text>

  <rect x="44" y="420" width="296" height="30" rx="10" class="field"/>
  <text x="58" y="440" class="fieldText">▸ Audio</text>
  <rect x="274" y="426" width="58" height="18" rx="9" class="badgeG"/>
  <text x="286" y="439" class="badgeText">LIB</text>

  <rect x="44" y="456" width="296" height="30" rx="10" class="field"/>
  <text x="58" y="476" class="fieldText">▸ Input Maps</text>
  <rect x="274" y="462" width="58" height="18" rx="9" class="badgeG"/>
  <text x="286" y="475" class="badgeText">LIB</text>

  <line x1="44" y1="504" x2="340" y2="504" class="divider"/>
  <text x="44" y="528" class="label">Scenes</text>

  <!-- Scenes tree -->
  <rect x="44" y="546" width="296" height="30" rx="10" class="field"/>
  <text x="58" y="566" class="fieldText">▾ scene-1</text>
  <rect x="274" y="552" width="58" height="18" rx="9" class="badgeS"/>
  <text x="284" y="565" class="badgeText">SCENE</text>

  <!-- Children -->
  <rect x="62" y="582" width="278" height="26" rx="10" class="rowActive"/>
  <text x="78" y="600" class="tiny">Formations</text>
  <text x="300" y="600" class="tiny">3</text>

  <rect x="62" y="612" width="278" height="26" rx="10" class="field"/>
  <text x="78" y="630" class="tiny">Trigger Zones</text>
  <text x="300" y="630" class="tiny">0</text>

  <rect x="62" y="642" width="278" height="26" rx="10" class="field"/>
  <text x="78" y="660" class="tiny">Background Layers</text>
  <text x="300" y="660" class="tiny">0</text>

  <!-- Canvas placeholder -->
  <rect x="408" y="140" width="444" height="456" rx="12" class="panel2"/>
  <text x="420" y="170" class="small">Selection does not affect creation visibility; tree defines scope.</text>
  <circle cx="548" cy="320" r="6" class="dot"/>
  <circle cx="610" cy="270" r="6" class="dot"/>
  <circle cx="680" cy="330" r="6" class="dot"/>
  <circle cx="720" cy="420" r="6" class="dot"/>

  <!-- Inspector: selection-based -->
  <rect x="920" y="140" width="236" height="34" rx="10" class="field"/>
  <text x="936" y="162" class="fieldText">Formations (scene-1)</text>

  <rect x="920" y="188" width="236" height="136" rx="12" class="panel2"/>
  <text x="936" y="214" class="small">List</text>
  <rect x="936" y="232" width="204" height="28" rx="10" class="field"/>
  <text x="948" y="251" class="tiny">Formation 1</text>
  <rect x="936" y="264" width="204" height="28" rx="10" class="field"/>
  <text x="948" y="283" class="tiny">Formation 2</text>
  <rect x="936" y="296" width="204" height="28" rx="10" class="field"/>
  <text x="948" y="315" class="tiny">Formation 3</text>

  <rect x="920" y="340" width="236" height="34" rx="10" class="btnPrimary"/>
  <text x="990" y="362" class="btnText">+ New Formation</text>
  <text x="920" y="404" class="tiny">“Create Formation” is always discoverable when Formations node is selected.</text>

  <!-- Callouts for the three problems -->
  <rect x="372" y="610" width="516" height="86" rx="12" class="callout"/>
  <text x="392" y="636" class="calloutText">Resolves:</text>
  <text x="392" y="658" class="tiny">1) Visual hierarchy via tree indentation + LIB/SCENE badges.</text>
  <text x="392" y="676" class="tiny">2) Formation creation anchored to Scene ▸ Formations node (not empty selection).</text>
  <text x="392" y="694" class="tiny">3) Sprite import is Project ▸ Sprites (global), usable across scenes.</text>
</svg>

