<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
        --warn:#ffb86a;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:700;}
      .label{fill:var(--muted); font-size:13px;}
      .small{fill:var(--muted); font-size:12px;}
      .tiny{fill:var(--muted); font-size:11px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .btn{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .btnPrimary{fill:rgba(106,167,255,0.18); stroke:var(--accent); stroke-width:1;}
      .btnText{fill:var(--text); font-size:12px; font-weight:700;}
      .btnTextMuted{fill:var(--muted); font-size:12px; font-weight:700;}
      .field{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
      .fieldText{fill:var(--text); font-size:12px; font-weight:600;}
      .divider{stroke:rgba(106,167,255,0.18); stroke-width:1;}
      .chip{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .chipActive{fill:rgba(106,167,255,0.18); stroke:rgba(106,167,255,0.65); stroke-width:1;}
      .callout{fill:rgba(255,184,106,0.12); stroke:var(--warn); stroke-width:1; stroke-dasharray:6 6;}
      .calloutText{fill:var(--text); font-size:12px; font-weight:800;}
      .entity{fill:#1a254a; stroke:#2a3764; stroke-width:1;}
      .groupHull{fill:rgba(124,240,199,0.08); stroke:var(--accent2); stroke-width:2;}
      .foldHeader{fill:#0b1226; stroke:#3b4a7a; stroke-width:1;}
      .foldTitle{fill:var(--text); font-size:12px; font-weight:800;}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" rx="16" fill="var(--bg)"/>

  <!-- Top toolbar -->
  <rect x="24" y="18" width="1152" height="54" rx="10" class="panel"/>
  <text x="44" y="50" class="title">Interactive Play Mode Runtime — Phase 4: Call → scene.goto</text>

  <rect x="800" y="30" width="92" height="30" rx="10" class="chipActive"/>
  <text x="828" y="50" class="btnText">Edit</text>
  <rect x="896" y="30" width="92" height="30" rx="10" class="chip"/>
  <text x="925" y="50" class="btnTextMuted">Play</text>

  <!-- App body columns -->
  <rect x="24" y="86" width="336" height="610" rx="12" class="panel"/>
  <rect x="372" y="86" width="516" height="610" rx="12" class="panel"/>
  <rect x="900" y="86" width="276" height="610" rx="12" class="panel"/>

  <text x="44" y="118" class="label">Scene Graph</text>
  <text x="392" y="118" class="label">Canvas</text>
  <text x="920" y="118" class="label">Inspector</text>

  <!-- Simple graph -->
  <rect x="44" y="140" width="296" height="34" rx="10" class="field"/>
  <text x="58" y="162" class="fieldText">Scene: scene-1</text>
  <rect x="44" y="188" width="296" height="34" rx="10" class="field"/>
  <text x="58" y="210" class="fieldText">Formation: Enemy Formation</text>
  <rect x="44" y="232" width="296" height="34" rx="10" class="field"/>
  <text x="58" y="254" class="fieldText">Action: Drop (Call)</text>

  <!-- Canvas -->
  <rect x="408" y="170" width="444" height="410" rx="12" class="panel2"/>
  <rect x="470" y="240" width="320" height="210" rx="18" class="groupHull"/>
  <rect x="530" y="300" width="56" height="40" rx="8" class="entity"/>
  <rect x="610" y="300" width="56" height="40" rx="8" class="entity"/>
  <rect x="690" y="300" width="56" height="40" rx="8" class="entity"/>
  <text x="420" y="610" class="tiny">Selecting a Call attachment shows structured editor for `scene.goto` when applicable.</text>

  <!-- Inspector contents -->
  <rect x="920" y="140" width="236" height="34" rx="10" class="foldHeader"/>
  <text x="936" y="162" class="foldTitle">Attachment: Drop</text>

  <rect x="920" y="188" width="236" height="34" rx="10" class="foldHeader"/>
  <text x="936" y="210" class="foldTitle">▾ Call</text>

  <!-- Call Id -->
  <text x="920" y="244" class="small">Call Id</text>
  <rect x="920" y="252" width="236" height="30" rx="10" class="field"/>
  <text x="934" y="272" class="fieldText">scene.goto</text>

  <line x1="920" y1="296" x2="1156" y2="296" class="divider"/>

  <!-- Structured scene.goto args -->
  <text x="920" y="322" class="small">Scene</text>
  <rect x="920" y="330" width="236" height="30" rx="10" class="field"/>
  <text x="934" y="350" class="fieldText">scene-2</text>
  <text x="1128" y="350" class="tiny">▾</text>

  <text x="920" y="388" class="small">Transition</text>
  <rect x="920" y="396" width="236" height="30" rx="10" class="field"/>
  <text x="934" y="416" class="fieldText">fade</text>
  <text x="1128" y="416" class="tiny">▾</text>

  <text x="920" y="454" class="small">Duration (ms)</text>
  <rect x="920" y="462" width="236" height="30" rx="10" class="field"/>
  <text x="934" y="482" class="fieldText">350</text>

  <rect x="920" y="516" width="236" height="32" rx="10" class="btnPrimary"/>
  <text x="982" y="538" class="btnText">Apply</text>

  <!-- Advanced args (for other callIds) -->
  <rect x="920" y="564" width="236" height="112" rx="12" class="panel2"/>
  <text x="936" y="592" class="label">Other callIds</text>
  <text x="936" y="614" class="tiny">Show dx/dy + “Advanced args (JSON)”</text>
  <text x="936" y="636" class="tiny">when callId ≠ scene.goto.</text>

  <!-- Callout -->
  <rect x="372" y="628" width="804" height="58" rx="12" class="callout"/>
  <text x="392" y="658" class="calloutText">Editor behavior: Call Id stays free-text; when it equals `scene.goto`, show structured fields.</text>
  <text x="392" y="678" class="tiny">In Play mode, a Call action invokes the runtime SceneService to transition to the target scene.</text>
</svg>

