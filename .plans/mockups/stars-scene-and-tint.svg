<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Scene background and entity tint inspector mockup</title>
  <desc id="desc">Two related inspector states showing a solid scene background color and an authored sprite tint without adding new editor entry points.</desc>
  <defs><style>.ui{font-family:Inter,system-ui,sans-serif}.head{font-size:18px;font-weight:700;fill:#fff}.sub{font-size:12px;fill:#9cb0c8}.txt{font-size:14px;fill:#eaf2fb}.panel{fill:#111c2d;stroke:#40536b;stroke-width:1.5}.input{fill:#0b1524;stroke:#334a64}.note{font-size:13px;fill:#25374d}.call{fill:#eef8fc;stroke:#55bfe5;stroke-width:2}.line{stroke:#55bfe5;stroke-width:2;fill:none}</style></defs>
  <rect width="1200" height="760" fill="#e9f0f5"/>
  <text x="36" y="42" class="ui note" font-size="16" font-weight="700">Related inspector additions: scene appearance and sprite tint</text>
  <rect class="panel" x="38" y="70" width="420" height="630" rx="10"/><g class="ui"><text x="64" y="105" class="sub">SELECTION</text><text x="64" y="132" class="head">Inspector — Scene</text><text x="64" y="155" class="sub">Adjust authored values for the current scene.</text>
  <rect x="62" y="184" width="372" height="48" rx="6" fill="#17263a"/><text x="78" y="214" class="txt" font-weight="700">⌄  Scene World Size</text><text x="78" y="258" class="sub">Width</text><text x="260" y="258" class="sub">Height</text><rect class="input" x="78" y="268" width="158" height="36" rx="5"/><text x="91" y="291" class="txt">720</text><rect class="input" x="260" y="268" width="158" height="36" rx="5"/><text x="273" y="291" class="txt">1280</text>
  <rect x="62" y="332" width="372" height="48" rx="6" fill="#17263a"/><text x="78" y="362" class="txt" font-weight="700">⌄  Scene Appearance</text><text x="78" y="406" class="sub">Background color</text><rect x="78" y="418" width="42" height="36" rx="5" fill="#000" stroke="#5a718a"/><rect class="input" x="130" y="418" width="188" height="36" rx="5"/><text x="144" y="441" class="txt">#000000</text><rect x="328" y="418" width="90" height="36" rx="5" fill="#20334a" stroke="#41607f"/><text x="341" y="441" class="txt">Use default</text><text x="78" y="480" class="sub">Rendered behind all background layers.</text>
  <rect x="62" y="518" width="372" height="48" rx="6" fill="#17263a"/><text x="78" y="548" class="txt" font-weight="700">›  Background Layers</text></g>
  <rect class="panel" x="512" y="70" width="420" height="630" rx="10"/><g class="ui"><text x="538" y="105" class="sub">SELECTION</text><text x="538" y="132" class="head">Inspector — Star 001</text><text x="538" y="155" class="sub">Sprite in formation “Stars”</text>
  <rect x="536" y="184" width="372" height="48" rx="6" fill="#17263a"/><text x="552" y="214" class="txt" font-weight="700">›  Transform</text><rect x="536" y="244" width="372" height="48" rx="6" fill="#17263a"/><text x="552" y="274" class="txt" font-weight="700">⌄  Visual</text>
  <text x="552" y="323" class="sub">Tint</text><rect x="552" y="335" width="42" height="36" rx="5" fill="#ff8ad8" stroke="#72869c"/><rect class="input" x="604" y="335" width="206" height="36" rx="5"/><text x="618" y="358" class="txt">#FF8AD8</text><rect x="820" y="335" width="72" height="36" rx="5" fill="#20334a" stroke="#41607f"/><text x="836" y="358" class="txt">Clear</text>
  <text x="552" y="402" class="sub">Alpha</text><rect class="input" x="552" y="414" width="340" height="36" rx="5"/><text x="566" y="437" class="txt">1.00</text><text x="552" y="478" class="sub">Selection frames preserve the authored tint.</text>
  <rect x="536" y="514" width="372" height="48" rx="6" fill="#17263a"/><text x="552" y="544" class="txt" font-weight="700">›  Sprite Size</text><rect x="536" y="574" width="372" height="48" rx="6" fill="#17263a"/><text x="552" y="604" class="txt" font-weight="700">›  Actions / Events</text></g>
  <rect class="call" x="962" y="125" width="214" height="108" rx="8"/><text x="978" y="151" class="ui note" font-weight="700">No new entry points</text><text x="978" y="174" class="ui note">Both fields live in existing</text><text x="978" y="193" class="ui note">scene/entity inspector</text><text x="978" y="212" class="ui note">foldouts.</text><path class="line" d="M962 181 H940 L897 270"/>
  <rect class="call" x="956" y="390" width="220" height="111" rx="8"/><text x="972" y="416" class="ui note" font-weight="700">Backward compatible</text><text x="972" y="439" class="ui note">“Use default” removes the</text><text x="972" y="458" class="ui note">optional field. “Clear” does</text><text x="972" y="477" class="ui note">the same for tint.</text><path class="line" d="M956 445 H928 L891 353"/>
</svg>
