<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1120" viewBox="0 0 1700 1120">
  <defs>
    <style>
      .bg { fill: #efe7db; }
      .shell { fill: #faf7f1; stroke: #d2c1a9; stroke-width: 2; }
      .panel { fill: #fbf8f2; stroke: #d3c2aa; stroke-width: 2; }
      .panelSoft { fill: #f3ece0; stroke: #d3c2aa; stroke-width: 2; }
      .panelMuted { fill: #f7f1e7; stroke: #d8c9b6; stroke-width: 2; }
      .tabOn { fill: #d8eef0; stroke: #7db0b6; stroke-width: 2; }
      .tabOff { fill: #fffdfa; stroke: #d3c2aa; stroke-width: 2; }
      .btn { fill: #fffdfa; stroke: #d3c2aa; stroke-width: 2; }
      .btnBlue { fill: #3e6bbb; stroke: #6e94d4; stroke-width: 2; }
      .btnDanger { fill: #b94a48; stroke: #d17876; stroke-width: 2; }
      .callout { fill: #fff2c7; stroke: #c89b2a; stroke-width: 2; }
      .line { stroke: #c89b2a; stroke-width: 2.5; fill: none; }
      .title { font: 800 30px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #26313f; }
      .section { font: 760 22px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #2a3442; }
      .h { font: 760 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; letter-spacing: .12em; fill: #607082; }
      .label { font: 650 15px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #667687; }
      .text { font: 620 17px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #2e3947; }
      .strong { font: 760 20px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #2a3442; }
      .small { font: 550 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #728294; }
      .btnTextLight { font: 700 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #ffffff; }
      .btnTextDark { font: 700 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #2e3947; }
      .callText { font: 620 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #5a430b; }
      .num { font: 800 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #5a430b; }
      .overlay { fill: rgba(34, 39, 46, 0.22); }
    </style>
  </defs>

  <rect class="bg" width="1700" height="1120" />
  <text class="title" x="48" y="60">Archived History mockup: same pane, same cards, delete only here</text>
  <text class="small" x="48" y="88">Archived is a sibling state of the existing History pane. It can reuse the same lightweight selection mode for bulk maintenance.</text>

  <rect class="shell" x="40" y="120" width="1620" height="960" rx="28" />

  <text class="section" x="76" y="166">1. Archived is a pane state, and can support bulk cleanup too</text>
  <rect class="panel" x="68" y="196" width="640" height="828" rx="24" />
  <text class="strong" x="98" y="246">&lt; Back</text>
  <text class="h" x="192" y="242">PROJECT REVISIONS</text>

  <rect class="panelSoft" x="98" y="276" width="580" height="96" rx="18" />
  <text class="label" x="124" y="306">Show</text>
  <rect class="tabOff" x="124" y="320" width="118" height="34" rx="17" />
  <rect class="tabOff" x="252" y="320" width="122" height="34" rx="17" />
  <rect class="tabOff" x="384" y="320" width="122" height="34" rx="17" />
  <rect class="tabOn" x="516" y="320" width="128" height="34" rx="17" />
  <text class="text" x="183" y="342" text-anchor="middle">Past 7 Days</text>
  <text class="text" x="313" y="342" text-anchor="middle">Past 14</text>
  <text class="text" x="445" y="342" text-anchor="middle">Past 30</text>
  <text class="text" x="580" y="342" text-anchor="middle">Archived</text>

  <rect class="panelSoft" x="98" y="400" width="580" height="148" rx="20" />
  <rect class="tabOn" x="114" y="420" width="26" height="26" rx="8" />
  <text class="strong" x="124" y="438">Pattern Demo</text>
  <text class="small" x="124" y="464">Renamed to Pattern Demo</text>
  <text class="small" x="538" y="438">Archived Jun 29</text>
  <rect class="btnBlue" x="330" y="486" width="104" height="36" rx="16" />
  <text class="btnTextLight" x="382" y="509" text-anchor="middle">Restore...</text>
  <rect class="btn" x="446" y="486" width="86" height="36" rx="16" />
  <text class="btnTextDark" x="489" y="509" text-anchor="middle">Copy...</text>
  <rect class="btnDanger" x="544" y="486" width="106" height="36" rx="16" />
  <text class="btnTextLight" x="597" y="509" text-anchor="middle">Delete...</text>

  <rect class="panelSoft" x="98" y="570" width="580" height="184" rx="20" />
  <rect class="tabOn" x="114" y="590" width="26" height="26" rx="8" />
  <text class="strong" x="124" y="608">Pattern Demo</text>
  <text class="small" x="124" y="634">3 entities added</text>
  <text class="small" x="538" y="608">Archived Jun 28</text>
  <rect class="panelMuted" x="124" y="654" width="170" height="34" rx="17" />
  <text class="small" x="209" y="676" text-anchor="middle">+3 more changes</text>
  <rect class="btnBlue" x="330" y="692" width="104" height="36" rx="16" />
  <text class="btnTextLight" x="382" y="715" text-anchor="middle">Restore...</text>
  <rect class="btn" x="446" y="692" width="86" height="36" rx="16" />
  <text class="btnTextDark" x="489" y="715" text-anchor="middle">Copy...</text>
  <rect class="btnDanger" x="544" y="692" width="106" height="36" rx="16" />
  <text class="btnTextLight" x="597" y="715" text-anchor="middle">Delete...</text>

  <rect class="panelMuted" x="98" y="780" width="580" height="92" rx="16" />
  <text class="small" x="124" y="812">Archived rows still use the same preview, teaser, and action rhythm.</text>
  <text class="small" x="124" y="836">If the user wants to prune several archived items, the same lightweight selection mode can drive `Delete Selected`.</text>
  <rect class="btn" x="410" y="820" width="96" height="34" rx="16" />
  <text class="btnTextDark" x="458" y="842" text-anchor="middle">Cancel</text>
  <rect class="btnDanger" x="518" y="820" width="132" height="34" rx="16" />
  <text class="btnTextLight" x="584" y="842" text-anchor="middle">Delete Selected</text>

  <rect class="panel" x="748" y="196" width="420" height="828" rx="24" />
  <text class="section" x="778" y="236">2. Delete dialog exists only on archived rows</text>
  <rect class="overlay" x="778" y="270" width="360" height="694" rx="22" />
  <rect class="panel" x="808" y="320" width="310" height="320" rx="24" />
  <text class="strong" x="836" y="364">Delete 2 archived revisions?</text>
  <text class="small" x="836" y="396">Selected rows</text>

  <rect class="panelSoft" x="836" y="420" width="254" height="116" rx="16" />
  <text class="small" x="854" y="448">• Pattern Demo · Renamed to Pattern Demo</text>
  <text class="small" x="854" y="472">• Pattern Demo · 3 entities added</text>
  <text class="small" x="854" y="500">These will no longer be available for restore or copy.</text>
  <text class="small" x="854" y="522">Use Restore or Copy instead if you are unsure.</text>

  <rect class="btn" x="836" y="568" width="82" height="38" rx="16" />
  <text class="btnTextDark" x="877" y="592" text-anchor="middle">Cancel</text>
  <rect class="btnDanger" x="930" y="568" width="160" height="38" rx="16" />
  <text class="btnTextLight" x="1010" y="592" text-anchor="middle">Delete Permanently</text>

  <rect class="panel" x="1208" y="196" width="410" height="828" rx="24" />
  <text class="section" x="1238" y="236">3. Why this matches the existing UX better</text>
  <rect class="callout" x="1238" y="292" width="350" height="126" rx="20" />
  <circle cx="1270" cy="334" r="18" fill="#fff2c7" stroke="#c89b2a" stroke-width="2"/>
  <text class="num" x="1270" y="340" text-anchor="middle">1</text>
  <text class="callText" x="1300" y="326">Archived is just another filter-like pane state,</text>
  <text class="callText" x="1300" y="350">not a brand new subsystem or admin page.</text>
  <text class="callText" x="1300" y="374">Bulk deletion can reuse the same mode pattern established by bulk archive.</text>

  <rect class="panelSoft" x="1238" y="458" width="350" height="140" rx="20" />
  <text class="label" x="1264" y="490">Key consistency points</text>
  <text class="small" x="1264" y="520">• same `behavior-block` card feeling</text>
  <text class="small" x="1264" y="544">• same teaser/details pattern</text>
  <text class="small" x="1264" y="568">• same Restore/Copy buttons</text>
  <text class="small" x="1264" y="592">• bulk delete only where the user has already narrowed intent</text>

  <rect class="panelMuted" x="1238" y="640" width="350" height="130" rx="20" />
  <text class="label" x="1264" y="672">Important non-goal</text>
  <text class="small" x="1264" y="702">This proposal does not try to make history cleanup powerful first.</text>
  <text class="small" x="1264" y="726">It tries to make it feel like a natural extension of the current pane first.</text>

  <path class="line" d="M678 334 C736 334, 760 366, 808 588" />
</svg>
