<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Typed Bounds event with constrained no-code action</title>
  <desc id="desc">A two-step PhaserForge workflow: choose the typed Bounds Wrapped event, then configure a Set Property action using labeled target, property, random range, minimum, maximum, and seed controls. No scripting or expressions are exposed.</desc>
  <defs><filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#00101f" flood-opacity=".28"/></filter><style>.ui{font-family:Inter,system-ui,sans-serif}.h1{font-size:22px;font-weight:750;fill:#10243a}.h2{font-size:17px;font-weight:700;fill:#fff}.sub{font-size:12px;fill:#9eb2c9}.txt{font-size:14px;fill:#eef5fc}.small{font-size:12px;fill:#d4e1ed}.panel{fill:#101c2d;stroke:#40536b;stroke-width:1.5}.block{fill:#18283d}.input{fill:#091423;stroke:#344d68}.button{fill:#20364f;stroke:#466684}.call{fill:#f5fbfe;stroke:#49bfe9;stroke-width:2}.note{font-size:13px;fill:#25374d}.line{stroke:#49bfe9;stroke-width:2;fill:none}.step{fill:#153f56;stroke:#53c7ee}.stepnum{font-size:15px;font-weight:800;fill:#fff}.safe{fill:#113343;stroke:#3a829d}</style></defs>
  <rect width="1200" height="820" fill="#e9f1f6"/><text x="36" y="43" class="ui h1">Bounds event workflow: constrained no-code controls</text><text x="36" y="68" class="ui note">Every available event, target, property, and value source is selected from labeled controls. There is no script or expression language.</text>
  <circle cx="66" cy="115" r="18" class="step"/><text x="61" y="121" class="ui stepnum">1</text><text x="95" y="121" class="ui note" font-weight="700">Choose a typed engine event</text>
  <rect x="48" y="140" width="470" height="610" rx="10" class="panel" filter="url(#shadow)"/><g class="ui"><text x="74" y="176" class="sub">SELECTION / STARS</text><text x="74" y="204" class="h2">Actions / Events</text><rect x="72" y="227" width="422" height="58" rx="7" class="block"/><text x="88" y="252" class="txt" font-weight="700">⌄  When Stars wrap vertically</text><text x="88" y="273" class="sub">Bounds • Wrapped • Y • Any side</text>
  <text x="88" y="319" class="sub">Trigger</text><rect x="88" y="329" width="390" height="36" rx="5" class="input"/><text x="101" y="352" class="txt">Bounds</text><text x="454" y="352" class="txt">⌄</text><text x="88" y="396" class="sub">Event</text><rect x="88" y="406" width="390" height="36" rx="5" class="input"/><text x="101" y="429" class="txt">Wrapped</text><text x="454" y="429" class="txt">⌄</text>
  <text x="88" y="473" class="sub">Axis</text><text x="292" y="473" class="sub">Side</text><rect x="88" y="483" width="180" height="36" rx="5" class="input"/><text x="101" y="506" class="txt">Y</text><text x="244" y="506" class="txt">⌄</text><rect x="292" y="483" width="186" height="36" rx="5" class="input"/><text x="305" y="506" class="txt">Any</text><text x="454" y="506" class="txt">⌄</text>
  <rect x="88" y="550" width="390" height="68" rx="6" class="safe"/><text x="103" y="574" class="small" font-weight="700">Runtime provides a typed event source</text><text x="103" y="596" class="sub">The individual member that wrapped is selectable by name.</text><rect x="88" y="652" width="390" height="43" rx="6" class="button"/><text x="223" y="679" class="txt" font-weight="700">+ Add Action</text><text x="88" y="725" class="sub">No callback body, event JSON, or magic identifiers.</text></g>
  <circle cx="570" cy="115" r="18" class="step"/><text x="565" y="121" class="ui stepnum">2</text><text x="599" y="121" class="ui note" font-weight="700">Configure the consequence from bounded choices</text>
  <rect x="552" y="140" width="470" height="610" rx="10" class="panel" filter="url(#shadow)"/><g class="ui"><text x="578" y="176" class="sub">ACTION STEP</text><text x="578" y="204" class="h2">Set Property</text><text x="578" y="226" class="sub">Runs once for each matching Bounds event</text>
  <text x="578" y="267" class="sub">Target</text><rect x="578" y="277" width="418" height="36" rx="5" class="input"/><text x="591" y="300" class="txt">Event source</text><text x="972" y="300" class="txt">⌄</text><rect x="578" y="327" width="418" height="50" rx="6" class="safe"/><text x="593" y="348" class="small" font-weight="700">Event source = the star that wrapped</text><text x="593" y="367" class="sub">Not the formation and not every member.</text>
  <text x="578" y="415" class="sub">Property</text><rect x="578" y="425" width="418" height="36" rx="5" class="input"/><text x="591" y="448" class="txt">X position</text><text x="972" y="448" class="txt">⌄</text><text x="578" y="492" class="sub">Value</text><rect x="578" y="502" width="418" height="36" rx="5" class="input"/><text x="591" y="525" class="txt">Random range</text><text x="972" y="525" class="txt">⌄</text>
  <text x="578" y="569" class="sub">Min</text><text x="792" y="569" class="sub">Max</text><rect x="578" y="579" width="190" height="36" rx="5" class="input"/><text x="591" y="602" class="txt">0</text><rect x="792" y="579" width="204" height="36" rx="5" class="input"/><text x="805" y="602" class="txt">720</text><text x="578" y="646" class="sub">Seed</text><rect x="578" y="656" width="286" height="36" rx="5" class="input"/><text x="591" y="679" class="txt">stars-wrap-01</text><rect x="874" y="656" width="122" height="36" rx="5" class="button"/><text x="907" y="679" class="txt">Reroll</text><text x="578" y="725" class="small">Summary: Set event source X to random 0..720</text></g>
  <path d="M518 445 H542" class="line"/><path d="M534 438 l9 7-9 7" fill="#49bfe9"/>
  <rect x="1045" y="180" width="130" height="240" rx="8" class="call"/><text x="1061" y="206" class="ui note" font-weight="700">Discoverable</text><text x="1061" y="231" class="ui note">No need to know:</text><text x="1061" y="256" class="ui note">• a language</text><text x="1061" y="279" class="ui note">• API names</text><text x="1061" y="302" class="ui note">• object paths</text><text x="1061" y="325" class="ui note">• rand syntax</text><text x="1061" y="348" class="ui note">• callback args</text><text x="1061" y="383" class="ui note">All choices are</text><text x="1061" y="404" class="ui note">validated fields.</text><path d="M1045 302 H1016 L973 520" class="line"/>
  <rect x="48" y="775" width="1127" height="31" rx="7" class="call"/><text x="65" y="796" class="ui note"><tspan font-weight="700">Explicit non-goal:</tspan> this workflow does not add arbitrary TypeScript, JavaScript, expressions, mini-scripts, or user-defined functions.</text>
</svg>
