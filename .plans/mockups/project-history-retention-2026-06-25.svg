<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1120" viewBox="0 0 1700 1120">
  <defs>
    <style>
      .bg { fill: #efe7db; }
      .shell { fill: #faf7f1; stroke: #d2c1a9; stroke-width: 2; }
      .panel { fill: #fbf8f2; stroke: #d3c2aa; stroke-width: 2; }
      .panelSoft { fill: #f3ece0; stroke: #d3c2aa; stroke-width: 2; }
      .panelMuted { fill: #f7f1e7; stroke: #d8c9b6; stroke-width: 2; }
      .tabOn { fill: #d8eef0; stroke: #7db0b6; stroke-width: 2; }
      .tabOff { fill: #fffdfa; stroke: #d3c2aa; stroke-width: 2; }
      .btn { fill: #fffdfa; stroke: #d3c2aa; stroke-width: 2; }
      .btnBlue { fill: #3e6bbb; stroke: #6e94d4; stroke-width: 2; }
      .btnWarn { fill: #fff2c7; stroke: #c89b2a; stroke-width: 2; }
      .btnDanger { fill: #b94a48; stroke: #d17876; stroke-width: 2; }
      .pillWarn { fill: #fff2c7; stroke: #c89b2a; stroke-width: 2; }
      .pillDanger { fill: #f4d7d4; stroke: #c46b68; stroke-width: 2; }
      .callout { fill: #fff2c7; stroke: #c89b2a; stroke-width: 2; }
      .line { stroke: #c89b2a; stroke-width: 2.5; fill: none; }
      .title { font: 800 30px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #26313f; }
      .section { font: 760 22px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #2a3442; }
      .h { font: 760 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; letter-spacing: .12em; fill: #607082; }
      .label { font: 650 15px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #667687; }
      .text { font: 620 17px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #2e3947; }
      .strong { font: 760 20px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #2a3442; }
      .small { font: 550 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #728294; }
      .tiny { font: 520 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #7c8b9b; }
      .btnTextLight { font: 700 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #ffffff; }
      .btnTextDark { font: 700 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #2e3947; }
      .callText { font: 620 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #5a430b; }
      .num { font: 800 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #5a430b; }
      .overlay { fill: rgba(34, 39, 46, 0.22); }
    </style>
  </defs>

  <rect class="bg" width="1700" height="1120" />
  <text class="title" x="48" y="60">Manage: History mockup with age-based cleanup on visit</text>
  <text class="small" x="48" y="88">Uses the existing compact tab-style filter pattern. Default filter is Past 7 Days. A single prompt appears only when History is opened and old revisions exist.</text>

  <rect class="shell" x="40" y="120" width="1620" height="960" rx="28" />

  <text class="section" x="76" y="166">1. History view after entering from Manage</text>
  <rect class="panel" x="68" y="196" width="610" height="828" rx="24" />
  <text class="strong" x="98" y="246">&lt; Back</text>
  <text class="h" x="192" y="242">PROJECT REVISIONS</text>

  <rect class="panelSoft" x="98" y="276" width="550" height="96" rx="18" />
  <text class="label" x="124" y="306">Show</text>
  <rect class="tabOn" x="124" y="320" width="118" height="34" rx="17" />
  <rect class="tabOff" x="252" y="320" width="122" height="34" rx="17" />
  <rect class="tabOff" x="384" y="320" width="122" height="34" rx="17" />
  <text class="text" x="183" y="342" text-anchor="middle">Past 7 Days</text>
  <text class="text" x="313" y="342" text-anchor="middle">Past 14</text>
  <text class="text" x="445" y="342" text-anchor="middle">Past 30</text>
  <text class="small" x="522" y="342">7 visible</text>

  <rect class="callout" x="98" y="392" width="550" height="98" rx="18" />
  <text class="strong" x="124" y="428">Older versions found</text>
  <text class="small" x="124" y="456">2 revisions are older than 30 days and hidden from the 7-day list.</text>
  <text class="small" x="124" y="478">Opening History triggers one retention prompt when unarchived versions are older than 30 days.</text>
  <rect class="btnWarn" x="458" y="424" width="162" height="38" rx="19" />
  <text class="btnTextDark" x="539" y="448" text-anchor="middle">Review Older Versions</text>

  <rect class="panelSoft" x="98" y="516" width="550" height="122" rx="20" />
  <text class="strong" x="124" y="556">Today 10:42 AM - Autosave checkpoint</text>
  <text class="small" x="124" y="584">Idle burst save after 11 changes - Scenes 3 - Entities 42</text>
  <rect class="btnBlue" x="376" y="570" width="124" height="36" rx="16" />
  <text class="btnTextLight" x="438" y="593" text-anchor="middle">Restore...</text>
  <rect class="btn" x="514" y="570" width="94" height="36" rx="16" />
  <text class="btnTextDark" x="561" y="593" text-anchor="middle">Copy...</text>

  <rect class="tabOn" x="98" y="656" width="550" height="122" rx="20" />
  <text class="strong" x="124" y="696">Yesterday 4:18 PM - Before publish</text>
  <text class="small" x="124" y="724">Selected row still previews immediately in canvas as it does today.</text>
  <rect class="btnBlue" x="376" y="710" width="124" height="36" rx="16" />
  <text class="btnTextLight" x="438" y="733" text-anchor="middle">Restore...</text>
  <rect class="btn" x="514" y="710" width="94" height="36" rx="16" />
  <text class="btnTextDark" x="561" y="733" text-anchor="middle">Copy...</text>

  <rect class="panelSoft" x="98" y="796" width="550" height="122" rx="20" />
  <text class="strong" x="124" y="836">Jun 21 - Named version: Good pacing</text>
  <text class="small" x="124" y="864">Still inside the selected 7-day range, so it stays in the main list.</text>
  <rect class="btnBlue" x="376" y="850" width="124" height="36" rx="16" />
  <text class="btnTextLight" x="438" y="873" text-anchor="middle">Restore...</text>
  <rect class="btn" x="514" y="850" width="94" height="36" rx="16" />
  <text class="btnTextDark" x="561" y="873" text-anchor="middle">Copy...</text>

  <rect class="panelMuted" x="98" y="936" width="550" height="58" rx="16" />
  <text class="small" x="124" y="971">Hidden until filter changes: Jun 01 and May 18 revisions are older than 30 days and wait behind the archive prompt flow.</text>

  <rect class="panel" x="718" y="196" width="430" height="828" rx="24" />
  <text class="section" x="748" y="236">2. Single prompt on History entry</text>
  <rect class="overlay" x="748" y="270" width="370" height="694" rx="22" />
  <rect class="panel" x="778" y="330" width="310" height="388" rx="24" />
  <text class="strong" x="806" y="374">Older versions found</text>
  <text class="small" x="806" y="406">This appears as soon as History is visited if old revisions exist.</text>

  <rect class="panelSoft" x="806" y="430" width="254" height="82" rx="16" />
  <text class="label" x="824" y="458">Candidates</text>
  <text class="small" x="824" y="484">Jun 01 - Before publish</text>
  <text class="small" x="824" y="504">May 18 - Named version: Vertical slice</text>

  <rect class="pillWarn" x="806" y="532" width="254" height="108" rx="18" />
  <text class="label" x="824" y="562">Action meanings</text>
  <text class="small" x="824" y="588">Archive: preserve in storage, hide from current History UI.</text>
  <text class="small" x="824" y="608">Delete: permanently remove these versions.</text>
  <text class="small" x="824" y="628">Cancel: keep everything unchanged.</text>

  <rect class="btn" x="806" y="662" width="82" height="38" rx="16" />
  <text class="btnTextDark" x="847" y="686" text-anchor="middle">Cancel</text>
  <rect class="btnWarn" x="902" y="662" width="84" height="38" rx="16" />
  <text class="btnTextDark" x="944" y="686" text-anchor="middle">Archive</text>
  <rect class="btnDanger" x="998" y="662" width="62" height="38" rx="16" />
  <text class="btnTextLight" x="1029" y="686" text-anchor="middle">Delete</text>

  <rect class="panel" x="1188" y="196" width="430" height="828" rx="24" />
  <text class="section" x="1218" y="236">3. Stored behavior after action</text>
  <rect class="overlay" x="1218" y="270" width="370" height="694" rx="22" />
  <rect class="panel" x="1248" y="330" width="310" height="388" rx="24" />
  <text class="strong" x="1276" y="374">Archive result</text>
  <text class="small" x="1276" y="406">Archived versions stay in storage but are not yet shown anywhere in the History UI.</text>

  <rect class="pillWarn" x="1276" y="434" width="254" height="88" rx="18" />
  <text class="label" x="1294" y="462">Hidden for now</text>
  <text class="small" x="1294" y="488">Future archive UI can restore or copy them later.</text>
  <text class="small" x="1294" y="508">Current History list stays focused on recent work.</text>

  <text class="strong" x="1276" y="564">Delete result</text>
  <rect class="pillDanger" x="1276" y="584" width="254" height="86" rx="18" />
  <text class="label" x="1294" y="612">Permanent removal</text>
  <text class="small" x="1294" y="638">Deleted versions leave both active and archived storage.</text>
  <text class="small" x="1294" y="658">No second prompt in this design.</text>

  <rect class="panelSoft" x="1276" y="716" width="254" height="110" rx="18" />
  <text class="label" x="1294" y="746">Resulting list behavior</text>
  <text class="small" x="1294" y="772">Past 7 / 14 / 30 filters only affect visible revision range.</text>
  <text class="small" x="1294" y="792">Archive state is separate from date filtering.</text>
  <text class="small" x="1294" y="812">The visit-triggered cleanup check runs once per History entry.</text>

  <rect class="callout" x="720" y="868" width="896" height="116" rx="22" />
  <circle cx="754" cy="908" r="18" fill="#fff2c7" stroke="#c89b2a" stroke-width="2"/>
  <text class="num" x="754" y="914" text-anchor="middle">1</text>
  <text class="callText" x="784" y="894">The 7 / 14 / 30 control is drawn as the same compact button-tab pattern already used in the project picker.</text>
  <text class="callText" x="784" y="918">That keeps filtering discoverable without introducing a separate visual language for radio buttons.</text>
  <text class="callText" x="784" y="942">The default selection is Past 7 Days, with older-than-30-day items handled by one explicit Cancel / Archive / Delete decision.</text>

  <path class="line" d="M650 440 C700 430, 734 430, 780 510" />
  <path class="line" d="M1090 510 C1160 510, 1192 510, 1248 520" />
</svg>
