<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
        --warn:#ffb86a;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:900;}
      .subtitle{fill:var(--muted); font-size:12px; font-weight:700;}
      .label{fill:var(--muted); font-size:13px; font-weight:800;}
      .small{fill:var(--muted); font-size:12px;}
      .tiny{fill:var(--muted); font-size:11px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .divider{stroke:rgba(106,167,255,0.18); stroke-width:1;}
      .chip{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .chipAccent{fill:rgba(106,167,255,0.18); stroke:rgba(106,167,255,0.7); stroke-width:1;}
      .chipGreen{fill:rgba(124,240,199,0.10); stroke:rgba(124,240,199,0.9); stroke-width:1;}
      .chipWarn{fill:rgba(255,184,106,0.10); stroke:rgba(255,184,106,0.9); stroke-width:1;}
      .textStrong{fill:var(--text); font-size:12px; font-weight:900;}
      .textMutedStrong{fill:var(--muted); font-size:12px; font-weight:900;}
      .callout{fill:rgba(106,167,255,0.10); stroke:rgba(106,167,255,0.8); stroke-width:1; stroke-dasharray:6 6;}
      .calloutText{fill:var(--text); font-size:12px; font-weight:900;}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="780" rx="18" fill="var(--bg)"/>

  <!-- Header -->
  <rect x="24" y="18" width="1152" height="60" rx="12" class="panel"/>
  <text x="48" y="46" class="title">Mockup — Action Drawer has a “Patterns” tab + Events “+ Add Action” opens drawer directly</text>
  <text x="48" y="66" class="subtitle">Also: drawer is positioned under the button (arrow points down).</text>

  <!-- App frame -->
  <rect x="24" y="96" width="1152" height="660" rx="14" class="panel"/>

  <!-- Left sidebar (Events panel) -->
  <rect x="48" y="126" width="360" height="606" rx="14" class="panel2"/>
  <text x="72" y="156" class="textMutedStrong">Events</text>
  <line x1="48" y1="170" x2="408" y2="170" class="divider"/>

  <!-- Events panel toolbar row -->
  <text x="72" y="202" class="tiny">Handlers</text>
  <text x="140" y="202" class="tiny">Wiring</text>

  <!-- + Add Action button (replaces + Add) -->
  <rect x="72" y="220" width="312" height="36" rx="12" class="chipGreen"/>
  <text x="88" y="244" class="textStrong">+ Add Action</text>
  <!-- down arrow glyph -->
  <path d="M 356 234 L 372 234 L 364 246 Z" fill="var(--accent2)"/>

  <text x="72" y="282" class="tiny">Steps</text>
  <rect x="72" y="294" width="312" height="32" rx="12" class="chip"/>
  <text x="88" y="315" class="textMutedStrong">Step 1 · Move Until</text>
  <rect x="72" y="332" width="312" height="32" rx="12" class="chip"/>
  <text x="88" y="353" class="textMutedStrong">Step 2 · Blink Until</text>

  <!-- Action drawer directly under the + Add Action button -->
  <rect x="72" y="266" width="520" height="420" rx="14" class="panel" filter="url(#shadow)"/>
  <text x="92" y="296" class="textStrong">Action Library</text>

  <!-- Categories (single-line; include Patterns) -->
  <text x="92" y="334" class="tiny">Categories</text>
  <rect x="92" y="348" width="58" height="24" rx="10" class="chip"/>
  <text x="110" y="365" class="textMutedStrong">All</text>
  <rect x="156" y="348" width="96" height="24" rx="10" class="chip"/>
  <text x="172" y="365" class="textMutedStrong">Movement</text>
  <rect x="258" y="348" width="70" height="24" rx="10" class="chip"/>
  <text x="274" y="365" class="textMutedStrong">Visual</text>
  <rect x="334" y="348" width="62" height="24" rx="10" class="chip"/>
  <text x="350" y="365" class="textMutedStrong">Flow</text>
  <rect x="402" y="348" width="92" height="24" rx="10" class="chipAccent"/>
  <text x="420" y="365" class="textStrong">Patterns</text>

  <!-- Pinned section (existing drawer concept) -->
  <text x="92" y="400" class="tiny">Pinned (filtered)</text>
  <rect x="92" y="414" width="480" height="30" rx="12" class="chip"/>
  <text x="104" y="434" class="textMutedStrong">spiral_in</text>
  <text x="544" y="434" class="textMutedStrong">★</text>

  <!-- Patterns list (as content under Patterns mode) -->
  <text x="92" y="474" class="tiny">Patterns</text>
  <rect x="92" y="488" width="480" height="30" rx="12" class="chip"/>
  <text x="104" y="508" class="textMutedStrong">move_and_flash</text>
  <rect x="92" y="524" width="480" height="30" rx="12" class="chip"/>
  <text x="104" y="544" class="textMutedStrong">wave_entry</text>
  <rect x="92" y="560" width="480" height="30" rx="12" class="chipWarn"/>
  <text x="104" y="580" class="textStrong">spiral_in</text>
  <text x="452" y="580" class="textMutedStrong">▶</text>

  <!-- Right pane (Inspector) just to show context -->
  <rect x="432" y="126" width="720" height="606" rx="14" class="panel2"/>
  <text x="456" y="156" class="textMutedStrong">Inspector</text>
  <line x1="432" y1="170" x2="1152" y2="170" class="divider"/>
  <rect x="456" y="194" width="672" height="128" rx="12" class="panel"/>
  <text x="480" y="224" class="textStrong">Selected: Step 2 · Blink Until</text>
  <text x="480" y="246" class="small">This mockup shows “Patterns” as a peer tab inside the Action Library drawer.</text>
  <text x="480" y="268" class="small">The drawer opens directly from “+ Add Action” (no intermediate add menu).</text>

  <!-- Callout annotations -->
  <rect x="48" y="700" width="1104" height="44" rx="12" class="callout"/>
  <text x="72" y="727" class="calloutText">Key change: “+ Add Action” opens drawer directly, and the drawer anchors below the button (down-arrow matches placement).</text>
</svg>
