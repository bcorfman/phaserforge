<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">Formation Visual Variations bulk tint workflow</title>
  <desc id="desc">The existing formation inspector extended with a Visual Variations foldout that previews and applies deterministic random RGB tint to all formation members in one operation.</desc>
  <defs><filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#00101f" flood-opacity=".3"/></filter><style>.ui{font-family:Inter,system-ui,sans-serif}.head{font-size:18px;font-weight:700;fill:#fff}.sub{font-size:12px;fill:#9eb2c9}.txt{font-size:14px;fill:#eef5fc}.panel{fill:#101c2d;stroke:#40536b;stroke-width:1.5}.block{fill:#18283d}.input{fill:#091423;stroke:#344d68}.button{fill:#20364f;stroke:#466684}.primary{fill:#157ba0;stroke:#53c7ee}.call{fill:#f5fbfe;stroke:#49bfe9;stroke-width:2}.note{font-size:13px;fill:#25374d}.line{stroke:#49bfe9;stroke-width:2;fill:none}.star{stroke:none}</style></defs>
  <rect width="1100" height="760" fill="#e9f1f6"/><text x="36" y="42" class="ui note" font-size="16" font-weight="700">Bulk tint workflow for an existing formation</text>
  <rect x="40" y="70" width="430" height="650" rx="10" class="panel" filter="url(#shadow)"/><g class="ui"><text x="66" y="106" class="sub">SELECTION / FORMATION</text><text x="66" y="134" class="head">Stars • 400 members</text><text x="66" y="157" class="sub">Changes apply to members as one history action</text>
  <rect x="64" y="184" width="382" height="48" rx="6" class="block"/><text x="80" y="214" class="txt" font-weight="700">›  Formation Details</text><rect x="64" y="244" width="382" height="48" rx="6" class="block"/><text x="80" y="274" class="txt" font-weight="700">›  Layout</text><rect x="64" y="304" width="382" height="48" rx="6" class="block"/><text x="80" y="334" class="txt" font-weight="700">⌄  Visual Variations</text>
  <text x="80" y="382" class="sub">Members</text><rect x="80" y="392" width="350" height="36" rx="5" class="input"/><text x="93" y="415" class="txt">All 400 members</text><text x="406" y="415" class="txt">⌄</text>
  <text x="80" y="459" class="sub">Property</text><rect x="80" y="469" width="350" height="36" rx="5" class="input"/><text x="93" y="492" class="txt">Tint • Random RGB</text><text x="406" y="492" class="txt">⌄</text>
  <text x="80" y="536" class="sub">Channel Min</text><text x="264" y="536" class="sub">Channel Max</text><rect x="80" y="546" width="160" height="36" rx="5" class="input"/><text x="93" y="569" class="txt">20</text><rect x="264" y="546" width="166" height="36" rx="5" class="input"/><text x="277" y="569" class="txt">255</text>
  <text x="80" y="613" class="sub">Seed</text><rect x="80" y="623" width="236" height="36" rx="5" class="input"/><text x="93" y="646" class="txt">stars-color-01</text><rect x="326" y="623" width="104" height="36" rx="5" class="button"/><text x="352" y="646" class="txt">Reroll</text>
  <rect x="80" y="679" width="104" height="34" rx="5" class="button"/><text x="106" y="701" class="txt">Cancel</text><rect x="194" y="679" width="108" height="34" rx="5" class="button"/><text x="223" y="701" class="txt">Preview</text><rect x="312" y="679" width="118" height="34" rx="5" class="primary"/><text x="337" y="701" class="txt" font-weight="700">Apply all</text></g>
  <rect x="520" y="84" width="360" height="620" rx="10" fill="#050b13" stroke="#344b65"/><text x="544" y="116" class="ui sub">LIVE PREVIEW</text><rect x="572" y="138" width="256" height="512" fill="#000" stroke="#2e4157"/>
  <g><circle class="star" fill="#ff8ad8" cx="603" cy="174" r="2.5"/><circle class="star" fill="#72f5bd" cx="736" cy="196" r="2.5"/><circle class="star" fill="#7fa4ff" cx="792" cy="232" r="2.5"/><circle class="star" fill="#ffe681" cx="635" cy="261" r="2.5"/><circle class="star" fill="#dd7aff" cx="762" cy="301" r="2.5"/><circle class="star" fill="#8df7ff" cx="680" cy="335" r="2.5"/><circle class="star" fill="#ff9b78" cx="804" cy="373" r="2.5"/><circle class="star" fill="#a3ff7d" cx="612" cy="412" r="2.5"/><circle class="star" fill="#85a4ff" cx="723" cy="452" r="2.5"/><circle class="star" fill="#ff70aa" cx="649" cy="493" r="2.5"/><circle class="star" fill="#ecff88" cx="793" cy="535" r="2.5"/><circle class="star" fill="#75e9cf" cx="690" cy="579" r="2.5"/><circle class="star" fill="#d784ff" cx="615" cy="620" r="2.5"/></g>
  <rect x="916" y="150" width="160" height="112" rx="8" class="call"/><text x="932" y="176" class="ui note" font-weight="700">Not 400 edits</text><text x="932" y="199" class="ui note">One seeded recipe</text><text x="932" y="218" class="ui note">produces distinct tint</text><text x="932" y="237" class="ui note">per member.</text><path class="line" d="M916 210 H885 L823 273"/>
  <rect x="914" y="414" width="162" height="132" rx="8" class="call"/><text x="930" y="440" class="ui note" font-weight="700">Safe preview</text><text x="930" y="463" class="ui note">Preview is reversible.</text><text x="930" y="482" class="ui note">Apply or Reroll is one</text><text x="930" y="501" class="ui note">semantic history action.</text><text x="930" y="520" class="ui note">Cancel restores tints.</text><path class="line" d="M914 482 H882 L819 530"/>
</svg>
