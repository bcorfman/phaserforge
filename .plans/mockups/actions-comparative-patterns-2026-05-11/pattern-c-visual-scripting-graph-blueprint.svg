<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
        --warn:#ffb86a;
        --danger:#ff6a7a;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:800;}
      .label{fill:var(--muted); font-size:13px; font-weight:700;}
      .small{fill:var(--muted); font-size:12px;}
      .tiny{fill:var(--muted); font-size:11px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .divider{stroke:rgba(106,167,255,0.18); stroke-width:1;}
      .node{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .nodeEvent{fill:rgba(106,167,255,0.14); stroke:rgba(106,167,255,0.9); stroke-width:1;}
      .nodeAction{fill:rgba(124,240,199,0.10); stroke:rgba(124,240,199,0.9); stroke-width:1;}
      .nodeFlow{fill:rgba(255,184,106,0.10); stroke:rgba(255,184,106,0.9); stroke-width:1;}
      .nodeText{fill:var(--text); font-size:12px; font-weight:900;}
      .nodeTextMuted{fill:var(--muted); font-size:12px; font-weight:800;}
      .wire{stroke:rgba(124,240,199,0.75); stroke-width:2; fill:none;}
      .wire2{stroke:rgba(255,184,106,0.85); stroke-width:2; fill:none;}
      .pin{fill:rgba(170,180,230,0.9);}
      .callout{fill:rgba(124,240,199,0.10); stroke:var(--accent2); stroke-width:1; stroke-dasharray:6 6;}
      .calloutText{fill:var(--text); font-size:12px; font-weight:900;}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" rx="16" fill="var(--bg)"/>

  <rect x="24" y="18" width="1152" height="54" rx="10" class="panel"/>
  <text x="46" y="50" class="title">Pattern C — Visual scripting / Blueprint graph (reuse via macros/subgraphs)</text>

  <!-- Left: Graph library -->
  <rect x="24" y="90" width="320" height="606" rx="12" class="panel"/>
  <text x="46" y="122" class="label">Library</text>
  <line x1="24" y1="140" x2="344" y2="140" class="divider"/>
  <rect x="46" y="156" width="276" height="30" rx="10" class="node"/>
  <text x="58" y="176" class="nodeTextMuted">Search nodes…</text>

  <text x="46" y="220" class="small">Reusable</text>
  <rect x="46" y="236" width="276" height="30" rx="10" class="nodeAction"/>
  <text x="58" y="256" class="nodeText">Macro: Jump (sound + tween)</text>
  <rect x="46" y="270" width="276" height="30" rx="10" class="nodeAction"/>
  <text x="58" y="290" class="nodeText">Subgraph: Damage Flash</text>

  <text x="46" y="340" class="small">Add nodes</text>
  <rect x="46" y="356" width="276" height="30" rx="10" class="nodeEvent"/>
  <text x="58" y="376" class="nodeText">Event: On Input</text>
  <rect x="46" y="390" width="276" height="30" rx="10" class="nodeFlow"/>
  <text x="58" y="410" class="nodeText">Flow: Parallel</text>
  <rect x="46" y="424" width="276" height="30" rx="10" class="nodeAction"/>
  <text x="58" y="444" class="nodeText">Action: Tween</text>

  <rect x="46" y="560" width="276" height="116" rx="12" class="callout"/>
  <text x="66" y="588" class="calloutText">What it trades</text>
  <text x="66" y="610" class="tiny">+ Strong reuse + discovery.</text>
  <text x="66" y="630" class="tiny">+ Parallel/branching is explicit.</text>
  <text x="66" y="650" class="tiny">– Harder to keep “contained in a tree”.</text>

  <!-- Center: Graph canvas -->
  <rect x="368" y="90" width="600" height="606" rx="12" class="panel"/>
  <text x="392" y="122" class="label">Graph — Player Actions</text>
  <line x1="368" y1="140" x2="968" y2="140" class="divider"/>

  <!-- Event node -->
  <rect x="404" y="180" width="200" height="76" rx="12" class="nodeEvent"/>
  <text x="420" y="206" class="nodeText">On Input: Space</text>
  <text x="420" y="230" class="tiny">Target: Player</text>
  <circle cx="596" cy="222" r="5" class="pin"/>

  <!-- Parallel node -->
  <rect x="654" y="186" width="220" height="118" rx="12" class="nodeFlow"/>
  <text x="670" y="212" class="nodeText">Parallel</text>
  <text x="670" y="236" class="tiny">Runs branches concurrently</text>
  <circle cx="654" cy="222" r="5" class="pin"/>
  <circle cx="874" cy="238" r="5" class="pin"/>
  <circle cx="874" cy="268" r="5" class="pin"/>

  <!-- Branch A -->
  <rect x="654" y="332" width="220" height="68" rx="12" class="nodeAction"/>
  <text x="670" y="358" class="nodeText">Play Sound</text>
  <text x="670" y="382" class="tiny">sound: jump</text>
  <circle cx="654" cy="360" r="5" class="pin"/>

  <!-- Branch B -->
  <rect x="404" y="330" width="220" height="92" rx="12" class="nodeAction"/>
  <text x="420" y="356" class="nodeText">Tween Y</text>
  <text x="420" y="380" class="tiny">offset: -40</text>
  <text x="420" y="400" class="tiny">duration: 120ms</text>
  <circle cx="624" cy="364" r="5" class="pin"/>

  <!-- Reuse node (macro) -->
  <rect x="404" y="468" width="280" height="60" rx="12" class="nodeAction"/>
  <text x="420" y="494" class="nodeText">Macro: Jump</text>
  <text x="420" y="516" class="tiny">(sound + tween + optional FX)</text>

  <!-- Wires -->
  <path d="M 596 222 C 620 222, 632 222, 654 222" class="wire2"/>
  <path d="M 874 238 C 940 238, 940 360, 659 360" class="wire"/>
  <path d="M 874 268 C 930 268, 930 364, 624 364" class="wire"/>

  <!-- Right: Inspector -->
  <rect x="992" y="90" width="184" height="606" rx="12" class="panel"/>
  <text x="1012" y="122" class="label">Inspector</text>
  <line x1="992" y1="140" x2="1176" y2="140" class="divider"/>
  <text x="1012" y="176" class="nodeText">Selected:</text>
  <rect x="1012" y="190" width="144" height="28" rx="10" class="nodeAction"/>
  <text x="1024" y="210" class="nodeText">Parallel</text>
  <text x="1012" y="248" class="small">Properties</text>
  <rect x="1012" y="262" width="144" height="30" rx="10" class="node"/>
  <text x="1024" y="282" class="nodeTextMuted">Join: when all done</text>
  <rect x="1012" y="300" width="144" height="30" rx="10" class="node"/>
  <text x="1024" y="320" class="nodeTextMuted">Max branches: 3</text>
</svg>

