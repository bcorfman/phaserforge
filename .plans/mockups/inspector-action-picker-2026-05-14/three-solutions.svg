<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:900;}
      .subtitle{fill:var(--muted); font-size:12px; font-weight:700;}
      .label{fill:var(--muted); font-size:13px; font-weight:800;}
      .small{fill:var(--muted); font-size:12px;}
      .tiny{fill:var(--muted); font-size:11px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .divider{stroke:rgba(106,167,255,0.18); stroke-width:1;}
      .chip{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .chipAccent{fill:rgba(106,167,255,0.18); stroke:rgba(106,167,255,0.7); stroke-width:1;}
      .chipGreen{fill:rgba(124,240,199,0.10); stroke:rgba(124,240,199,0.9); stroke-width:1;}
      .textStrong{fill:var(--text); font-size:12px; font-weight:900;}
      .textMutedStrong{fill:var(--muted); font-size:12px; font-weight:900;}
      .callout{fill:rgba(124,240,199,0.08); stroke:rgba(124,240,199,0.85); stroke-width:1; stroke-dasharray:6 6;}
      .calloutText{fill:var(--text); font-size:12px; font-weight:900;}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="780" rx="18" fill="var(--bg)"/>

  <!-- Header -->
  <rect x="24" y="18" width="1152" height="60" rx="12" class="panel"/>
  <text x="48" y="46" class="title">Solution B — “+ Add” opens Action Library drawer</text>
  <text x="48" y="66" class="subtitle">Inspector stays compact; the growing Action catalog lives in a focused drawer with search + categories + pinned.</text>

  <!-- Main frame -->
  <rect x="24" y="96" width="1152" height="660" rx="14" class="panel"/>

  <!-- Inspector frame (left) -->
  <rect x="48" y="126" width="520" height="600" rx="12" class="panel2"/>
  <text x="68" y="154" class="textMutedStrong">Inspector — EnemyGroup (Group)</text>
  <line x1="48" y1="168" x2="568" y2="168" class="divider"/>

  <text x="68" y="196" class="textStrong">Actions</text>

  <!-- Filter + Add row -->
  <rect x="68" y="212" width="362" height="32" rx="12" class="chip"/>
  <text x="82" y="233" class="textMutedStrong">Filter: movement</text>
  <rect x="438" y="212" width="130" height="32" rx="12" class="chipGreen"/>
  <text x="466" y="233" class="textStrong">+ Add</text>

  <!-- Existing steps (use real action names from registry) -->
  <rect x="68" y="258" width="476" height="28" rx="10" class="chip"/>
  <text x="82" y="277" class="textMutedStrong">On Start →</text>
  <rect x="92" y="292" width="452" height="26" rx="10" class="chipAccent"/>
  <text x="104" y="309" class="textStrong">Move Until</text>
  <rect x="92" y="322" width="452" height="26" rx="10" class="chip"/>
  <text x="104" y="339" class="textMutedStrong">Wait</text>

  <rect x="68" y="362" width="476" height="28" rx="10" class="chip"/>
  <text x="82" y="381" class="textMutedStrong">On Update →</text>
  <rect x="92" y="396" width="452" height="26" rx="10" class="chipAccent"/>
  <text x="104" y="413" class="textStrong">Move X Until</text>
  <rect x="92" y="426" width="452" height="26" rx="10" class="chip"/>
  <text x="104" y="443" class="textMutedStrong">Blink Until</text>

  <rect x="68" y="476" width="476" height="28" rx="10" class="chip"/>
  <text x="82" y="495" class="textMutedStrong">On Event (“alarm”) →</text>
  <rect x="92" y="510" width="452" height="26" rx="10" class="chip"/>
  <text x="104" y="527" class="textMutedStrong">Emit Event</text>
  <rect x="92" y="540" width="452" height="26" rx="10" class="chip"/>
  <text x="104" y="557" class="textMutedStrong">Repeat</text>

  <!-- Drawer overlay (right) -->
  <rect x="604" y="126" width="548" height="600" rx="14" class="panel" filter="url(#shadow)"/>
  <text x="628" y="156" class="textStrong">Action Library</text>
  <rect x="628" y="170" width="500" height="32" rx="12" class="chipAccent"/>
  <text x="642" y="191" class="textStrong">Search actions…</text>
  <rect x="1042" y="170" width="86" height="32" rx="12" class="chip"/>
  <text x="1062" y="191" class="textMutedStrong">Esc</text>
  <text x="1046" y="156" class="tiny">Pins are global</text>

  <!-- Category tabs -->
  <text x="628" y="228" class="tiny">Categories</text>
  <rect x="628" y="242" width="118" height="26" rx="10" class="chipAccent"/>
  <text x="640" y="259" class="textStrong">Movement</text>
  <rect x="752" y="242" width="86" height="26" rx="10" class="chip"/>
  <text x="764" y="259" class="textMutedStrong">Visual</text>
  <rect x="844" y="242" width="76" height="26" rx="10" class="chip"/>
  <text x="856" y="259" class="textMutedStrong">Flow</text>
  <rect x="926" y="242" width="84" height="26" rx="10" class="chip"/>
  <text x="938" y="259" class="textMutedStrong">State</text>

  <!-- Movement list (real action names) -->
  <text x="628" y="304" class="tiny">Movement</text>
  <rect x="628" y="316" width="500" height="30" rx="10" class="chipAccent"/>
  <text x="642" y="336" class="textStrong">Move Until</text>
  <text x="1106" y="336" class="textStrong">☆</text>
  <rect x="628" y="352" width="500" height="30" rx="10" class="chip"/>
  <text x="642" y="372" class="textMutedStrong">Move X Until</text>
  <text x="1106" y="372" class="textMutedStrong">☆</text>
  <rect x="628" y="388" width="500" height="30" rx="10" class="chip"/>
  <text x="642" y="408" class="textMutedStrong">Move Y Until</text>
  <text x="1106" y="408" class="textMutedStrong">☆</text>

  <!-- Pinned (use implemented actions) -->
  <text x="628" y="462" class="tiny">Pinned (global)</text>
  <rect x="628" y="474" width="242" height="28" rx="10" class="chipGreen"/>
  <text x="642" y="493" class="textStrong">★ Blink Until</text>
  <rect x="886" y="474" width="242" height="28" rx="10" class="chipGreen"/>
  <text x="900" y="493" class="textStrong">★ Wait</text>

  <!-- Footer buttons -->
  <rect x="628" y="664" width="180" height="38" rx="12" class="chip"/>
  <text x="654" y="688" class="textMutedStrong">Close</text>
  <rect x="948" y="664" width="180" height="38" rx="12" class="chipGreen"/>
  <text x="1012" y="688" class="textStrong">Add</text>

  <!-- Callout -->
  <rect x="48" y="646" width="520" height="80" rx="12" class="callout"/>
  <text x="68" y="674" class="calloutText">Why this scales</text>
  <text x="68" y="696" class="small">- Inspector stays lean; the catalog grows inside the drawer (search + categories + pinned)</text>

</svg>
