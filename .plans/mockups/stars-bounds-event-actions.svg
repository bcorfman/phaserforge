<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="940" viewBox="0 0 1400 940" role="img" aria-labelledby="title desc">
  <title id="title">Typed Bounds event and low-code action workflow</title>
  <desc id="desc">A three-step PhaserForge workflow: configure a typed Bounds Wrapped event, add a no-code Set Property action targeting the event source with a random range, and optionally use a clearly marked Custom Call that requires a registered runtime operation.</desc>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#00101f" flood-opacity=".28"/></filter>
    <style>
      .ui{font-family:Inter,system-ui,sans-serif}.h1{font-size:22px;font-weight:750;fill:#10243a}.h2{font-size:17px;font-weight:700;fill:#fff}.sub{font-size:12px;fill:#9eb2c9}.txt{font-size:14px;fill:#eef5fc}.small{font-size:12px;fill:#d4e1ed}.panel{fill:#101c2d;stroke:#40536b;stroke-width:1.5}.block{fill:#18283d}.input{fill:#091423;stroke:#344d68;stroke-width:1}.accent{fill:#53c7ee}.button{fill:#20364f;stroke:#466684}.call{fill:#f5fbfe;stroke:#49bfe9;stroke-width:2}.note{font-size:13px;fill:#25374d}.line{stroke:#49bfe9;stroke-width:2;fill:none}.warn{fill:#332819;stroke:#d89b41}.warntext{fill:#ffd89a;font-size:12px}.step{fill:#153f56;stroke:#53c7ee}.stepnum{font-size:15px;font-weight:800;fill:#fff}
    </style>
  </defs>
  <rect width="1400" height="940" fill="#e9f1f6"/>
  <text x="36" y="44" class="ui h1">Bounds event workflow: no-code first, registered operation when needed</text>
  <text x="36" y="69" class="ui note">One Event Block owns the trigger and ordered actions. Engine events are typed; arbitrary behavior stays behind the existing Call/OpRegistry extension boundary.</text>

  <!-- Step 1 -->
  <circle cx="51" cy="119" r="18" class="step"/><text x="46" y="125" class="ui stepnum">1</text><text x="80" y="125" class="ui note" font-weight="700">Choose a typed engine event</text>
  <rect x="36" y="145" width="420" height="715" rx="10" class="panel" filter="url(#shadow)"/>
  <g class="ui">
    <text x="62" y="181" class="sub">SELECTION / STARS</text><text x="62" y="209" class="h2">Actions / Events</text>
    <rect x="60" y="232" width="372" height="58" rx="7" class="block"/><text x="76" y="257" class="txt" font-weight="700">⌄  When Stars wrap vertically</text><text x="76" y="278" class="sub">Bounds • Wrapped • Y • Any side</text>
    <text x="76" y="320" class="sub">Event name</text><rect x="76" y="330" width="340" height="36" rx="5" class="input"/><text x="89" y="353" class="txt">When Stars wrap vertically</text>
    <text x="76" y="397" class="sub">Trigger</text><rect x="76" y="407" width="340" height="36" rx="5" class="input"/><text x="89" y="430" class="txt">Bounds</text><text x="392" y="430" class="txt">⌄</text>
    <text x="76" y="474" class="sub">Event</text><rect x="76" y="484" width="340" height="36" rx="5" class="input"/><text x="89" y="507" class="txt">Wrapped</text><text x="392" y="507" class="txt">⌄</text>
    <text x="76" y="551" class="sub">Axis</text><text x="254" y="551" class="sub">Side</text><rect x="76" y="561" width="154" height="36" rx="5" class="input"/><text x="89" y="584" class="txt">Y</text><text x="206" y="584" class="txt">⌄</text><rect x="254" y="561" width="162" height="36" rx="5" class="input"/><text x="267" y="584" class="txt">Any</text><text x="392" y="584" class="txt">⌄</text>
    <rect x="76" y="626" width="340" height="62" rx="6" fill="#0d2433" stroke="#2e6b85"/><text x="91" y="650" class="small" font-weight="700">Event context supplied at runtime</text><text x="91" y="672" class="sub">source member • axis • side • outcome • positions</text>
    <rect x="76" y="720" width="340" height="43" rx="6" class="button"/><text x="184" y="747" class="txt" font-weight="700">+ Add Action</text>
    <text x="76" y="800" class="sub">Wiring</text><text x="76" y="824" class="small">Bounds/Wrapped/Y → ordered action steps</text>
  </g>

  <!-- Step 2 -->
  <circle cx="501" cy="119" r="18" class="step"/><text x="496" y="125" class="ui stepnum">2</text><text x="530" y="125" class="ui note" font-weight="700">Compose the consequence with no-code actions</text>
  <rect x="486" y="145" width="450" height="715" rx="10" class="panel" filter="url(#shadow)"/>
  <g class="ui">
    <text x="512" y="181" class="sub">ACTION STEP</text><text x="512" y="209" class="h2">Set Property</text><text x="512" y="231" class="sub">Runs once for each Bounds event occurrence</text>
    <text x="512" y="274" class="sub">Target</text><rect x="512" y="284" width="398" height="36" rx="5" class="input"/><text x="525" y="307" class="txt">Event source</text><text x="886" y="307" class="txt">⌄</text>
    <rect x="512" y="334" width="398" height="49" rx="6" fill="#0d2433" stroke="#2e6b85"/><text x="527" y="355" class="small" font-weight="700">Event source</text><text x="527" y="374" class="sub">The individual star that wrapped—not all 400 members.</text>
    <text x="512" y="420" class="sub">Property</text><rect x="512" y="430" width="398" height="36" rx="5" class="input"/><text x="525" y="453" class="txt">X position</text><text x="886" y="453" class="txt">⌄</text>
    <text x="512" y="497" class="sub">Value</text><rect x="512" y="507" width="398" height="36" rx="5" class="input"/><text x="525" y="530" class="txt">Random range</text><text x="886" y="530" class="txt">⌄</text>
    <text x="512" y="574" class="sub">Min</text><text x="716" y="574" class="sub">Max</text><rect x="512" y="584" width="180" height="36" rx="5" class="input"/><text x="525" y="607" class="txt">0</text><rect x="716" y="584" width="194" height="36" rx="5" class="input"/><text x="729" y="607" class="txt">720</text>
    <text x="512" y="651" class="sub">Seed</text><rect x="512" y="661" width="274" height="36" rx="5" class="input"/><text x="525" y="684" class="txt">stars-wrap-01</text><rect x="796" y="661" width="114" height="36" rx="5" class="button"/><text x="827" y="684" class="txt">Reroll</text>
    <rect x="512" y="727" width="398" height="67" rx="6" fill="#123343" stroke="#3a829d"/><text x="527" y="751" class="small" font-weight="700">Readable wiring summary</text><text x="527" y="775" class="small">Set event source X to random 0..720</text>
    <text x="512" y="829" class="sub">Additional actions can follow in the same sequence.</text>
  </g>

  <!-- Step 3 / low-code boundary -->
  <circle cx="981" cy="119" r="18" class="step"/><text x="976" y="125" class="ui stepnum">3</text><text x="1010" y="125" class="ui note" font-weight="700">Use low-code only when built-ins cannot express it</text>
  <rect x="966" y="145" width="398" height="715" rx="10" class="panel" filter="url(#shadow)"/>
  <g class="ui">
    <text x="992" y="181" class="sub">OPTIONAL ACTION STEP</text><text x="992" y="209" class="h2">Call Operation</text><text x="992" y="231" class="sub">Existing extension mechanism, made explicit</text>
    <text x="992" y="274" class="sub">Operation</text><rect x="992" y="284" width="346" height="36" rx="5" class="input"/><text x="1005" y="307" class="txt">Custom registered operation…</text><text x="1314" y="307" class="txt">⌄</text>
    <rect x="992" y="340" width="346" height="92" rx="6" class="warn"/><text x="1008" y="364" class="ui warntext" font-weight="700">Low-code boundary</text><text x="1008" y="386" class="ui warntext">This operation must be registered by the game host.</text><text x="1008" y="407" class="ui warntext">The editor stores the ID and validated arguments;</text><text x="1008" y="424" class="ui warntext">it does not execute arbitrary source code.</text>
    <text x="992" y="470" class="sub">Call ID</text><rect x="992" y="480" width="346" height="36" rx="5" class="input"/><text x="1005" y="503" class="txt">stars.choose_special_color</text>
    <text x="992" y="547" class="sub">Target</text><rect x="992" y="557" width="346" height="36" rx="5" class="input"/><text x="1005" y="580" class="txt">Event source</text><text x="1314" y="580" class="txt">⌄</text>
    <text x="992" y="624" class="sub">Arguments</text><rect x="992" y="634" width="346" height="108" rx="5" class="input"/><text x="1008" y="660" class="small">brightnessMin   20</text><text x="1008" y="684" class="small">brightnessMax   255</text><text x="1008" y="716" class="sub">Advanced JSON…</text>
    <rect x="992" y="768" width="346" height="54" rx="6" fill="#17283d"/><text x="1008" y="790" class="small" font-weight="700">Missing registration behavior</text><text x="1008" y="811" class="sub">Validation warning + safe runtime no-op; never silent.</text>
  </g>

  <!-- Flow arrows and notes -->
  <path d="M456 500 H476" class="line"/><path d="M469 493 l9 7-9 7" fill="#49bfe9"/><path d="M936 500 H956" class="line"/><path d="M949 493 l9 7-9 7" fill="#49bfe9"/>
  <rect x="50" y="874" width="1314" height="52" rx="8" class="call"/><text x="70" y="895" class="ui note"><tspan font-weight="700">Product boundary:</tspan><tspan> typed engine events + composable registered actions are the primary no-code workflow.</tspan><tspan x="70" dy="19">Custom Call is an explicit extension point—not a reason to add endless special-case event controls.</tspan></text>
</svg>
