<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg{fill:#0b1020}
      .panel{fill:#111a33;stroke:#2a3a6a;stroke-width:2;rx:16}
      .canvas{fill:#0f1630;stroke:#2a3a6a;stroke-width:2;rx:16}
      .bar{fill:#0f1733;stroke:#2a3a6a;stroke-width:2;rx:16}
      .btn{fill:#16244a;stroke:#2a3a6a;stroke-width:1.5;rx:12}
      .pill{fill:#101a36;stroke:#2a3a6a;stroke-width:1.5;rx:999}
      .hint{fill:#0b1a2b;stroke:#2be4a7;stroke-width:1.5;rx:14}
      .title{fill:#e8eeff;font:700 26px system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
      .h{fill:#cfe0ff;font:700 16px system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
      .t{fill:#d6def7;font:500 14px system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
      .muted{fill:#a9b6df;font:500 13px system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
      .mono{fill:#d6def7;font:600 12.5px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace}
    </style>
  </defs>
  <rect class="bg" width="1400" height="900"/>

  <text class="title" x="44" y="60">04 — Viewport Navigation: Copy Fix + Space Hint</text>
  <text class="muted" x="44" y="86">Ensure instructions match behavior; hint appears only while Space is held.</text>

  <g transform="translate(44,120)">
    <rect class="panel" x="0" y="0" width="1312" height="700" rx="16"/>
    <text class="h" x="18" y="34">Viewport</text>

    <!-- viewbar -->
    <rect class="bar" x="18" y="54" width="1276" height="120" rx="16"/>
    <text class="h" x="36" y="88">Canvas</text>
    <text class="muted" x="36" y="112">Pan with middle mouse or</text>
    <text class="mono" x="214" y="112">Space + drag</text>
    <text class="muted" x="330" y="112">. Use zoom controls to inspect spacing and bounds.</text>

    <!-- controls -->
    <rect class="btn" x="870" y="78" width="64" height="36" rx="12"/>
    <text class="t" x="890" y="102">Fit</text>
    <rect class="btn" x="940" y="78" width="78" height="36" rx="12"/>
    <text class="t" x="958" y="102">Reset</text>
    <rect class="btn" x="1026" y="78" width="44" height="36" rx="12"/>
    <text class="t" x="1042" y="102">-</text>
    <rect class="pill" x="1076" y="78" width="72" height="36" rx="999"/>
    <text class="t" x="1096" y="102">100%</text>
    <rect class="btn" x="1156" y="78" width="44" height="36" rx="12"/>
    <text class="t" x="1172" y="102">+</text>

    <!-- canvas -->
    <rect class="canvas" x="18" y="190" width="1276" height="492" rx="16"/>
    <text class="muted" x="36" y="224">While Space is held, show a subtle hint (no focus capture).</text>

    <!-- space hint overlay -->
    <g transform="translate(980,240)">
      <rect class="hint" x="0" y="0" width="290" height="70" rx="14"/>
      <text class="t" x="16" y="30">Pan mode: drag to move view</text>
      <text class="muted" x="16" y="52">Release Space to exit</text>
    </g>
  </g>
</svg>

