<svg xmlns="http://www.w3.org/2000/svg" width="980" height="640" viewBox="0 0 980 640">
  <defs>
    <style>
      .bg { fill: #0b1020; }
      .card { fill: #111a33; stroke: #2b3a6a; stroke-width: 2; }
      .title { fill: #ffffff; font: 700 22px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      .h { fill: #cfe0ff; font: 700 16px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      .t { fill: #e6eeff; font: 500 14px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      .muted { fill: #a9b8df; font: 500 12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      .rule { stroke: #2b3a6a; stroke-width: 1; opacity: 0.9; }
      .btn { fill: #18244a; stroke: #3552a5; stroke-width: 1.5; rx: 10; ry: 10; }
      .btnText { fill: #eaf1ff; font: 700 12px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      .chip { fill: #0e1733; stroke: #3552a5; stroke-width: 1.2; rx: 8; ry: 8; }
      .input { fill: #0e1733; stroke: #2b3a6a; stroke-width: 1.2; rx: 8; ry: 8; }
      .focus { stroke: #7aa7ff; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="980" height="640"/>

  <!-- Popover card -->
  <rect class="card" x="80" y="60" width="520" height="520" rx="18" ry="18"/>

  <text class="title" x="112" y="104">Layout</text>
  <text class="muted" x="182" y="104">Multi-select is selection-aware (non-stacking)</text>
  <line class="rule" x1="112" y1="122" x2="568" y2="122"/>

  <!-- Arrange Items -->
  <text class="h" x="112" y="156">Arrange Items</text>
  <text class="muted" x="235" y="156">changes spacing between items</text>

  <text class="t" x="112" y="190">X:</text>
  <rect class="btn" x="140" y="172" width="160" height="28"/>
  <text class="btnText" x="220" y="191" text-anchor="middle">Distribute Evenly</text>
  <rect class="chip" x="312" y="172" width="142" height="28"/>
  <text class="btnText" x="383" y="191" text-anchor="middle">Order: Left→Right</text>

  <text class="t" x="112" y="228">X:</text>
  <rect class="input" x="140" y="210" width="120" height="28"/>
  <text class="t" x="154" y="229">Fixed Spacing</text>
  <rect class="input" x="268" y="210" width="64" height="28"/>
  <text class="t" x="300" y="229" text-anchor="middle">200</text>
  <text class="t" x="338" y="229">px</text>
  <rect class="btn" x="372" y="210" width="82" height="28"/>
  <text class="btnText" x="413" y="229" text-anchor="middle">Apply</text>

  <text class="t" x="112" y="268">Y:</text>
  <rect class="btn" x="140" y="250" width="160" height="28"/>
  <text class="btnText" x="220" y="269" text-anchor="middle">Distribute Evenly</text>

  <text class="t" x="112" y="306">Y:</text>
  <rect class="input" x="140" y="288" width="120" height="28"/>
  <text class="t" x="154" y="307">Fixed Spacing</text>
  <rect class="input" x="268" y="288" width="64" height="28"/>
  <text class="t" x="300" y="307" text-anchor="middle">120</text>
  <text class="t" x="338" y="307">px</text>
  <rect class="btn" x="372" y="288" width="82" height="28"/>
  <text class="btnText" x="413" y="307" text-anchor="middle">Apply</text>

  <line class="rule" x1="112" y1="336" x2="568" y2="336"/>

  <!-- Position Selection -->
  <text class="h" x="112" y="368">Position Selection</text>
  <text class="muted" x="260" y="368">moves selection bounds; preserves spacing</text>

  <text class="t" x="112" y="402">Set:</text>
  <text class="t" x="152" y="402">X</text>
  <rect class="input" x="168" y="384" width="82" height="28"/>
  <text class="t" x="209" y="403" text-anchor="middle">400</text>
  <rect class="btn" x="258" y="384" width="54" height="28"/>
  <text class="btnText" x="285" y="403" text-anchor="middle">Set</text>

  <text class="t" x="326" y="402">Y</text>
  <rect class="input focus" x="342" y="384" width="82" height="28"/>
  <text class="t" x="383" y="403" text-anchor="middle">450</text>
  <rect class="btn" x="432" y="384" width="54" height="28"/>
  <text class="btnText" x="459" y="403" text-anchor="middle">Set</text>

  <rect class="btn" x="496" y="384" width="72" height="28"/>
  <text class="btnText" x="532" y="403" text-anchor="middle">Set X+Y</text>

  <text class="t" x="112" y="446">Align:</text>
  <text class="muted" x="162" y="446">applies to selection bounds (no stacking)</text>

  <text class="t" x="112" y="478">X:</text>
  <rect class="btn" x="140" y="460" width="68" height="28"/>
  <text class="btnText" x="174" y="479" text-anchor="middle">Left</text>
  <rect class="btn" x="216" y="460" width="78" height="28"/>
  <text class="btnText" x="255" y="479" text-anchor="middle">Center</text>
  <rect class="btn" x="302" y="460" width="78" height="28"/>
  <text class="btnText" x="341" y="479" text-anchor="middle">Right</text>
  <rect class="chip" x="392" y="460" width="176" height="28"/>
  <text class="btnText" x="480" y="479" text-anchor="middle">Center targets World</text>

  <text class="t" x="112" y="516">Y:</text>
  <rect class="btn" x="140" y="498" width="68" height="28"/>
  <text class="btnText" x="174" y="517" text-anchor="middle">Top</text>
  <rect class="btn" x="216" y="498" width="78" height="28"/>
  <text class="btnText" x="255" y="517" text-anchor="middle">Center</text>
  <rect class="btn" x="302" y="498" width="78" height="28"/>
  <text class="btnText" x="341" y="517" text-anchor="middle">Bottom</text>

  <line class="rule" x1="112" y1="542" x2="568" y2="542"/>

  <!-- Advanced -->
  <text class="h" x="112" y="572">Advanced</text>
  <text class="muted" x="196" y="572">explicit stacking / edge matching</text>

  <rect class="btn" x="112" y="586" width="132" height="28" opacity="0.95"/>
  <text class="btnText" x="178" y="605" text-anchor="middle">Stack X Centers</text>
  <rect class="btn" x="252" y="586" width="132" height="28" opacity="0.95"/>
  <text class="btnText" x="318" y="605" text-anchor="middle">Stack Y Centers</text>
  <rect class="btn" x="392" y="586" width="132" height="28" opacity="0.95"/>
  <text class="btnText" x="458" y="605" text-anchor="middle">Match Left Edges</text>
  <rect class="btn" x="532" y="586" width="132" height="28" opacity="0.95"/>
  <text class="btnText" x="598" y="605" text-anchor="middle">Match Top Edges</text>

  <!-- Side callouts -->
  <rect class="card" x="640" y="90" width="280" height="230" rx="18" ry="18" opacity="0.98"/>
  <text class="h" x="664" y="126">What changes?</text>
  <text class="t" x="664" y="154">Multi-select Align</text>
  <text class="muted" x="664" y="174">moves the selection bounds</text>
  <text class="muted" x="664" y="192">and preserves spacing.</text>
  <text class="t" x="664" y="222">Overlap is explicit</text>
  <text class="muted" x="664" y="242">via “Stack …” actions.</text>
  <text class="t" x="664" y="272">Pattern demo flow</text>
  <text class="muted" x="664" y="292">Distribute X → Align X Center → Set Y</text>

  <rect class="card" x="640" y="350" width="280" height="200" rx="18" ry="18" opacity="0.98"/>
  <text class="h" x="664" y="386">Scope labels</text>
  <text class="muted" x="664" y="414">“Arrange Items” = internal spacing</text>
  <text class="muted" x="664" y="434">“Position Selection” = move as one</text>
  <text class="muted" x="664" y="454">(selection bounding box).</text>
</svg>

