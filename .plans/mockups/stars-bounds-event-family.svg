<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Complete finite Bounds event family</title>
  <desc id="desc">PhaserForge Event Block trigger editor with the complete Bounds event outcome selector: Contact Entered, Contact Exited, Wrapped, Bounced, Clamped, and Stopped, plus axis and side filters, compatibility guidance, and concise semantics.</desc>
  <defs><filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#00101f" flood-opacity=".28"/></filter><style>.ui{font-family:Inter,system-ui,sans-serif}.h1{font-size:22px;font-weight:750;fill:#10243a}.h2{font-size:18px;font-weight:700;fill:#fff}.sub{font-size:12px;fill:#9eb2c9}.txt{font-size:14px;fill:#eef5fc}.small{font-size:12px;fill:#d4e1ed}.panel{fill:#101c2d;stroke:#40536b;stroke-width:1.5}.block{fill:#18283d}.input{fill:#091423;stroke:#344d68}.menu{fill:#111f31;stroke:#4a6480}.selected{fill:#17445a}.card{fill:#f8fcfe;stroke:#a9c6d5}.title{font-size:14px;font-weight:700;fill:#163149}.note{font-size:12px;fill:#385169}.badge{fill:#dff4fb;stroke:#72c8e7}.badgetxt{font-size:11px;font-weight:700;fill:#17617a}.call{fill:#f5fbfe;stroke:#49bfe9;stroke-width:2}.line{stroke:#49bfe9;stroke-width:2;fill:none}</style></defs>
  <rect width="1280" height="860" fill="#e9f1f6"/><text x="36" y="44" class="ui h1">Bounds trigger: one finite event family</text><text x="36" y="69" class="ui note">The Event selector exposes six stable engine outcomes. Axis and Side refine the event; no behavior-specific callback fields or scripts are added.</text>

  <rect x="42" y="98" width="455" height="710" rx="10" class="panel" filter="url(#shadow)"/><g class="ui"><text x="68" y="134" class="sub">EVENT BLOCK / TRIGGER</text><text x="68" y="162" class="h2">When a boundary event occurs</text>
  <text x="68" y="207" class="sub">Trigger</text><rect x="68" y="217" width="403" height="36" rx="5" class="input"/><text x="81" y="240" class="txt">Bounds</text><text x="447" y="240" class="txt">⌄</text>
  <text x="68" y="284" class="sub">Event</text><rect x="68" y="294" width="403" height="36" rx="5" class="input"/><text x="81" y="317" class="txt">Wrapped</text><text x="447" y="317" class="txt">⌃</text>
  <rect x="68" y="334" width="403" height="244" rx="6" class="menu"/>
  <rect x="73" y="339" width="393" height="36" rx="4" fill="transparent"/><text x="88" y="362" class="txt">Contact Entered</text><text x="337" y="362" class="sub">Any behavior</text>
  <rect x="73" y="378" width="393" height="36" rx="4" fill="transparent"/><text x="88" y="401" class="txt">Contact Exited</text><text x="337" y="401" class="sub">Any behavior</text>
  <rect x="73" y="417" width="393" height="36" rx="4" class="selected"/><text x="88" y="440" class="txt" font-weight="700">✓  Wrapped</text><text x="372" y="440" class="small">Wrap</text>
  <rect x="73" y="456" width="393" height="36" rx="4" fill="transparent"/><text x="88" y="479" class="txt">Bounced</text><text x="362" y="479" class="sub">Bounce</text>
  <rect x="73" y="495" width="393" height="36" rx="4" fill="transparent"/><text x="88" y="518" class="txt">Clamped</text><text x="327" y="518" class="sub">Clamp at Edge</text>
  <rect x="73" y="534" width="393" height="36" rx="4" fill="transparent"/><text x="88" y="557" class="txt">Stopped</text><text x="376" y="557" class="sub">Stop</text>
  <text x="68" y="615" class="sub">Axis</text><text x="279" y="615" class="sub">Side</text><rect x="68" y="625" width="187" height="36" rx="5" class="input"/><text x="81" y="648" class="txt">Y</text><text x="231" y="648" class="txt">⌄</text><rect x="279" y="625" width="192" height="36" rx="5" class="input"/><text x="292" y="648" class="txt">Any</text><text x="447" y="648" class="txt">⌄</text>
  <rect x="68" y="686" width="403" height="73" rx="6" fill="#113343" stroke="#3a829d"/><text x="83" y="710" class="small" font-weight="700">Wrapped • compatible with Wrap</text><text x="83" y="732" class="sub">Fires after the source is relocated to the opposite edge.</text><text x="83" y="750" class="sub">Event source is the member that wrapped.</text><text x="68" y="790" class="sub">Incompatible outcomes remain discoverable with guidance.</text></g>

  <text x="548" y="119" class="ui title" font-size="16">Stable event meanings</text>
  <g class="ui">
    <rect x="548" y="140" width="686" height="86" rx="8" class="card"/><text x="568" y="166" class="title">Contact Entered</text><rect x="1105" y="151" width="108" height="24" rx="12" class="badge"/><text x="1123" y="167" class="badgetxt">ANY BEHAVIOR</text><text x="568" y="191" class="note">Boundary contact begins on the filtered axis and side.</text><text x="568" y="210" class="note">Fires before a behavior-specific outcome for the same crossing.</text>
    <rect x="548" y="238" width="686" height="86" rx="8" class="card"/><text x="568" y="264" class="title">Contact Exited</text><rect x="1105" y="249" width="108" height="24" rx="12" class="badge"/><text x="1123" y="265" class="badgetxt">ANY BEHAVIOR</text><text x="568" y="289" class="note">A previously active boundary contact clears.</text><text x="568" y="308" class="note">A wrap relocation produces its exit deterministically when contact state clears.</text>
    <rect x="548" y="336" width="330" height="112" rx="8" class="card"/><text x="568" y="362" class="title">Wrapped</text><rect x="787" y="347" width="70" height="24" rx="12" class="badge"/><text x="805" y="363" class="badgetxt">WRAP</text><text x="568" y="388" class="note">Source moved to the opposite edge.</text><text x="568" y="407" class="note">Position in context is post-wrap.</text><text x="568" y="426" class="note">Stars uses this outcome.</text>
    <rect x="904" y="336" width="330" height="112" rx="8" class="card"/><text x="924" y="362" class="title">Bounced</text><rect x="1134" y="347" width="79" height="24" rx="12" class="badge"/><text x="1147" y="363" class="badgetxt">BOUNCE</text><text x="924" y="388" class="note">Velocity inverted on the affected axis.</text><text x="924" y="407" class="note">Context exposes the resolved velocity,</text><text x="924" y="426" class="note">not an editable callback object.</text>
    <rect x="548" y="462" width="330" height="112" rx="8" class="card"/><text x="568" y="488" class="title">Clamped</text><rect x="759" y="473" width="98" height="24" rx="12" class="badge"/><text x="774" y="489" class="badgetxt">CLAMP EDGE</text><text x="568" y="514" class="note">Position corrected to remain in bounds.</text><text x="568" y="533" class="note">Outward motion is prevented according</text><text x="568" y="552" class="note">to existing Clamp at Edge semantics.</text>
    <rect x="904" y="462" width="330" height="112" rx="8" class="card"/><text x="924" y="488" class="title">Stopped</text><rect x="1148" y="473" width="65" height="24" rx="12" class="badge"/><text x="1164" y="489" class="badgetxt">STOP</text><text x="924" y="514" class="note">Position corrected and affected velocity</text><text x="924" y="533" class="note">zeroed before the event is delivered.</text><text x="924" y="552" class="note">Movement completion stays unchanged.</text>
  </g>
  <rect x="548" y="607" width="686" height="143" rx="8" class="call"/><text x="568" y="634" class="ui title">Deterministic ordering</text><text x="568" y="661" class="ui note">1. Contact Entered</text><text x="568" y="684" class="ui note">2. Applied outcome: Wrapped, Bounced, Clamped, or Stopped</text><text x="568" y="707" class="ui note">3. Contact Exited when contact state clears</text><text x="568" y="734" class="ui note">Simultaneous events use stable member order, then X before Y.</text><path d="M548 678 H512 L470 435" class="line"/>
  <rect x="548" y="774" width="686" height="34" rx="7" class="call"/><text x="565" y="796" class="ui note"><tspan font-weight="700">Finite family:</tspan> future boundary behavior does not imply a new callback language or a new one-off action type.</text>
</svg>
