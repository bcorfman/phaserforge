<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
        --warn:#ffb86a;
        --danger:#ff6a7a;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:800;}
      .label{fill:var(--muted); font-size:13px; font-weight:700;}
      .small{fill:var(--muted); font-size:12px;}
      .tiny{fill:var(--muted); font-size:11px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .divider{stroke:rgba(106,167,255,0.18); stroke-width:1;}
      .chip{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .chipAccent{fill:rgba(106,167,255,0.18); stroke:rgba(106,167,255,0.7); stroke-width:1;}
      .untilRow{fill:rgba(255,184,106,0.10); stroke:rgba(255,184,106,0.85); stroke-width:1;}
      .actionRow{fill:rgba(124,240,199,0.08); stroke:rgba(124,240,199,0.65); stroke-width:1;}
      .devRow{fill:rgba(255,106,122,0.08); stroke:rgba(255,106,122,0.7); stroke-width:1;}
      .nodeText{fill:var(--text); font-size:12px; font-weight:900;}
      .nodeTextMuted{fill:var(--muted); font-size:12px; font-weight:800;}
      .callout{fill:rgba(124,240,199,0.10); stroke:var(--accent2); stroke-width:1; stroke-dasharray:6 6;}
      .calloutText{fill:var(--text); font-size:12px; font-weight:900;}
      .shadow{filter:url(#shadow);}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="720" rx="16" fill="var(--bg)"/>
  <rect x="24" y="18" width="1152" height="54" rx="10" class="panel"/>
  <text x="46" y="50" class="title">Approach 3 — Low-code escape hatch: “Until Predicate” registry with schemas (editor-native UI)</text>

  <!-- Left: Predicate library -->
  <rect x="24" y="90" width="380" height="606" rx="12" class="panel"/>
  <text x="46" y="122" class="label">Until Library</text>
  <line x1="24" y1="140" x2="404" y2="140" class="divider"/>
  <rect x="46" y="156" width="336" height="30" rx="10" class="chip"/>
  <text x="58" y="176" class="nodeTextMuted">Search until conditions…</text>

  <text x="46" y="216" class="small">Built-in</text>
  <rect x="46" y="232" width="336" height="30" rx="10" class="untilRow"/>
  <text x="58" y="252" class="nodeText">Until: Time Elapsed</text>
  <rect x="46" y="266" width="336" height="30" rx="10" class="untilRow"/>
  <text x="58" y="286" class="nodeText">Until: Collision with…</text>
  <rect x="46" y="300" width="336" height="30" rx="10" class="untilRow"/>
  <text x="58" y="320" class="nodeText">Until: Query result is true</text>

  <text x="46" y="366" class="small">Project predicates (low-code)</text>
  <rect x="46" y="382" width="336" height="30" rx="10" class="devRow"/>
  <text x="58" y="402" class="nodeText">Until: PlayerInLaserField(fieldId)</text>
  <rect x="46" y="416" width="336" height="30" rx="10" class="devRow"/>
  <text x="58" y="436" class="nodeText">Until: GateUnlocked(keyTag)</text>
  <rect x="46" y="450" width="336" height="30" rx="10" class="devRow"/>
  <text x="58" y="470" class="nodeText">Until: ScoreAtLeast(amount)</text>

  <rect x="46" y="560" width="336" height="116" rx="12" class="callout"/>
  <text x="66" y="588" class="calloutText">Key scaling idea</text>
  <text x="66" y="610" class="tiny">Dev writes a predicate + JSON schema once.</text>
  <text x="66" y="630" class="tiny">Non-coders see it as a normal “Until…” with inputs.</text>
  <text x="66" y="650" class="tiny">No freeform code in the editor.</text>

  <!-- Right: Editor using a project predicate -->
  <rect x="428" y="90" width="748" height="606" rx="12" class="panel"/>
  <text x="452" y="122" class="label">Events — LaserGateGroup</text>
  <line x1="428" y1="140" x2="1176" y2="140" class="divider"/>

  <rect x="452" y="156" width="700" height="44" rx="12" class="panel2"/>
  <rect x="474" y="166" width="230" height="24" rx="8" class="chipAccent"/>
  <text x="488" y="184" class="nodeText">Add Action… (⌘K)</text>
  <rect x="712" y="166" width="200" height="24" rx="8" class="chip"/>
  <text x="724" y="184" class="nodeTextMuted">Add Until…</text>
  <rect x="920" y="166" width="232" height="24" rx="8" class="chip"/>
  <text x="932" y="184" class="nodeTextMuted">Open Registry</text>

  <rect x="452" y="214" width="700" height="30" rx="10" class="actionRow"/>
  <text x="472" y="234" class="nodeText">Action: Close Gate</text>
  <rect x="472" y="248" width="680" height="30" rx="10" class="untilRow"/>
  <text x="492" y="268" class="nodeText">Until: PlayerInLaserField(fieldId = "A")</text>

  <!-- Predicate configuration popover -->
  <rect x="610" y="292" width="520" height="230" rx="14" class="panel shadow"/>
  <text x="634" y="326" class="nodeText">Configure “Until: PlayerInLaserField”</text>
  <text x="634" y="354" class="small">fieldId</text>
  <rect x="634" y="366" width="472" height="30" rx="10" class="chip"/>
  <text x="646" y="386" class="nodeTextMuted">A</text>
  <text x="634" y="424" class="small">Preview</text>
  <rect x="634" y="438" width="472" height="30" rx="10" class="chip"/>
  <text x="646" y="458" class="nodeTextMuted">Stops when: player overlaps LaserField “A”</text>
  <rect x="634" y="480" width="220" height="30" rx="10" class="chip"/>
  <text x="646" y="500" class="nodeTextMuted">Test (simulate)</text>
  <rect x="886" y="480" width="220" height="30" rx="10" class="chipAccent"/>
  <text x="904" y="500" class="nodeText">Use</text>
</svg>

