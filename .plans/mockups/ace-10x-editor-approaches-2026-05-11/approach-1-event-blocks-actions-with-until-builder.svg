<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
        --warn:#ffb86a;
        --danger:#ff6a7a;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:800;}
      .label{fill:var(--muted); font-size:13px; font-weight:700;}
      .small{fill:var(--muted); font-size:12px;}
      .tiny{fill:var(--muted); font-size:11px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .divider{stroke:rgba(106,167,255,0.18); stroke-width:1;}

      .chip{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .chipAccent{fill:rgba(106,167,255,0.18); stroke:rgba(106,167,255,0.7); stroke-width:1;}
      .eventHdr{fill:rgba(106,167,255,0.14); stroke:rgba(106,167,255,0.9); stroke-width:1;}
      .actionRow{fill:rgba(124,240,199,0.08); stroke:rgba(124,240,199,0.65); stroke-width:1;}
      .untilRow{fill:rgba(255,184,106,0.10); stroke:rgba(255,184,106,0.85); stroke-width:1;}
      .nodeText{fill:var(--text); font-size:12px; font-weight:900;}
      .nodeTextMuted{fill:var(--muted); font-size:12px; font-weight:800;}
      .callout{fill:rgba(124,240,199,0.10); stroke:var(--accent2); stroke-width:1; stroke-dasharray:6 6;}
      .calloutText{fill:var(--text); font-size:12px; font-weight:900;}
      .shadow{filter:url(#shadow);}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="720" rx="16" fill="var(--bg)"/>
  <rect x="24" y="18" width="1152" height="54" rx="10" class="panel"/>
  <text x="46" y="50" class="title">Approach 1 — Event Blocks + Actions with “Until…” builder (default no-code path)</text>

  <!-- Left: Scene targets -->
  <rect x="24" y="90" width="320" height="606" rx="12" class="panel"/>
  <text x="46" y="122" class="label">Scene</text>
  <line x1="24" y1="140" x2="344" y2="140" class="divider"/>
  <rect x="46" y="156" width="276" height="30" rx="10" class="chip"/>
  <text x="58" y="176" class="nodeTextMuted">Search sprites/groups…</text>
  <rect x="46" y="210" width="276" height="30" rx="10" class="chipAccent"/>
  <text x="58" y="230" class="nodeText">Player</text>
  <rect x="46" y="244" width="276" height="30" rx="10" class="chip"/>
  <text x="58" y="264" class="nodeTextMuted">LaserGateGroup</text>

  <rect x="46" y="560" width="276" height="116" rx="12" class="callout"/>
  <text x="66" y="588" class="calloutText">ArcadeActions-inspired</text>
  <text x="66" y="610" class="tiny">Every action is “*Until”.</text>
  <text x="66" y="630" class="tiny">Editor helps choose a stop condition (“Until…”) with presets.</text>
  <text x="66" y="650" class="tiny">No variables required for the common cases (time, collision, input).</text>

  <!-- Right: Event blocks editor -->
  <rect x="368" y="90" width="808" height="606" rx="12" class="panel"/>
  <text x="392" y="122" class="label">Events — Player</text>
  <line x1="368" y1="140" x2="1176" y2="140" class="divider"/>

  <!-- Controls -->
  <rect x="392" y="156" width="760" height="44" rx="12" class="panel2"/>
  <rect x="414" y="166" width="170" height="24" rx="8" class="chipAccent"/>
  <text x="428" y="184" class="nodeText">+ Add Event</text>
  <rect x="592" y="166" width="260" height="24" rx="8" class="chip"/>
  <text x="604" y="184" class="nodeTextMuted">Add Action… (search)</text>
  <rect x="860" y="166" width="292" height="24" rx="8" class="chip"/>
  <text x="872" y="184" class="nodeTextMuted">Save selection → Snippet</text>

  <!-- Event: On Input -->
  <rect x="392" y="214" width="760" height="34" rx="10" class="eventHdr"/>
  <text x="412" y="236" class="nodeText">Event: On Input (Space)</text>

  <!-- Action 1 -->
  <rect x="412" y="256" width="740" height="30" rx="10" class="actionRow"/>
  <text x="432" y="276" class="nodeText">Action: Move (dx: 0, dy: -40)</text>
  <rect x="432" y="290" width="720" height="30" rx="10" class="untilRow"/>
  <text x="452" y="310" class="nodeText">Until: Time Elapsed (120ms)</text>

  <!-- Action 2 -->
  <rect x="412" y="334" width="740" height="30" rx="10" class="actionRow"/>
  <text x="432" y="354" class="nodeText">Action: Play Sound (jump)</text>
  <rect x="432" y="368" width="720" height="30" rx="10" class="untilRow"/>
  <text x="452" y="388" class="nodeText">Until: Instant (0 frames)</text>

  <!-- Parallel group (optional) -->
  <rect x="412" y="420" width="740" height="30" rx="10" class="chipAccent"/>
  <text x="432" y="440" class="nodeText">Parallel (2 branches)</text>
  <rect x="432" y="454" width="350" height="30" rx="10" class="actionRow"/>
  <text x="452" y="474" class="nodeText">Branch A: Glow (intensity 1.0)</text>
  <rect x="452" y="488" width="330" height="30" rx="10" class="untilRow"/>
  <text x="468" y="508" class="nodeText">Until: Time Elapsed (200ms)</text>
  <rect x="802" y="454" width="350" height="30" rx="10" class="actionRow"/>
  <text x="822" y="474" class="nodeText">Branch B: Emit Particles</text>
  <rect x="822" y="488" width="330" height="30" rx="10" class="untilRow"/>
  <text x="838" y="508" class="nodeText">Until: Sprite Count (≤ 0)</text>

  <!-- Floating Until builder (for selected action) -->
  <rect x="620" y="235" width="520" height="250" rx="14" class="panel shadow"/>
  <text x="644" y="270" class="nodeText">Until…</text>
  <rect x="644" y="284" width="472" height="30" rx="10" class="chip"/>
  <text x="656" y="304" class="nodeTextMuted">Search: “time”, “collision”, “input”, “sprite count”…</text>

  <rect x="644" y="324" width="472" height="32" rx="12" class="chipAccent"/>
  <text x="656" y="345" class="nodeText">Time Elapsed</text>
  <rect x="644" y="362" width="472" height="32" rx="12" class="chip"/>
  <text x="656" y="383" class="nodeText">Collision with…</text>
  <rect x="644" y="400" width="472" height="32" rx="12" class="chip"/>
  <text x="656" y="421" class="nodeText">Input released</text>
  <rect x="644" y="438" width="220" height="30" rx="10" class="chip"/>
  <text x="656" y="458" class="nodeTextMuted">ms: 120</text>
  <rect x="872" y="438" width="244" height="30" rx="10" class="chipAccent"/>
  <text x="890" y="458" class="nodeText">Insert</text>
</svg>

