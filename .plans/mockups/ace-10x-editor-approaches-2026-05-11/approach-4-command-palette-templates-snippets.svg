<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
        --warn:#ffb86a;
        --danger:#ff6a7a;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:800;}
      .label{fill:var(--muted); font-size:13px; font-weight:700;}
      .small{fill:var(--muted); font-size:12px;}
      .tiny{fill:var(--muted); font-size:11px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .divider{stroke:rgba(106,167,255,0.18); stroke-width:1;}
      .chip{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .chipAccent{fill:rgba(106,167,255,0.18); stroke:rgba(106,167,255,0.7); stroke-width:1;}
      .chipGreen{fill:rgba(124,240,199,0.10); stroke:rgba(124,240,199,0.9); stroke-width:1;}
      .nodeText{fill:var(--text); font-size:12px; font-weight:900;}
      .nodeTextMuted{fill:var(--muted); font-size:12px; font-weight:800;}
      .row{fill:rgba(124,240,199,0.08); stroke:rgba(124,240,199,0.55); stroke-width:1;}
      .until{fill:rgba(255,184,106,0.10); stroke:rgba(255,184,106,0.85); stroke-width:1;}
      .shadow{filter:url(#shadow);}
      .callout{fill:rgba(124,240,199,0.10); stroke:var(--accent2); stroke-width:1; stroke-dasharray:6 6;}
      .calloutText{fill:var(--text); font-size:12px; font-weight:900;}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="720" rx="16" fill="var(--bg)"/>
  <rect x="24" y="18" width="1152" height="54" rx="10" class="panel"/>
  <text x="46" y="50" class="title">Approach 4 — 10x speed tools: Command Palette + Templates + Snippets (copy across sprites fast)</text>

  <!-- Left: Snippets -->
  <rect x="24" y="90" width="320" height="606" rx="12" class="panel"/>
  <text x="46" y="122" class="label">Snippets</text>
  <line x1="24" y1="140" x2="344" y2="140" class="divider"/>
  <rect x="46" y="156" width="276" height="30" rx="10" class="chip"/>
  <text x="58" y="176" class="nodeTextMuted">Search snippets…</text>
  <rect x="46" y="212" width="276" height="34" rx="10" class="chipGreen"/>
  <text x="58" y="234" class="nodeText">Laser Gate: open when lasers off</text>
  <rect x="46" y="252" width="276" height="34" rx="10" class="chipGreen"/>
  <text x="58" y="274" class="nodeText">Door: close on player leave</text>
  <rect x="46" y="292" width="276" height="34" rx="10" class="chipGreen"/>
  <text x="58" y="314" class="nodeText">Button: press animation</text>

  <text x="46" y="370" class="small">Templates</text>
  <rect x="46" y="386" width="276" height="34" rx="10" class="chipAccent"/>
  <text x="58" y="408" class="nodeText">Event Template: On Input → Move+Sound</text>
  <rect x="46" y="426" width="276" height="34" rx="10" class="chipAccent"/>
  <text x="58" y="448" class="nodeText">Event Template: On Update → Query gate</text>

  <rect x="46" y="560" width="276" height="116" rx="12" class="callout"/>
  <text x="66" y="588" class="calloutText">Fast path</text>
  <text x="66" y="610" class="tiny">Drag a snippet onto any sprite/group.</text>
  <text x="66" y="630" class="tiny">Templates create the common event skeletons.</text>
  <text x="66" y="650" class="tiny">Palette inserts actions/Until without browsing.</text>

  <!-- Right: Event editor -->
  <rect x="368" y="90" width="808" height="606" rx="12" class="panel"/>
  <text x="392" y="122" class="label">Events — LaserGateGroup</text>
  <line x1="368" y1="140" x2="1176" y2="140" class="divider"/>

  <rect x="392" y="156" width="760" height="44" rx="12" class="panel2"/>
  <rect x="414" y="166" width="280" height="24" rx="8" class="chipAccent"/>
  <text x="428" y="184" class="nodeText">⌘K Command Palette</text>
  <rect x="702" y="166" width="190" height="24" rx="8" class="chip"/>
  <text x="714" y="184" class="nodeTextMuted">Drop snippet here</text>
  <rect x="900" y="166" width="252" height="24" rx="8" class="chip"/>
  <text x="912" y="184" class="nodeTextMuted">Convert selection → Snippet</text>

  <!-- Minimal event -->
  <rect x="392" y="214" width="760" height="34" rx="10" class="chipAccent"/>
  <text x="412" y="236" class="nodeText">Event: On Update</text>
  <rect x="412" y="256" width="740" height="30" rx="10" class="row"/>
  <text x="432" y="276" class="nodeText">Action: Open Gate</text>
  <rect x="432" y="290" width="720" height="30" rx="10" class="until"/>
  <text x="452" y="310" class="nodeText">Until: Query (count(tag="Laser", enabled=true) == 0)</text>

  <!-- Command palette overlay -->
  <rect x="520" y="108" width="620" height="320" rx="14" class="panel shadow"/>
  <text x="544" y="146" class="nodeText">Command Palette</text>
  <rect x="544" y="160" width="572" height="34" rx="12" class="chip"/>
  <text x="558" y="182" class="nodeTextMuted">Type: “open gate”, “until query”, “collision”, “snippet”…</text>

  <rect x="544" y="212" width="572" height="34" rx="12" class="chipAccent"/>
  <text x="558" y="234" class="nodeText">Insert Action: Open Gate</text>
  <rect x="544" y="250" width="572" height="34" rx="12" class="chipAccent"/>
  <text x="558" y="272" class="nodeText">Insert Until: Query…</text>
  <rect x="544" y="288" width="572" height="34" rx="12" class="chip"/>
  <text x="558" y="310" class="nodeText">Insert Template: Gate logic</text>
  <rect x="544" y="326" width="572" height="34" rx="12" class="chip"/>
  <text x="558" y="348" class="nodeText">Apply Snippet: Laser Gate (open when lasers off)</text>

  <rect x="544" y="376" width="90" height="24" rx="8" class="chip"/>
  <text x="566" y="393" class="tiny">Enter</text>
  <text x="642" y="393" class="tiny">to apply to current selection</text>
</svg>

