<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      :root{
        --bg:#0b1020;
        --panel:#111a33;
        --panel2:#0f1730;
        --stroke:#33406a;
        --text:#e7ecff;
        --muted:#aab4e6;
        --accent:#6aa7ff;
        --accent2:#7cf0c7;
        --warn:#ffb86a;
        --danger:#ff6a7a;
      }
      text{font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
      .title{fill:var(--text); font-size:18px; font-weight:800;}
      .label{fill:var(--muted); font-size:13px; font-weight:800;}
      .small{fill:var(--muted); font-size:12px;}
      .tiny{fill:var(--muted); font-size:11px;}
      .panel{fill:var(--panel); stroke:var(--stroke); stroke-width:1;}
      .panel2{fill:var(--panel2); stroke:var(--stroke); stroke-width:1;}
      .divider{stroke:rgba(106,167,255,0.18); stroke-width:1;}

      .chip{fill:#0c1430; stroke:var(--stroke); stroke-width:1;}
      .chipAccent{fill:rgba(106,167,255,0.18); stroke:rgba(106,167,255,0.75); stroke-width:1;}
      .chipGreen{fill:rgba(124,240,199,0.10); stroke:rgba(124,240,199,0.9); stroke-width:1;}
      .chipWarn{fill:rgba(255,184,106,0.10); stroke:rgba(255,184,106,0.9); stroke-width:1;}

      .eventHdr{fill:rgba(106,167,255,0.14); stroke:rgba(106,167,255,0.9); stroke-width:1;}
      .row{fill:rgba(124,240,199,0.08); stroke:rgba(124,240,199,0.65); stroke-width:1;}
      .until{fill:rgba(255,184,106,0.10); stroke:rgba(255,184,106,0.85); stroke-width:1;}
      .macro{fill:rgba(106,167,255,0.10); stroke:rgba(106,167,255,0.65); stroke-width:1;}

      .nodeText{fill:var(--text); font-size:12px; font-weight:900;}
      .nodeTextMuted{fill:var(--muted); font-size:12px; font-weight:800;}
      .callout{fill:rgba(124,240,199,0.10); stroke:var(--accent2); stroke-width:1; stroke-dasharray:6 6;}
      .calloutText{fill:var(--text); font-size:12px; font-weight:900;}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" rx="16" fill="var(--bg)"/>
  <rect x="24" y="18" width="1152" height="54" rx="10" class="panel"/>
  <text x="46" y="50" class="title">Approach 1g — Snippet vs Macro (Named Composite) for reuse</text>

  <!-- Left: Snippet -->
  <rect x="24" y="90" width="566" height="606" rx="12" class="panel"/>
  <text x="46" y="122" class="label">Option A — Snippet (copy/paste bundle)</text>
  <line x1="24" y1="140" x2="590" y2="140" class="divider"/>

  <rect x="46" y="156" width="520" height="44" rx="12" class="panel2"/>
  <text x="68" y="184" class="nodeText">Snippet: “Open Gate (Level01)”</text>
  <text x="320" y="184" class="tiny">Saved from selection • not parameterized</text>

  <rect x="46" y="214" width="520" height="34" rx="10" class="eventHdr"/>
  <text x="66" y="236" class="nodeText">Paste into Event: ButtonPressed</text>

  <rect x="66" y="256" width="240" height="30" rx="10" class="row"/>
  <text x="78" y="276" class="nodeText">MoveUntil(target=GateLeft)</text>
  <rect x="78" y="290" width="228" height="30" rx="10" class="until"/>
  <text x="90" y="310" class="nodeText">Until: time 200ms</text>

  <rect x="326" y="256" width="240" height="30" rx="10" class="row"/>
  <text x="338" y="276" class="nodeText">MoveUntil(target=GateRight)</text>
  <rect x="338" y="290" width="228" height="30" rx="10" class="until"/>
  <text x="350" y="310" class="nodeText">Until: time 200ms</text>

  <rect x="66" y="340" width="500" height="30" rx="10" class="row"/>
  <text x="78" y="360" class="nodeText">Play Sound (gate_open)</text>
  <rect x="78" y="374" width="488" height="30" rx="10" class="until"/>
  <text x="90" y="394" class="nodeText">Until: instant</text>

  <rect x="46" y="438" width="520" height="120" rx="12" class="callout"/>
  <text x="66" y="466" class="calloutText">Pros / Cons</text>
  <text x="66" y="488" class="tiny">+ Extremely fast to create (“convert selection to snippet”).</text>
  <text x="66" y="508" class="tiny">+ Great for one-off reuse.</text>
  <text x="66" y="528" class="tiny">– Bakes in specific targets + numbers (harder to reuse across scenes).</text>

  <!-- Right: Macro / Routine -->
  <rect x="610" y="90" width="566" height="606" rx="12" class="panel"/>
  <text x="632" y="122" class="label">Option B — Macro/Routine (named, parameterized composite)</text>
  <line x1="610" y1="140" x2="1176" y2="140" class="divider"/>

  <rect x="632" y="156" width="520" height="44" rx="12" class="panel2"/>
  <text x="654" y="184" class="nodeText">Routine: OpenGate(leftDoor, rightDoor, distance, durationMs)</text>
  <text x="1040" y="184" class="tiny">v1.2</text>

  <rect x="632" y="214" width="520" height="34" rx="10" class="eventHdr"/>
  <text x="652" y="236" class="nodeText">In Event: ButtonPressed → Call Routine</text>

  <rect x="652" y="256" width="500" height="30" rx="10" class="macro"/>
  <text x="664" y="276" class="nodeText">Call: OpenGate</text>
  <rect x="664" y="290" width="240" height="30" rx="10" class="chip"/>
  <text x="676" y="310" class="nodeTextMuted">leftDoor = GateLeft</text>
  <rect x="912" y="290" width="240" height="30" rx="10" class="chip"/>
  <text x="924" y="310" class="nodeTextMuted">rightDoor = GateRight</text>
  <rect x="664" y="324" width="240" height="30" rx="10" class="chip"/>
  <text x="676" y="344" class="nodeTextMuted">distance = 64</text>
  <rect x="912" y="324" width="240" height="30" rx="10" class="chip"/>
  <text x="924" y="344" class="nodeTextMuted">durationMs = 200</text>

  <rect x="632" y="384" width="520" height="174" rx="12" class="callout"/>
  <text x="652" y="412" class="calloutText">Pros / Cons</text>
  <text x="652" y="434" class="tiny">+ Reuse across scenes (bind targets + tweak params).</text>
  <text x="652" y="454" class="tiny">+ “One change updates many uses” (versioned).</text>
  <text x="652" y="474" class="tiny">+ Better for non-coders: call + fill in boxes.</text>
  <text x="652" y="494" class="tiny">– Slightly more ceremony (define routine + params once).</text>

  <rect x="632" y="576" width="520" height="100" rx="12" class="panel2"/>
  <text x="654" y="606" class="nodeText">Recommendation</text>
  <text x="654" y="628" class="tiny">Snippets for speed; Routines for shared mechanics.</text>
  <text x="654" y="648" class="tiny">Both can coexist, with a “Promote snippet → routine” button.</text>
</svg>

