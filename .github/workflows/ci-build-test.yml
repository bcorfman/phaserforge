name: PhaserForge CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  unit-tests-node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs

      - name: Ensure Git LFS assets are present
        run: |
          git lfs install --skip-repo
          git lfs pull
          git lfs checkout

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Unit Tests (Node)
        run: npm run test:unit:node

  unit-tests-jsdom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs

      - name: Ensure Git LFS assets are present
        run: |
          git lfs install --skip-repo
          git lfs pull
          git lfs checkout

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Unit Tests (jsdom)
        run: npm run test:unit:jsdom

  storybook-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs

      - name: Ensure Git LFS assets are present
        run: |
          git lfs install --skip-repo
          git lfs pull
          git lfs checkout

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Storybook Tests
        run: npm run test:stories

  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Git LFS
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs

      - name: Ensure Git LFS assets are present
        run: |
          git lfs install --skip-repo
          git lfs pull
          git lfs checkout

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
