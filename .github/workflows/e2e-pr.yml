name: PhaserForge CI / E2E (PR)

on:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HOME: /root

permissions:
  contents: read

jobs:
  e2e-pr-chromium:
    name: E2E PR Chromium (shard ${{ matrix.shard }}/${{ matrix.shards }})
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
      options: --ipc=host
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
        shards: [2]
    steps:
      - name: Install Git LFS
        run: |
          apt-get update
          apt-get install -y git-lfs

      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Install
        run: npm ci

      - name: E2E Tests
        env:
          PW_PROJECTS: chromium
          PW_FULLY_PARALLEL: '1'
        run: npm run test:e2e -- --project=chromium --grep "@smoke|@critical" --shard=${{ matrix.shard }}/${{ matrix.shards }} --fail-on-flaky-tests

      - name: Upload Playwright Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-pr-chromium-${{ matrix.shard }}-of-${{ matrix.shards }}
          path: |
            playwright-report
            test-results
