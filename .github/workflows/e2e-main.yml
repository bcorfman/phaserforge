name: PhaserForge CI / E2E (Main)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HOME: /root

permissions:
  contents: read

jobs:
  e2e-main-chromium:
    name: E2E Main Chromium (shard ${{ matrix.shard }}/${{ matrix.shards }})
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
      options: --ipc=host
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        shards: [4]
    steps:
      - name: Install Git LFS
        run: |
          apt-get update
          apt-get install -y git-lfs

      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm

      - name: Install
        run: npm ci

      - name: E2E Tests
        env:
          PW_PROJECTS: chromium
        run: node scripts/run-main-e2e-shard.cjs ${{ matrix.shard }} -- --fail-on-flaky-tests

      - name: Upload Playwright Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-main-chromium-${{ matrix.shard }}-of-${{ matrix.shards }}
          path: |
            playwright-report
            test-results
