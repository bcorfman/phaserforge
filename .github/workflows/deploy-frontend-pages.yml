name: Deploy Frontend (GitHub Pages)

on:
  workflow_run:
    workflows:
      - PhaserForge CI
    types:
      - completed
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Always deploy from trusted `main`, never from an arbitrary SHA.
          ref: main

      - name: Verify main SHA (workflow_run)
        if: github.event_name == 'workflow_run'
        run: |
          set -euo pipefail
          current="$(git rev-parse HEAD)"
          expected="${{ github.event.workflow_run.head_sha }}"
          if [ "$current" != "$expected" ]; then
            echo "Checked out main at $current, but workflow_run head_sha is $expected; refusing to deploy." >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

