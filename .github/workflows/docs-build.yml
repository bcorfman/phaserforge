name: Docs Build

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'src/docs/**'
      - 'scripts/docs/**'
      - '.plans/editor-workflows-inventory.md'
      - '.github/workflows/docs-build.yml'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - 'docs/**'
      - 'src/docs/**'
      - 'scripts/docs/**'
      - '.plans/editor-workflows-inventory.md'
      - '.github/workflows/docs-build.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: docs/.vitepress/dist
